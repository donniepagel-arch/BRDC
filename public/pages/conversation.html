<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversation - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF469A">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <script src="/js/brdc-toast.js"></script>
    <link rel="stylesheet" href="/css/messaging.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body {
            height: 100%;
            overflow: hidden; /* prevent scroll drift when keyboard opens */
        }
        body {
            background: linear-gradient(135deg, var(--bg-dark, #1a1a2e) 0%, #0f0f23 100%);
            color: var(--text-primary, #f0f0f0);
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 70, 154, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(145, 215, 235, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .message-thread {
            display: flex;
            flex-direction: column;
            flex: 1; /* fill body height instead of using 100dvh which drifts with keyboard */
            overflow: hidden;
        }

        .message-header {
            background: var(--bg-panel, #16213e);
            border-bottom: 3px solid var(--pink, #FF469A);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-primary, #f0f0f0);
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink, #FF469A), var(--teal, #91D7EB));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            color: white;
            overflow: hidden;
        }

        .header-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info {
            flex: 1;
        }

        .header-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            color: var(--text-primary, #f0f0f0);
        }

        .header-status {
            font-size: 12px;
            color: var(--text-dim, #8a8aa3);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .header-action-btn {
            min-height: 38px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #000;
            background: linear-gradient(180deg, var(--pink, #FF469A) 0%, #d63384 100%);
            color: #fff;
            font-family: 'Bebas Neue', cursive;
            font-size: 15px;
            letter-spacing: 0.8px;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .header-action-btn:hover {
            transform: translateY(-1px);
        }

        .header-action-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-input-area {
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
            background: var(--bg-panel, #16213e);
            border-top: 3px solid var(--pink, #FF469A);
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .message-input {
            flex: 1;
            min-height: 44px;
            max-height: 120px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            color: var(--text-primary, #f0f0f0);
            font-size: 15px;
            resize: none;
            outline: none;
        }

        .message-input:focus {
            border-color: var(--pink, #FF469A);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--teal, #91D7EB);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: var(--pink, #FF469A);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 640px) {
            .message-header {
                padding: 10px 12px;
                gap: 10px;
            }

            .header-info {
                min-width: 0;
            }

            .header-name {
                font-size: 18px;
            }

            .header-actions {
                gap: 6px;
            }

            .header-action-btn {
                min-height: 34px;
                padding: 6px 10px;
                font-size: 13px;
            }
        }

        .loading-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
        }

        .challenge-message-card {
            width: min(100%, 380px);
            background: linear-gradient(180deg, rgba(35, 48, 82, 0.98) 0%, rgba(24, 35, 62, 0.98) 100%);
            border: 2px solid rgba(255, 70, 154, 0.45);
            border-radius: 16px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.28);
            padding: 14px;
        }

        .challenge-message-card.sent {
            border-color: rgba(145, 215, 235, 0.45);
        }

        .challenge-message-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .challenge-message-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            letter-spacing: 0.8px;
            color: var(--pink, #FF469A);
        }

        .challenge-message-card.sent .challenge-message-title {
            color: var(--teal, #91D7EB);
        }

        .challenge-status-pill {
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            background: rgba(255,255,255,0.1);
            color: var(--text-primary, #f0f0f0);
        }

        .challenge-status-pill.pending { background: rgba(253, 216, 53, 0.16); color: var(--yellow, #FDD835); }
        .challenge-status-pill.accepted { background: rgba(76, 175, 80, 0.18); color: #7CFF8A; }
        .challenge-status-pill.declined { background: rgba(244, 67, 54, 0.16); color: #FF8A80; }

        .challenge-message-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 10px;
        }

        .challenge-message-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 10px;
        }

        .challenge-message-label {
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-dim, #8a8aa3);
            margin-bottom: 4px;
        }

        .challenge-message-value {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            color: var(--text-primary, #f0f0f0);
            letter-spacing: 0.5px;
        }

        .challenge-message-note {
            font-size: 13px;
            color: var(--text-dim, #8a8aa3);
            margin-top: 8px;
            line-height: 1.4;
        }

        .challenge-message-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .challenge-message-btn {
            min-height: 38px;
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #000;
            cursor: pointer;
            font-family: 'Bebas Neue', cursive;
            font-size: 15px;
            letter-spacing: 0.8px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .challenge-message-btn:hover {
            transform: translateY(-1px);
        }

        .challenge-message-btn.accept {
            background: linear-gradient(180deg, #4CAF50 0%, #2E7D32 100%);
            color: #fff;
        }

        .challenge-message-btn.decline {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary, #f0f0f0);
        }

        .challenge-message-btn.primary {
            background: linear-gradient(180deg, var(--pink, #FF469A) 0%, #d63384 100%);
            color: #fff;
        }

        .challenge-message-btn.secondary {
            background: rgba(145, 215, 235, 0.15);
            color: var(--teal, #91D7EB);
        }
    </style>
</head>
<body>
    <div id="loadingContainer" class="loading-container">
        <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
    </div>

    <div id="messageThread" class="message-thread" style="display: none;">
        <div class="message-header">
            <button class="back-btn" onclick="goBack()" aria-label="Go back">←</button>
            <div class="header-avatar" id="headerAvatar">?</div>
            <div class="header-info">
                <div class="header-name" id="headerName">Loading...</div>
                <div class="header-status" id="headerStatus">Direct Message</div>
            </div>
            <div class="header-actions">
                <button id="challengeBtn" class="header-action-btn" onclick="openConversationChallenge()" style="display:none;">Challenge</button>
            </div>
        </div>

        <div class="message-list" id="messageList"></div>

        <div class="message-input-area">
            <textarea class="message-input" id="messageInput" placeholder="Type a message..." rows="1" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script type="module">
        import { db, auth, waitForAuthReady, collection, query, orderBy, onSnapshot, doc, getDocs, limit, startAfter, callFunction } from '/js/firebase-config.js';
        import { openChallengeModal as openDirectChallengeModal } from '/js/challenge-system.js';

        // Dynamic import for push notifications (fail-safe)
        let initializePushNotifications = async () => false;
        try {
            const pushModule = await import('/js/push-notifications.js');
            initializePushNotifications = pushModule.initializePushNotifications;
        } catch (e) {
            console.warn('Push notifications not available:', e.message);
        }

        let conversationId = null;
        let currentPlayerId = null;
        let currentPlayer = null;
        let otherParticipant = null;
        let unsubscribeMessages = null;
        let lastMessageDate = null;

        // Pagination state
        let allMessages = [];
        let displayedMessages = [];
        let oldestLoadedTimestamp = null;
        let hasMoreMessages = true;
        const MESSAGES_PER_PAGE = 20;

        // Get conversation ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        conversationId = urlParams.get('id');
        const returnTab = urlParams.get('from') === 'direct' ? 'direct' : 'lobby';

        if (!conversationId) {
            toastError('No conversation specified');
            window.location.href = `/pages/messages.html?tab=${returnTab}`;
        }

        // Initialize conversation
        // Note: module scripts with top-level await finish after DOMContentLoaded fires,
        // so we use a readyState check instead of addEventListener('DOMContentLoaded')
        async function init() {
            const user = auth.currentUser || await waitForAuthReady(5000);
            if (!user) {
                window.location.href = `/pages/messages.html?tab=${returnTab}`;
                return;
            }

            try {
                const savedSession = localStorage.getItem('brdc_session');
                if (savedSession) {
                    const session = JSON.parse(savedSession);
                    if (session?.player_id) {
                        currentPlayer = {
                            id: session.player_id,
                            name: session.name || session.player_name || session.player?.name || 'Player'
                        };
                    }
                }
            } catch (e) {
                console.warn('Session fallback failed:', e);
            }

            try {
                const sessionResult = await callFunction('getPlayerSession', {});
                if (sessionResult?.success && sessionResult.player?.id) {
                    currentPlayer = sessionResult.player;
                }
            } catch (e) {
                console.warn('getPlayerSession failed:', e?.message || e);
            }

            if (!currentPlayer?.id) {
                window.location.href = `/pages/messages.html?tab=${returnTab}`;
                return;
            }

            await loadConversation();

            // Initialize push notifications silently (don't prompt, just register if already enabled)
            if (currentPlayerId) {
                initializePushNotifications(currentPlayerId).catch(() => {});
            }

            // Enter key to send (shift+enter for new line)
            document.getElementById('messageInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        }

        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        async function loadConversation() {
            try {
                const result = await callFunction('getConversationMessages', {
                    conversation_id: conversationId,
                    limit: 50
                });

                if (result.success) {
                    currentPlayerId = result.conversation?.current_player_id || null;

                    otherParticipant = result.conversation?.other_participant;

                    // Update header
                    if (otherParticipant) {
                        document.getElementById('headerName').textContent = otherParticipant.name;
                        const avatar = document.getElementById('headerAvatar');
                        const challengeBtn = document.getElementById('challengeBtn');
                        if (otherParticipant.photo) {
                            avatar.innerHTML = `<img src="${otherParticipant.photo}" alt="">`;
                        } else {
                            avatar.textContent = getInitials(otherParticipant.name);
                        }
                        if (challengeBtn) {
                            challengeBtn.style.display = otherParticipant.id ? 'inline-flex' : 'none';
                        }
                    }

                    // Show the thread
                    document.getElementById('loadingContainer').style.display = 'none';
                    document.getElementById('messageThread').style.display = 'flex';

                    // Render initial messages
                    renderMessages(result.messages);

                    // Set up real-time listener
                    setupRealtimeListener();
                } else {
                    toastError('Failed to load conversation');
                    window.location.href = `/pages/messages.html?tab=${returnTab}`;
                }
            } catch (error) {
                console.error('Error loading conversation:', error);
                toastError('Error loading conversation');
                window.location.href = `/pages/messages.html?tab=${returnTab}`;
            }
        }

        async function setupRealtimeListener() {
            const messagesRef = collection(db, 'conversations', conversationId, 'messages');

            // Load initial page of messages (most recent 20)
            const initialQuery = query(
                messagesRef,
                orderBy('timestamp', 'desc'),
                limit(MESSAGES_PER_PAGE)
            );

            const initialSnapshot = await getDocs(initialQuery);

            if (initialSnapshot.empty) {
                allMessages = [];
                displayedMessages = [];
                hasMoreMessages = false;
                renderMessagesWithPagination();
            } else {
                const messages = [];
                initialSnapshot.forEach(d => {
                    const data = d.data();
                    messages.push({
                        id: d.id,
                        ...data,
                        timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                        is_own: data.sender_id !== otherParticipant?.id
                    });
                });

                // Messages are in descending order, reverse to show oldest first
                allMessages = messages.reverse();
                displayedMessages = [...allMessages];

                // Track oldest loaded message for pagination
                if (allMessages.length > 0) {
                    oldestLoadedTimestamp = new Date(allMessages[0].timestamp);
                }

                // Check if there are more messages
                hasMoreMessages = initialSnapshot.size === MESSAGES_PER_PAGE;

                renderMessagesWithPagination();
            }

            // Set up real-time listener for NEW messages only (after the most recent loaded)
            const newestTimestamp = allMessages.length > 0
                ? new Date(allMessages[allMessages.length - 1].timestamp)
                : new Date(0);

            const realtimeQuery = query(
                messagesRef,
                orderBy('timestamp', 'asc'),
                startAfter(newestTimestamp)
            );

            unsubscribeMessages = onSnapshot(realtimeQuery, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const newMessage = {
                            id: change.doc.id,
                            ...data,
                            timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                            is_own: data.sender_id !== otherParticipant?.id
                        };
                        allMessages.push(newMessage);
                        displayedMessages.push(newMessage);
                        renderMessagesWithPagination();
                    }
                });

                // Mark as read
                callFunction('markConversationRead', {
                    conversation_id: conversationId
                }).catch(console.error);
            });
        }

        async function loadOlderMessages() {
            if (!hasMoreMessages || !oldestLoadedTimestamp) return;

            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) loadMoreBtn.textContent = 'Loading...';

            try {
                const messagesRef = collection(db, 'conversations', conversationId, 'messages');
                const olderQuery = query(
                    messagesRef,
                    orderBy('timestamp', 'desc'),
                    startAfter(oldestLoadedTimestamp),
                    limit(MESSAGES_PER_PAGE)
                );

                const olderSnapshot = await getDocs(olderQuery);

                if (olderSnapshot.empty) {
                    hasMoreMessages = false;
                } else {
                    const olderMessages = [];
                    olderSnapshot.forEach(d => {
                        const data = d.data();
                        olderMessages.push({
                            id: d.id,
                            ...data,
                            timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                            is_own: data.sender_id !== otherParticipant?.id
                        });
                    });

                    // Prepend older messages (they're in desc order, so reverse)
                    const reversedOlder = olderMessages.reverse();
                    allMessages = [...reversedOlder, ...allMessages];
                    displayedMessages = [...allMessages];

                    // Update oldest timestamp
                    if (reversedOlder.length > 0) {
                        oldestLoadedTimestamp = new Date(reversedOlder[0].timestamp);
                    }

                    hasMoreMessages = olderSnapshot.size === MESSAGES_PER_PAGE;
                }

                renderMessagesWithPagination();
            } catch (error) {
                console.error('Error loading older messages:', error);
                if (loadMoreBtn) loadMoreBtn.textContent = 'Load More Messages';
            }
        }

        function renderMessagesWithPagination() {
            const container = document.getElementById('messageList');

            // Add "Load more" button if there are more messages
            let loadMoreHTML = '';
            if (hasMoreMessages) {
                loadMoreHTML = `
                    <button id="loadMoreBtn" onclick="loadOlderMessages()"
                            style="width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg-card);
                                   border: 1px solid var(--border-color); border-radius: 8px; color: var(--teal);
                                   font-weight: 600; cursor: pointer; transition: all 0.2s;">
                        Load More Messages
                    </button>
                `;
            }

            // Render messages using existing renderMessages function
            renderMessages(displayedMessages);

            // Prepend load more button
            if (loadMoreHTML) {
                container.insertAdjacentHTML('afterbegin', loadMoreHTML);
            }

            // Scroll to bottom only if this is the initial load or a new message was added
            if (!window.hasScrolledToBottom) {
                const container = document.getElementById('messageList');
                container.scrollTop = container.scrollHeight;
                window.hasScrolledToBottom = true;
            }
        }

        // Make loadOlderMessages available globally
        window.loadOlderMessages = loadOlderMessages;

        function renderMessages(messages) {
            const container = document.getElementById('messageList');
            lastMessageDate = null;

            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="margin-top: 40px;">
                        <div class="empty-state-icon">👋</div>
                        <div class="empty-state-title">Start the Conversation</div>
                        <div class="empty-state-text">Send a message to ${otherParticipant?.name || 'this player'}</div>
                    </div>
                `;
                return;
            }

            let html = '';

            messages.forEach(msg => {
                // Date divider
                const msgDate = msg.timestamp ? new Date(msg.timestamp).toDateString() : null;
                if (msgDate && msgDate !== lastMessageDate) {
                    html += `<div class="message-date-divider"><span>${formatDateDivider(msg.timestamp)}</span></div>`;
                    lastMessageDate = msgDate;
                }

                if (msg.type === 'challenge') {
                    html += renderChallengeMessage(msg);
                    return;
                }

                if (msg.type === 'challenge_response') {
                    html += renderChallengeResponseMessage(msg);
                    return;
                }

                const bubbleClass = msg.is_own ? 'sent' : 'received';
                const time = msg.timestamp ? formatMessageTime(msg.timestamp) : '';

                html += `
                    <div class="message-bubble ${bubbleClass}">
                        <div class="message-text">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${time}</div>
                    </div>
                `;
            });

            container.innerHTML = html;

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function humanizeChallengeType(gameType) {
            const token = String(gameType || '').toLowerCase();
            if (token === 'cricket') return 'Cricket';
            if (token === 'corks_choice') return "Cork's Choice";
            if (token === 'around') return 'Around';
            if (token === '301' || token === '501' || token === '701') return token;
            return gameType || 'Challenge';
        }

        function getChallengeStatusClass(status) {
            const token = String(status || 'pending').toLowerCase();
            if (['accepted', 'declined', 'expired', 'cancelled'].includes(token)) return token;
            return 'pending';
        }

        function renderChallengeMessage(msg) {
            const challenge = msg.challenge || {};
            const status = msg.challenge_status || 'pending';
            const statusClass = getChallengeStatusClass(status);
            const time = msg.timestamp ? formatMessageTime(msg.timestamp) : '';
            const isRecipient = challenge.challenged_id === currentPlayerId;
            const isPending = status === 'pending';
            const note = challenge.message ? escapeHtml(challenge.message) : '';

            let actions = '';
            if (isRecipient && isPending) {
                actions = `
                    <div class="challenge-message-actions">
                        <button class="challenge-message-btn accept" onclick="respondToConversationChallenge('${msg.challenge_id}', 'accept')">Accept</button>
                        <button class="challenge-message-btn decline" onclick="respondToConversationChallenge('${msg.challenge_id}', 'decline')">Decline</button>
                    </div>
                `;
            }

            return `
                <div class="message-bubble ${msg.is_own ? 'sent' : 'received'}" style="background:none;padding:0;box-shadow:none;">
                    <div class="challenge-message-card ${msg.is_own ? 'sent' : 'received'}">
                        <div class="challenge-message-top">
                            <div class="challenge-message-title">Challenge</div>
                            <div class="challenge-status-pill ${statusClass}">${escapeHtml(status)}</div>
                        </div>
                        <div class="challenge-message-grid">
                            <div class="challenge-message-stat">
                                <div class="challenge-message-label">Game</div>
                                <div class="challenge-message-value">${escapeHtml(humanizeChallengeType(challenge.game_type))}</div>
                            </div>
                            <div class="challenge-message-stat">
                                <div class="challenge-message-label">Race To</div>
                                <div class="challenge-message-value">${escapeHtml(String(challenge.race_to || '-'))}</div>
                            </div>
                        </div>
                        ${note ? `<div class="challenge-message-note">${note}</div>` : ''}
                        ${actions}
                        <div class="message-time" style="margin-top:10px;">${time}</div>
                    </div>
                </div>
            `;
        }

        function renderChallengeResponseMessage(msg) {
            const response = msg.challenge_response || {};
            const status = msg.challenge_status || response.response || 'updated';
            const statusClass = getChallengeStatusClass(status);
            const time = msg.timestamp ? formatMessageTime(msg.timestamp) : '';

            let actions = '';
            if (response.response === 'accepted') {
                if (response.scorer_url) {
                    actions += `<a class="challenge-message-btn primary" href="${response.scorer_url}">Open Match</a>`;
                }
                if (response.room_url) {
                    actions += `<a class="challenge-message-btn secondary" href="${response.room_url}">Open Room</a>`;
                }
                if (actions) {
                    actions = `<div class="challenge-message-actions">${actions}</div>`;
                }
            }

            return `
                <div class="message-bubble ${msg.is_own ? 'sent' : 'received'}" style="background:none;padding:0;box-shadow:none;">
                    <div class="challenge-message-card ${msg.is_own ? 'sent' : 'received'}">
                        <div class="challenge-message-top">
                            <div class="challenge-message-title">Challenge Update</div>
                            <div class="challenge-status-pill ${statusClass}">${escapeHtml(String(status))}</div>
                        </div>
                        <div class="challenge-message-note">${escapeHtml(msg.text || 'Challenge updated')}</div>
                        ${actions}
                        <div class="message-time" style="margin-top:10px;">${time}</div>
                    </div>
                </div>
            `;
        }

        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();

            if (!text) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                // Get recipient ID from conversation ID
                const participants = conversationId.split('_');
                const recipientId = otherParticipant?.id || participants.find(p => p !== currentPlayerId);

                const result = await callFunction('sendDirectMessage', {
                    recipient_id: recipientId,
                    text: text
                });

                if (result.success) {
                    input.value = '';
                    input.style.height = 'auto';
                }
            } catch (error) {
                console.error('Error sending message:', error);
                toastError('Failed to send message');
            } finally {
                sendBtn.disabled = false;
            }
        };

        window.goBack = function() {
            window.location.href = `/pages/messages.html?tab=${returnTab}`;
        };

        window.openConversationChallenge = async function() {
            if (!otherParticipant?.id || !otherParticipant?.name) {
                toastError('Challenge target is not ready yet');
                return;
            }

            try {
                await openDirectChallengeModal(otherParticipant.id, otherParticipant.name);
            } catch (error) {
                console.error('Error opening challenge modal:', error);
                toastError('Failed to open challenge');
            }
        };

        window.respondToConversationChallenge = async function(challengeId, response) {
            try {
                const result = await callFunction('respondToChallenge', {
                    challenge_id: challengeId,
                    response
                });

                if (!result?.success) {
                    throw new Error(result?.error || `Failed to ${response} challenge`);
                }

                allMessages = allMessages.map(msg => (
                    msg.challenge_id === challengeId && msg.type === 'challenge'
                        ? { ...msg, challenge_status: response === 'accept' ? 'accepted' : 'declined' }
                        : msg
                ));
                displayedMessages = displayedMessages.map(msg => (
                    msg.challenge_id === challengeId && msg.type === 'challenge'
                        ? { ...msg, challenge_status: response === 'accept' ? 'accepted' : 'declined' }
                        : msg
                ));
                renderMessagesWithPagination();

                if (response === 'accept' && result.scorer_url) {
                    window.location.href = result.scorer_url;
                    return;
                }

                toastSuccess(response === 'accept' ? 'Challenge accepted' : 'Challenge declined');
            } catch (error) {
                console.error(`Error trying to ${response} challenge:`, error);
                toastError(error.message || `Failed to ${response} challenge`);
            }
        };

        window.autoResize = function(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        };

        // Helpers
        function getInitials(name) {
            if (!name) return '?';
            const parts = name.split(' ');
            if (parts.length >= 2) {
                return (parts[0][0] + parts[1][0]).toUpperCase();
            }
            return name.substring(0, 2).toUpperCase();
        }

        function formatDateDivider(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Today';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';

            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
        }

        function formatMessageTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) unsubscribeMessages();
        });
    </script>
</body>
</html>
