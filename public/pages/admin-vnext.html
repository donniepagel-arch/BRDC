<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin VNext - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
</head>
<body class="vnext-light-page admin-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="adminStatus">Loading admin...</p>
                <h1>Site Admin</h1>
                <p>High-level operations view for leagues, tournaments, players, and site health.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" href="/pages/league-director-vnext.html">Director board</a>
                <a class="ves-action" href="/pages/events-vnext.html">Events</a>
                <a class="ves-action" href="/pages/messages-vnext.html">Messages</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Admin summary">
            <article><span id="adminLeagues">-</span><strong>Leagues</strong><em>Active and historical league records.</em></article>
            <article><span id="adminTournaments">-</span><strong>Tournaments</strong><em>Online, flex, and in-person events.</em></article>
            <article><span id="adminPlayers">-</span><strong>Players</strong><em>Registered members and player records.</em></article>
        </section>

        <section class="ves-filters" aria-label="Admin sections">
            <button class="active" type="button" data-admin-target="leagues">Leagues</button>
            <button type="button" data-admin-target="tournaments">Tournaments</button>
            <button type="button" data-admin-target="members">Members</button>
            <button type="button" data-admin-target="health">Health</button>
        </section>

        <section class="ves-grid list admin-pane active" data-admin-pane="leagues" id="adminLeagueList"><div class="ves-skeleton"></div></section>
        <section class="ves-grid list admin-pane" data-admin-pane="tournaments" id="adminTournamentList"></section>
        <section class="ves-grid list admin-pane" data-admin-pane="members" id="adminMemberList"></section>
        <section class="ves-grid admin-pane" data-admin-pane="health" id="adminHealthGrid"></section>
    </main>

    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/admin-vnext.js?v=3"></script>
    <script>
        initBRDCNavigation({ page: 'admin', pageTitle: 'Site Admin', showBreadcrumbs: false, showBackButton: true });
    </script>
</body>
</html>
