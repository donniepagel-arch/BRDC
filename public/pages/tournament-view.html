<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Tournament - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <script src="/js/brdc-toast.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF469A;
            --teal: #91D7EB;
            --yellow: #FDD835;
            --black: #000000;
            --blue-dark: #0f0f1a;
            --blue-light: #1a1a2e;
            --text-light: #ffffff;
            --text-dim: #a0a0b0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--blue-light) 0%, var(--blue-dark) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            color: var(--text-light);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 70, 154, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(145, 215, 235, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 30px 20px; }

        /* Tournament Info Card */
        .tournament-card {
            background: rgba(26, 26, 46, 0.9);
            border: 4px solid var(--black);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }
        .tournament-header {
            background: linear-gradient(135deg, var(--teal) 0%, #5ab8d4 100%);
            color: var(--black);
            padding: 30px;
        }
        .tournament-name {
            font-family: 'Archivo Black', sans-serif;
            font-size: 36px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .tournament-date {
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            letter-spacing: 3px;
        }
        .tournament-body { padding: 30px; }
        .info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 25px;
        }
        .info-item { flex: 1; min-width: 150px; }
        .info-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }
        .info-value { font-weight: 700; font-size: 18px; }

        .register-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--pink), #cc3879);
            border: 4px solid var(--black);
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 24px;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .register-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0 rgba(0,0,0,0.5); }
        .register-btn:disabled { background: #666; cursor: not-allowed; transform: none; }

        .runtime-card {
            background: rgba(26, 26, 46, 0.92);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.45);
            margin-bottom: 24px;
            overflow: hidden;
        }
        .runtime-card-header {
            background: linear-gradient(135deg, var(--yellow), #e6c200);
            color: var(--black);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: center;
        }
        .runtime-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
        }
        .runtime-status {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 2px;
        }
        .runtime-card-body {
            padding: 24px;
            display: grid;
            gap: 18px;
        }
        .runtime-summary {
            color: var(--text-dim);
            line-height: 1.5;
        }
        .runtime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
        }
        .runtime-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px;
        }
        .runtime-item-label {
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .runtime-item-value {
            font-weight: 700;
            line-height: 1.35;
        }
        .runtime-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .runtime-btn {
            padding: 12px 16px;
            border: 3px solid var(--black);
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.4);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 140px;
        }
        .runtime-btn.primary { background: linear-gradient(135deg, var(--pink), #cc3879); }
        .runtime-btn.secondary { background: linear-gradient(135deg, var(--teal), #5ab8d4); color: var(--black); }
        .runtime-btn.ghost { background: rgba(255,255,255,0.08); }
        .runtime-list {
            display: grid;
            gap: 10px;
        }
        .runtime-list-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .runtime-list-label {
            font-weight: 600;
        }
        .runtime-list-meta {
            color: var(--text-dim);
            font-size: 13px;
            text-align: right;
        }
        .runtime-empty {
            color: var(--text-dim);
            padding: 6px 0;
        }

        /* Events Section */
        .events-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .event-card {
            background: rgba(26, 26, 46, 0.9);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.5);
            overflow: hidden;
            transition: transform 0.2s;
        }
        a.event-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .event-card:hover { transform: translate(-3px, -3px); }
        .event-header {
            padding: 20px;
            position: relative;
        }
        .event-header.singles { background: linear-gradient(135deg, var(--pink), #cc3879); }
        .event-header.doubles { background: linear-gradient(135deg, var(--teal), #5ab8d4); color: var(--black); }
        .event-header.triples { background: linear-gradient(135deg, var(--yellow), #e6c200); color: var(--black); }
        .event-header.other { background: linear-gradient(135deg, #9333ea, #7c3aed); }
        .event-name {
            font-family: 'Archivo Black', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
        }
        .event-fee {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 2px;
            margin-top: 5px;
        }
        .event-body { padding: 20px; }
        .event-detail {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .event-detail:last-child { border-bottom: none; }
        .event-detail-label { color: var(--text-dim); font-size: 14px; }
        .event-detail-value { font-weight: 600; }
        .event-signups {
            background: var(--yellow);
            color: var(--black);
            padding: 15px;
            text-align: center;
            border-top: 3px solid var(--black);
        }
        .event-signups-count {
            font-family: 'Archivo Black', sans-serif;
            font-size: 28px;
        }
        .event-signups-label { font-size: 12px; font-weight: 700; }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: linear-gradient(180deg, var(--blue-light) 0%, var(--blue-dark) 100%);
            border: 4px solid var(--teal);
            box-shadow: 0 0 50px rgba(145, 215, 235, 0.3);
            max-width: 550px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            background: var(--teal);
            color: var(--black);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
            letter-spacing: 2px;
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--black);
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }
        .modal-body { padding: 25px; }

        /* PIN Section */
        .pin-section {
            background: linear-gradient(135deg, var(--yellow), #e6c200);
            color: var(--black);
            padding: 20px;
            margin-bottom: 25px;
            border: 3px solid var(--black);
        }
        .pin-section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .pin-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .pin-input {
            flex: 1;
            padding: 12px;
            border: 3px solid var(--black);
            font-size: 18px;
            font-family: monospace;
            -webkit-text-security: disc;
            letter-spacing: 3px;
            text-align: center;
        }
        .pin-btn {
            padding: 12px 20px;
            background: var(--black);
            color: white;
            border: none;
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            cursor: pointer;
        }
        .pin-btn.selected {
            background: linear-gradient(135deg, var(--pink), #cc3879);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background: rgba(255,255,255,0.2);
        }
        .divider span {
            background: var(--blue-light);
            padding: 0 15px;
            position: relative;
            color: var(--text-dim);
            font-weight: 600;
        }

        .form-group { margin-bottom: 20px; }
        .form-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--text-dim);
        }
        .form-label span { color: var(--pink); }
        .form-input, .form-select {
            width: 100%;
            padding: 14px;
            border: 3px solid var(--black);
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 16px;
        }
        .form-input:focus, .form-select:focus { outline: none; border-color: var(--teal); }

        /* Event Selection */
        .events-selection {
            margin: 25px 0;
            border: 3px solid var(--black);
            background: rgba(255,255,255,0.03);
        }
        .events-selection-header {
            background: var(--black);
            padding: 15px;
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .event-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.2s;
        }
        .event-option:hover { background: rgba(255,255,255,0.05); }
        .event-option:last-child { border-bottom: none; }
        .event-option.selected { background: rgba(145, 215, 235, 0.15); }
        .event-option input {
            width: 22px;
            height: 22px;
            accent-color: var(--teal);
            margin-right: 15px;
        }
        .event-option-info { flex: 1; }
        .event-option-name { font-weight: 700; }
        .event-option-desc { font-size: 12px; color: var(--text-dim); }
        .event-option-fee {
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            color: var(--yellow);
        }

        .total-display {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            border: 2px solid var(--teal);
        }
        .total-label { font-weight: 600; }
        .total-amount {
            font-family: 'Archivo Black', sans-serif;
            font-size: 28px;
            color: var(--teal);
        }

        /* Payment Options */
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border: 2px solid transparent;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .payment-option:hover { background: rgba(255,255,255,0.1); }
        .payment-option.selected { border-color: var(--teal); background: rgba(145, 215, 235, 0.1); }
        .payment-option input { width: 20px; height: 20px; accent-color: var(--teal); }
        .payment-label { font-weight: 600; }
        .payment-desc { font-size: 12px; color: var(--text-dim); }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .checkbox-group input {
            width: 22px;
            height: 22px;
            accent-color: var(--teal);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--pink), #cc3879);
            border: 4px solid var(--black);
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 rgba(0,0,0,0.5);
        }
        .submit-btn:hover { transform: translate(-2px, -2px); }
        .submit-btn:disabled { background: #666; cursor: not-allowed; transform: none; }

        /* Success */
        .success-content { text-align: center; padding: 40px 20px; }
        .success-icon { font-size: 80px; margin-bottom: 20px; }
        .success-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 32px;
            margin-bottom: 15px;
        }
        .success-message { color: var(--text-dim); margin-bottom: 25px; line-height: 1.6; }
        .pin-display-box {
            background: var(--yellow);
            color: var(--black);
            padding: 20px;
            margin: 20px 0;
            border: 4px solid var(--black);
        }
        .pin-display-label { font-weight: 700; font-size: 14px; margin-bottom: 5px; }
        .pin-display-value {
            font-family: 'Archivo Black', sans-serif;
            font-size: 36px;
            letter-spacing: 8px;
        }

        .loading { text-align: center; padding: 60px; color: var(--text-dim); }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            padding: 20px;
            text-align: center;
            color: #ef4444;
        }

        .brdc-share-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim, #888);
            padding: 6px 8px;
            border-radius: 6px;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .brdc-share-btn:hover {
            color: var(--pink, #FF469A);
        }
        .brdc-share-btn.on-light-bg {
            color: rgba(0, 0, 0, 0.45);
        }
        .brdc-share-btn.on-light-bg:hover {
            color: var(--black, #000);
        }
        .tournament-header-shareable {
            position: relative;
        }
        .tournament-share-btn {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        /* Connection Status Indicator */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            margin-left: auto;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.connected { background: #4CAF50; }
        .status-dot.disconnected { background: #f44336; animation: statusPulse 1s infinite; }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .page-stack { display: grid; gap: 22px; }
        .hero-panel {
            background: linear-gradient(145deg, rgba(145, 215, 235, 0.16) 0%, rgba(255, 70, 154, 0.12) 100%), rgba(26, 26, 46, 0.92);
            border: 4px solid var(--black);
            box-shadow: 10px 10px 0 rgba(0,0,0,0.45);
            overflow: hidden;
        }
        .hero-top {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 18px;
            padding: 28px 28px 20px;
            align-items: start;
        }
        .hero-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(30px, 4vw, 44px);
            text-transform: uppercase;
            line-height: 1.02;
            margin-bottom: 10px;
        }
        .hero-meta {
            font-family: 'Bebas Neue', cursive;
            font-size: 19px;
            letter-spacing: 2px;
            color: var(--teal);
        }
        .hero-status-col {
            display: grid;
            justify-items: end;
            gap: 10px;
        }
        .hero-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border: 3px solid var(--black);
            background: var(--yellow);
            color: var(--black);
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
        }
        .hero-subnote {
            color: var(--text-dim);
            max-width: 620px;
            line-height: 1.5;
            font-size: 14px;
        }
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            padding: 0 28px 20px;
        }
        .hero-stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 14px 16px;
        }
        .hero-stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }
        .hero-stat-value {
            font-family: 'Archivo Black', sans-serif;
            font-size: 22px;
            line-height: 1.1;
        }
        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 0 28px 28px;
        }
        .hero-btn {
            padding: 14px 18px;
            border: 3px solid var(--black);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            letter-spacing: 1px;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.35);
            cursor: pointer;
            min-width: 160px;
        }
        .hero-btn.primary { background: linear-gradient(135deg, var(--pink), #cc3879); color: white; }
        .hero-btn.secondary { background: linear-gradient(135deg, var(--teal), #5ab8d4); color: var(--black); }
        .hero-btn.ghost { background: rgba(255,255,255,0.08); color: white; }
        .section-card {
            background: rgba(26, 26, 46, 0.92);
            border: 4px solid var(--black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.42);
            overflow: hidden;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 18px 22px;
            background: rgba(255,255,255,0.04);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .section-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 22px;
            text-transform: uppercase;
        }
        .section-kicker {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .section-body { padding: 22px; }
        .overview-grid {
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 18px;
        }
        .overview-panel {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 18px;
        }
        .overview-copy {
            color: var(--text-dim);
            line-height: 1.55;
            font-size: 14px;
        }
        .overview-list { display: grid; gap: 12px; }
        .overview-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
        }
        .overview-row:last-child { border-bottom: none; padding-bottom: 0; }
        .overview-row-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .overview-row-value { font-weight: 700; text-align: right; }
        .event-section-note {
            color: var(--text-dim);
            line-height: 1.45;
            font-size: 14px;
        }
        .event-summary-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .event-pill {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border: 2px solid rgba(0,0,0,0.75);
            background: rgba(0,0,0,0.18);
            color: white;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .event-details-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 14px;
        }
        .event-detail-block {
            padding: 10px 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
        }
        .event-detail-block .event-detail-label {
            display: block;
            margin-bottom: 4px;
        }
        .event-signups {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            background: var(--yellow);
            color: var(--black);
            padding: 14px 16px;
            text-align: left;
            border-top: 3px solid var(--black);
        }
        .event-cta-copy {
            display: grid;
            gap: 2px;
        }
        .event-open-label {
            font-size: 11px;
            font-weight: 700;
            opacity: 0.75;
        }
        .runtime-host-shell {
            display: grid;
            gap: 18px;
        }
        .host-disclosure {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 18px;
        }
        .host-disclosure summary {
            cursor: pointer;
            list-style: none;
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            letter-spacing: 1px;
        }
        .host-disclosure summary::-webkit-details-marker { display: none; }
        .host-disclosure summary::after {
            content: 'Show';
            float: right;
            color: var(--text-dim);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .host-disclosure[open] summary::after { content: 'Hide'; }
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            .hero-top { grid-template-columns: 1fr; padding: 22px 20px 16px; }
            .hero-status-col { justify-items: start; }
            .hero-stats, .hero-actions { padding-left: 20px; padding-right: 20px; }
            .overview-grid { grid-template-columns: 1fr; }
            .event-details-grid { grid-template-columns: 1fr; }
            .event-signups { align-items: flex-start; flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContent">
        <div class="loading">Loading tournament information...</div>
    </div>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="tvRegisterModalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="tvRegisterModalTitle">REGISTER</span>
                <button class="modal-close" onclick="closeModal()" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Form will be rendered here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { db, doc, getDoc, collection, getDocs, query, where, callFunction, onSnapshot, auth, onAuthStateChanged, waitForAuthReady } from '/js/firebase-config.js';
        import { initChallengeSystem, openChallengesList } from '/js/challenge-system.js';
        import '/js/live-video-session.js';

        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/pages/dashboard.html';
            }
        }
        window.goBack = goBack;
        window.openTournamentChallenges = () => openChallengesList();

        function getTournamentRuntimeSettings() {
            return tournamentRuntime?.runtime_settings || tournamentData?.runtime_settings || {};
        }

        function isRuntimeFeatureEnabled(key, fallback = false) {
            const settings = getTournamentRuntimeSettings();
            if (Object.prototype.hasOwnProperty.call(settings, key)) {
                return settings[key] === true;
            }
            if (Object.prototype.hasOwnProperty.call(tournamentData || {}, key)) {
                return tournamentData[key] === true;
            }
            return fallback;
        }

        function shouldShowTournamentRuntime() {
            if (getEffectiveTournamentStatus() === 'Completed' && !auth.currentUser) {
                return false;
            }
            return isRuntimeFeatureEnabled('show_tournament_runtime', true);
        }

        function shouldShowTournamentChat() {
            return isRuntimeFeatureEnabled('enable_tournament_chat', true);
        }

        function shouldShowDirectChallenges() {
            return isRuntimeFeatureEnabled('enable_player_challenges', !!(tournamentData?.allow_remote_play || tournamentData?.is_online));
        }

        function shouldShowVideoStreaming() {
            return isRuntimeFeatureEnabled('enable_video_streaming', false);
        }

        function shouldShowScoreAssist() {
            return isRuntimeFeatureEnabled('enable_score_assist', false);
        }

        function getDirectChallengesLabel() {
            return 'Direct Challenges';
        }

        function getVisibleEventChats(runtime = tournamentRuntime) {
            return Array.isArray(runtime?.event_chats) ? runtime.event_chats.filter(chat => chat?.id) : [];
        }

        function renderHeroEventChatButtons(runtime = tournamentRuntime) {
            return getVisibleEventChats(runtime)
                .map((chat, index) => `<a class="hero-btn ghost" href="/pages/chat-room.html?id=${encodeURIComponent(chat.id)}">${index === 0 ? 'Event Chat' : `Event Chat ${index + 1}`}</a>`)
                .join('');
        }

        function getActiveMatchViewerReadyState() {
            const side = tournamentRuntime?.active_match?.viewer_side;
            const ready = tournamentRuntime?.active_match?.match_ready || {};
            if (!side) return false;
            return ready[side] === true;
        }

        function getResultReviewLabel(review) {
            if (!review?.status) return 'Not started';
            if (review.status === 'confirmed') return 'Confirmed';
            if (review.status === 'disputed') return 'Disputed';
            if (review.status === 'staff_recorded') return 'Staff recorded';
            if (review.status === 'pending_confirmation') return 'Pending confirmation';
            return review.status;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const tournamentId = urlParams.get('tournament_id') || urlParams.get('id');

        let tournamentData = null;
        let events = [];
        let registrations = {};
        let tournamentRegistrations = [];
        let memberData = null;
        let selectedEvents = new Set();
        let unsubscribeTournament = null;
        let unsubscribeEvents = null;
        let tournamentRuntime = null;
        let registrationMode = 'self';

        function getCachedSignedInPlayerProfile(user) {
            try {
                const session = JSON.parse(localStorage.getItem('brdc_session') || '{}');
                const sessionPlayerId = session.player_id || null;
                const sessionEmail = String(session.email || user?.email || '').toLowerCase();

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key || !key.startsWith('dashboard_data_v2_')) continue;

                    const raw = localStorage.getItem(key);
                    if (!raw) continue;

                    const parsed = JSON.parse(raw);
                    const player = parsed?.data?.dashboard?.player || parsed?.dashboard?.player || null;
                    if (!player) continue;

                    const playerEmail = String(player.email || '').toLowerCase();
                    if ((sessionPlayerId && player.id === sessionPlayerId) ||
                        (sessionEmail && playerEmail && playerEmail === sessionEmail)) {
                        return player;
                    }
                }
            } catch (error) {
                console.warn('Tournament registration cache lookup failed:', error);
            }

            return null;
        }

        async function loadCurrentPlayerProfile() {
            const user = auth.currentUser || await waitForAuthReady(2000);
            if (!user) return null;

            const cachedPlayer = getCachedSignedInPlayerProfile(user);
            if (cachedPlayer) {
                return {
                    id: cachedPlayer.id || '',
                    firebase_uid: cachedPlayer.firebase_uid || user.uid,
                    name: cachedPlayer.name || [cachedPlayer.first_name, cachedPlayer.last_name].filter(Boolean).join(' '),
                    first_name: cachedPlayer.first_name || '',
                    last_name: cachedPlayer.last_name || '',
                    email: cachedPlayer.email || user.email || '',
                    phone: cachedPlayer.phone || user.phoneNumber || ''
                };
            }

            const fallbackProfile = {
                firebase_uid: user.uid,
                name: user.displayName || '',
                email: user.email || '',
                phone: user.phoneNumber || ''
            };

            const playersRef = collection(db, 'players');
            const lookups = [query(playersRef, where('firebase_uid', '==', user.uid))];
            if (user.email) {
                lookups.push(query(playersRef, where('email', '==', user.email)));
                lookups.push(query(playersRef, where('email_lower', '==', String(user.email).toLowerCase())));
            }

            for (const playerQuery of lookups) {
                try {
                    const snap = await getDocs(playerQuery);
                    if (!snap.empty) {
                        const docSnap = snap.docs[0];
                        return { id: docSnap.id, ...docSnap.data() };
                    }
                } catch (error) {
                    if (/missing or insufficient permissions/i.test(String(error?.message || error))) {
                        return fallbackProfile;
                    }
                    throw error;
                }
            }

            return fallbackProfile;
        }

        async function autofillRegistrationForm(force = false) {
            try {
                memberData = await loadCurrentPlayerProfile();
                if (!memberData) return;

                const regName = document.getElementById('regName');
                const regEmail = document.getElementById('regEmail');
                const regPhone = document.getElementById('regPhone');
                const authNotice = document.getElementById('registrationAuthNotice');
                const fullName = memberData.name || [memberData.first_name, memberData.last_name].filter(Boolean).join(' ');

                if (regName && (force || !regName.value)) regName.value = fullName;
                if (regEmail && (force || !regEmail.value)) regEmail.value = memberData.email || '';
                if (regPhone && (force || !regPhone.value)) regPhone.value = memberData.phone || '';
                if (authNotice) {
                    if (registrationMode === 'self') {
                        authNotice.textContent = `Using ${auth.currentUser?.email || memberData.email || fullName || 'your signed-in account'} for autofill.`;
                    } else {
                        authNotice.textContent = 'Enter a friend manually while staying signed in.';
                    }
                }
            } catch (error) {
                console.warn('Could not autofill tournament registration:', error);
            }
        }

        window.setRegistrationMode = async function(mode) {
            registrationMode = mode === 'other' ? 'other' : 'self';
            const selfBtn = document.getElementById('registerSelfBtn');
            const otherBtn = document.getElementById('registerOtherBtn');
            const regName = document.getElementById('regName');
            const regEmail = document.getElementById('regEmail');
            const regPhone = document.getElementById('regPhone');
            const authNotice = document.getElementById('registrationAuthNotice');

            if (selfBtn) selfBtn.classList.toggle('selected', registrationMode === 'self');
            if (otherBtn) otherBtn.classList.toggle('selected', registrationMode === 'other');

            if (registrationMode === 'self') {
                await autofillRegistrationForm(true);
            } else {
                if (regName) regName.value = '';
                if (regEmail) regEmail.value = '';
                if (regPhone) regPhone.value = '';
                if (authNotice) authNotice.textContent = 'Enter a friend manually while staying signed in.';
            }
        };

        function updateConnectionStatus(connected) {
            const statusEl = document.getElementById('connectionStatus');
            if (!statusEl) return;
            if (connected) {
                statusEl.innerHTML = '<span class="status-dot connected"></span> Live';
            } else {
                statusEl.innerHTML = '<span class="status-dot disconnected"></span> Offline';
            }
        }

        window.onload = async function() {
            if (!tournamentId) {
                showError('Missing tournament_id in URL');
                return;
            }
            setupRealTimeListeners();
            initChallengeSystem();
            loadTournamentRuntime();
        };

        onAuthStateChanged(auth, () => {
            loadTournamentRuntime();
        });

        // Clean up listeners on page unload
        window.addEventListener('beforeunload', () => {
            if (unsubscribeTournament) unsubscribeTournament();
            if (unsubscribeEvents) unsubscribeEvents();
        });

        function setupRealTimeListeners() {
            // Real-time listener for tournament document
            unsubscribeTournament = onSnapshot(
                doc(db, 'tournaments', tournamentId),
                async (docSnap) => {
                    updateConnectionStatus(true);

                    if (!docSnap.exists()) {
                        showError('Tournament not found');
                        return;
                    }

                    tournamentData = { id: tournamentId, ...docSnap.data() };

                    // Check for events array in tournament doc (fallback)
                    if (tournamentData.events && events.length === 0) {
                        events = tournamentData.events.map((e, i) => ({ id: `event_${i}`, ...e }));
                    }

                    renderPage();
                },
                (error) => {
                    console.error('Tournament listener error:', error);
                    updateConnectionStatus(false);
                }
            );

            // Real-time listener for events subcollection
            unsubscribeEvents = onSnapshot(
                collection(db, 'tournaments', tournamentId, 'events'),
                async (snapshot) => {
                    events = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

                    try {
                        const tournamentRegsSnap = await getDocs(collection(db, 'tournaments', tournamentId, 'registrations'));
                        tournamentRegistrations = tournamentRegsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    } catch (e) {
                        tournamentRegistrations = [];
                    }

                    // Load registrations for each event (one-time fetch since it changes less frequently)
                    for (const event of events) {
                        try {
                            const regsSnap = await getDocs(collection(db, 'tournaments', tournamentId, 'events', event.id, 'registrations'));
                            const directRegs = regsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                            const fallbackRegs = tournamentRegistrations.filter(reg =>
                                Array.isArray(reg.event_ids) && reg.event_ids.includes(event.id)
                            );
                            registrations[event.id] = directRegs.length ? directRegs : fallbackRegs;
                        } catch (e) {
                            registrations[event.id] = tournamentRegistrations.filter(reg =>
                                Array.isArray(reg.event_ids) && reg.event_ids.includes(event.id)
                            );
                        }
                    }

                    renderPage();
                },
                (error) => {
                    console.error('Events listener error:', error);
                }
            );
        }

        function renderPage() {
            const totalRegistered = tournamentData.registered_count
                ?? tournamentData.playerCount
                ?? Object.keys(tournamentData.players || {}).length
                ?? tournamentRegistrations.length
                ?? 0;
            const tournamentName = tournamentData.name || tournamentData.tournament_name || 'Tournament';
            const venueName = tournamentData.venue_name || tournamentData.venue || 'TBD';
            const venueAddress = tournamentData.venue_address || tournamentData.address || '';
            const locationLabel = tournamentData.location_mode === 'online'
                ? 'Online / Virtual'
                : (tournamentData.location_mode === 'flexible' ? 'Players Decide' : 'Specific Location');
            const statusLabel = getEffectiveTournamentStatus();
            const overallFormat = humanizeTournamentFormat(tournamentData.format || '');
            const nextAction = getPrimaryTournamentAction();
            const html = `
                <div class="page-stack">
                    <section class="hero-panel">
                        <div class="hero-top">
                            <div>
                                <div class="hero-title">${tournamentName}</div>
                                <div class="hero-meta">${formatDate(tournamentData.tournament_date || tournamentData.date || tournamentData.start_date)} • ${venueName}</div>
                                <div class="hero-subnote">${buildTournamentSummaryText(totalRegistered, venueName, venueAddress, locationLabel)}</div>
                            </div>
                            <div class="hero-status-col">
                                <div class="hero-status-badge">${statusLabel}</div>
                                <button type="button" class="brdc-share-btn on-light-bg tournament-share-btn" onclick="shareLink(location.href, document.title || 'Tournament - BRDC', 'Check out this BRDC tournament!')" title="Share this tournament" aria-label="Share this tournament">
                                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                                  </svg>
                                </button>
                            </div>
                        </div>
                        <div class="hero-stats">
                            <div class="hero-stat"><div class="hero-stat-label">Registered</div><div class="hero-stat-value">${totalRegistered}</div></div>
                            <div class="hero-stat"><div class="hero-stat-label">Events</div><div class="hero-stat-value">${events.length}</div></div>
                            <div class="hero-stat"><div class="hero-stat-label">Format</div><div class="hero-stat-value">${overallFormat || 'Mixed'}</div></div>
                            <div class="hero-stat"><div class="hero-stat-label">Location</div><div class="hero-stat-value">${locationLabel}</div></div>
                        </div>
                        <div class="hero-actions">
                            ${nextAction}
                            <a class="hero-btn ghost" href="/pages/tournament-bracket.html?tournament_id=${encodeURIComponent(tournamentId)}">View Bracket</a>
                            ${['host', 'staff', 'admin'].includes(tournamentRuntime?.viewer?.role) ? `<a class="hero-btn ghost" href="/pages/tournament-runtime.html?tournament_id=${encodeURIComponent(tournamentId)}">Runtime Ops</a>` : ''}
                            ${shouldShowTournamentChat() && tournamentRuntime?.tournament_chat?.id ? `<a class="hero-btn ghost" href="/pages/chat-room.html?id=${encodeURIComponent(tournamentRuntime.tournament_chat.id)}">Tournament Chat</a>` : ''}
                            ${renderHeroEventChatButtons()}
                        </div>
                    </section>

                    <section class="section-card">
                        <div class="section-header">
                            <div class="section-title">Overview</div>
                            <div class="section-kicker">Public tournament info</div>
                        </div>
                        <div class="section-body">
                            <div class="overview-grid">
                                <div class="overview-panel">
                                    <div class="overview-copy">${tournamentData.description || tournamentData.tournament_details || 'Registration, event details, and live match actions all start here. Use the event cards below to see exactly what is being played and how many players are already in each event.'}</div>
                                </div>
                                <div class="overview-panel">
                                    <div class="overview-list">
                                        <div class="overview-row"><span class="overview-row-label">Venue</span><span class="overview-row-value">${venueName}</span></div>
                                        <div class="overview-row"><span class="overview-row-label">Address</span><span class="overview-row-value">${venueAddress || (locationLabel === 'Online / Virtual' ? 'Match rooms assigned online' : 'Players decide')}</span></div>
                                        <div class="overview-row"><span class="overview-row-label">Status</span><span class="overview-row-value">${statusLabel}</span></div>
                                        <div class="overview-row"><span class="overview-row-label">Registered</span><span class="overview-row-value">${totalRegistered} players</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="section-card">
                        <div class="section-header">
                            <div class="section-title">Events</div>
                            <div class="section-kicker">Choose a division and format</div>
                        </div>
                        <div class="section-body">
                            <div class="event-section-note">Each event card shows the actual format, leg structure, and signed-up count. Open an event to see its bracket and players once the tournament is active.</div>
                            <div class="events-grid" style="margin-top:18px;">
                                ${events.map(event => renderEventCard(event)).join('')}
                            </div>
                        </div>
                    </section>

                    ${renderRuntimeCard()}
                </div>
            `;

            document.getElementById('mainContent').innerHTML = html;
            mountTournamentVideoRuntime();
        }

        function buildTournamentSummaryText(totalRegistered, venueName, venueAddress, locationLabel) {
            const addressText = venueAddress ? `${venueName} • ${venueAddress}` : venueName;
            const statusLabel = getEffectiveTournamentStatus();
            if (statusLabel === 'Completed') {
                return `${totalRegistered} players entered. ${locationLabel}. ${addressText}. Registration is closed and results are available in the bracket.`;
            }
            if (statusLabel === 'Live') {
                return `${totalRegistered} players are in. ${locationLabel}. ${addressText}. Use the main action below to jump into the bracket or your assigned match.`;
            }
            return `${totalRegistered} registered so far. ${locationLabel}. ${addressText}. Use the main action below to register or open the bracket if you are already in.`;
        }

        function getPrimaryTournamentAction() {
            const statusLabel = getEffectiveTournamentStatus();
            if (tournamentRuntime?.viewer?.is_registered && tournamentRuntime?.action === 'launch_match' && tournamentRuntime?.active_match) {
                return `<a class="hero-btn primary" href="${buildTournamentScorerUrl(tournamentRuntime.active_match)}">Open My Match</a>`;
            }
            if (tournamentRuntime?.viewer?.is_registered && tournamentRuntime?.action === 'continue_match' && tournamentRuntime?.active_match) {
                return `<a class="hero-btn primary" href="${buildTournamentScorerUrl(tournamentRuntime.active_match)}">Continue Match</a>`;
            }
            if (tournamentRuntime?.viewer?.is_registered && tournamentRuntime?.action === 'review_result') {
                return `<a class="hero-btn primary" href="/pages/tournament-bracket.html?tournament_id=${encodeURIComponent(tournamentId)}">Review Result</a>`;
            }
            if (statusLabel === 'Completed') {
                return `<a class="hero-btn secondary" href="/pages/tournament-bracket.html?tournament_id=${encodeURIComponent(tournamentId)}">View Results</a>`;
            }
            if (statusLabel === 'Live') {
                return `<a class="hero-btn primary" href="/pages/tournament-bracket.html?tournament_id=${encodeURIComponent(tournamentId)}">Open Live Bracket</a>`;
            }
            if (tournamentRuntime?.viewer?.is_registered) {
                return `<button class="hero-btn secondary" type="button" onclick="openModal()">Register Another Player</button>`;
            }
            return `<button class="hero-btn primary" type="button" onclick="${tournamentData.matchmaker_enabled ? `window.location.href='/pages/matchmaker-register.html?tournament_id=${tournamentId}'` : 'openModal()'}">Register Now</button>`;
        }

        function getEffectiveTournamentStatus() {
            if (tournamentData?.completed === true || tournamentData?.completedAt) return 'Completed';
            if (tournamentData?.status === 'completed') return 'Completed';
            if (tournamentData?.started === true || tournamentData?.status === 'active' || tournamentData?.status === 'in_progress') return 'Live';
            if (tournamentData?.status === 'registration') return 'Registration Open';
            return humanizeTournamentStatus(tournamentData?.status || 'created');
        }

        function getRuntimeStatusLabel(action) {
            switch (action) {
            case 'register': return 'Registration';
            case 'check_in': return 'Check In';
            case 'ready_up': return 'Ready Up';
            case 'continue_match': return 'Live Match';
            case 'review_result': return 'Review Result';
            case 'launch_match': return 'Called';
            case 'await_opponent': return 'Waiting';
            case 'await_assignment': return 'Stand By';
            default: return 'Overview';
            }
        }

        function formatRuntimeName(entry, fallback = 'TBD') {
            return entry?.name || fallback;
        }

        function formatStaleState(match) {
            if (!match?.stale_state) return 'On time';
            if (match.stale_state === 'awaiting_start') {
                return `Awaiting start (${match.stale_minutes || 0}m)`;
            }
            if (match.stale_state === 'in_progress_idle') {
                return `Idle in progress (${match.stale_minutes || 0}m)`;
            }
            return match.stale_state;
        }

        function getRuntimeGameType(match) {
            if (match?.game_type) return String(match.game_type).toLowerCase();
            if (!tournamentData) return '501';

            if ((tournamentData.format || '').toLowerCase().includes('double') || tournamentData.matchmaker_enabled) {
                if (match?.bracket_segment === 'losers') {
                    return String(tournamentData.losers_game_type || '501').toLowerCase();
                }
                return String(tournamentData.winners_game_type || tournamentData.game_type || '501').toLowerCase();
            }

            return String(tournamentData.game_type || '501').toLowerCase();
        }

        function buildTournamentScorerUrl(match) {
            if (!match || !tournamentData) return '#';

            const gameType = getRuntimeGameType(match);
            const scorerPage = gameType === 'cricket' ? 'league-cricket.html' : 'x01-scorer.html';
            const bestOf = parseInt(match.best_of || tournamentData.best_of || 3, 10) || 3;
            const legsToWin = Math.max(1, Math.ceil(bestOf / 2));
            const homePlayers = [{ id: match.side1?.player_id || match.side1?.id || '', name: formatRuntimeName(match.side1, 'Player 1') }];
            const awayPlayers = [{ id: match.side2?.player_id || match.side2?.id || '', name: formatRuntimeName(match.side2, 'Player 2') }];
            const params = new URLSearchParams({
                tournament_id: tournamentId,
                tournament_match_id: match.id,
                tournament_type: ((tournamentData.format || '').toLowerCase().includes('double') || tournamentData.matchmaker_enabled) ? 'double' : 'single',
                return_url: window.location.href,
                home_team_name: formatRuntimeName(match.side1, 'Player 1'),
                away_team_name: formatRuntimeName(match.side2, 'Player 2'),
                home_players: JSON.stringify(homePlayers),
                away_players: JSON.stringify(awayPlayers),
                legs_to_win: String(legsToWin),
                cork: 'true'
            });

            if (gameType !== 'cricket') {
                params.set('starting_score', String(match.starting_score || 501));
                params.set('format', String(match.game_type || tournamentData.game_type || '501'));
                params.set('in_rule', String(match.in_rule || tournamentData.in_rule || 'straight'));
                params.set('checkout', String(match.out_rule || tournamentData.out_rule || tournamentData.checkout || 'double'));
            }

            return `/pages/${scorerPage}?${params.toString()}`;
        }

        function renderRuntimeActions() {
            const runtime = tournamentRuntime;
            if (!runtime) {
                return `<div class="runtime-actions"><button class="runtime-btn ghost" type="button" onclick="location.reload()">Refresh</button></div>`;
            }

            const actions = [];
            if (runtime.viewer?.is_registered && runtime.runtime_settings?.require_check_in && !runtime.viewer?.checked_in) {
                actions.push(`<button class="runtime-btn primary" type="button" onclick="setTournamentCheckIn(true)">Check In</button>`);
            }
            if (runtime.active_match && runtime.active_match.viewer_side && ['pending', 'ready'].includes(runtime.active_match.status)) {
                const readyLabel = getActiveMatchViewerReadyState() ? 'Mark Not Ready' : 'Ready Up';
                actions.push(`<button class="runtime-btn secondary" type="button" onclick="setTournamentMatchReady(${getActiveMatchViewerReadyState() ? 'false' : 'true'})">${readyLabel}</button>`);
            }
            if (runtime.active_match && (runtime.active_match.status === 'in_progress' || (['ready', 'pending'].includes(runtime.active_match.status) && runtime.active_match.ready_to_start))) {
                actions.push(`<a class="runtime-btn primary" href="${buildTournamentScorerUrl(runtime.active_match)}">${runtime.action === 'continue_match' ? 'Continue Match' : 'Open Match'}</a>`);
            }
            if (runtime.active_match?.room_url) {
                actions.push(`<a class="runtime-btn secondary" href="${runtime.active_match.room_url}" target="_blank" rel="noopener noreferrer">Open Room</a>`);
            }
            if (runtime.active_match && runtime.runtime_settings?.auto_create_match_rooms) {
                actions.push(`<button class="runtime-btn ghost" type="button" onclick="promptTournamentRoomUpdate()">Set Room</button>`);
            }
            if (runtime.active_match?.room_label || runtime.active_match?.room_url) {
                actions.push(`<button class="runtime-btn ghost" type="button" onclick="setTournamentRoomLifecycle('closed')">Close Room</button>`);
                actions.push(`<button class="runtime-btn ghost" type="button" onclick="setTournamentRoomLifecycle('archived')">Archive Room</button>`);
            }
            if (shouldShowTournamentChat() && runtime.tournament_chat?.id) {
                actions.push(`<a class="runtime-btn ghost" href="/pages/chat-room.html?id=${encodeURIComponent(runtime.tournament_chat.id)}">Tournament Chat</a>`);
            }
            getVisibleEventChats(runtime).forEach((chat, index) => {
                actions.push(`<a class="runtime-btn ghost" href="/pages/chat-room.html?id=${encodeURIComponent(chat.id)}">${index === 0 ? 'Event Chat' : `Event Chat ${index + 1}`}</a>`);
            });
            if (shouldShowDirectChallenges()) {
                actions.push(`<button class="runtime-btn ghost" type="button" onclick="openTournamentChallenges()">${getDirectChallengesLabel()}</button>`);
            }
            if (runtime.active_match?.status === 'completed' && runtime.active_match.viewer_side) {
                const review = runtime.active_match.result_review || {};
                const viewerSide = runtime.active_match.viewer_side;
                const alreadyConfirmed = viewerSide === 'side1' ? review.side1_confirmed : review.side2_confirmed;
                if (!alreadyConfirmed && review.status !== 'confirmed') {
                    actions.push(`<button class="runtime-btn secondary" type="button" onclick="respondToTournamentResult('confirm')">Confirm Result</button>`);
                }
                if (review.status !== 'confirmed') {
                    actions.push(`<button class="runtime-btn ghost" type="button" onclick="respondToTournamentResult('dispute')">Dispute Result</button>`);
                }
            }
            if (runtime.active_match?.status === 'completed' && runtime.active_match.result_review?.status === 'disputed' && ['host', 'staff', 'admin'].includes(runtime.viewer?.role)) {
                actions.push(`<button class="runtime-btn secondary" type="button" onclick="respondToTournamentResult('resolve')">Resolve Dispute</button>`);
            }
            actions.push(`<a class="runtime-btn ghost" href="/pages/tournament-bracket.html?tournament_id=${encodeURIComponent(tournamentId)}">View Bracket</a>`);
            return `<div class="runtime-actions">${actions.join('')}</div>`;
        }

        function renderRuntimeList(matches, emptyText) {
            if (!matches?.length) {
                return `<div class="runtime-empty">${emptyText}</div>`;
            }

            return `
                <div class="runtime-list">
                    ${matches.map(match => `
                        <div class="runtime-list-row">
                            <div>
                                <div class="runtime-list-label">${formatRuntimeName(match.side1)} vs ${formatRuntimeName(match.side2)}</div>
                                <div class="runtime-list-meta">${match.bracket_segment || 'main'} • Round ${match.round || '-'}</div>
                            </div>
                            <div class="runtime-list-meta">${match.status || 'waiting'}${match.room_label ? `<br>${match.room_label}` : ''}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderAuditTrail(auditItems = []) {
            if (!auditItems.length) {
                return `<div class="runtime-empty">No runtime events logged yet.</div>`;
            }

            return `
                <div class="runtime-list">
                    ${auditItems.map(item => `
                        <div class="runtime-list-row">
                            <div>
                                <div class="runtime-list-label">${item.title || item.type || 'Runtime update'}</div>
                                <div class="runtime-list-meta">${item.body || ''}</div>
                            </div>
                            <div class="runtime-list-meta">${item.actor_name || 'system'}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderHostQueue(queue) {
            if (!queue || !['host', 'staff', 'admin'].includes(tournamentRuntime?.viewer?.role)) {
                return '';
            }

            const unchecked = queue.unchecked_players || [];
            const staleMatches = queue.stale_matches || [];
            const roomAssignments = queue.room_assignments || [];
            const disputed = queue.disputed_matches || [];

            const uncheckedHtml = unchecked.length
                ? unchecked.map(item => `
                    <div class="runtime-list-row">
                        <div>
                            <div class="runtime-list-label">${item.name}</div>
                            <div class="runtime-list-meta">${item.email || 'No email'}${item.runtime_status && item.runtime_status !== 'active' ? `<br>Status: ${item.runtime_status}` : ''}</div>
                        </div>
                        <div class="runtime-actions">
                            <button class="runtime-btn ghost" type="button" onclick="checkInTournamentParticipant('${item.registration_id || ''}','${item.player_id || ''}')">Check In</button>
                            <button class="runtime-btn ghost" type="button" onclick="setTournamentParticipantAvailability('${item.registration_id || ''}','${item.player_id || ''}','hold')">Hold</button>
                            <button class="runtime-btn ghost" type="button" onclick="setTournamentParticipantAvailability('${item.registration_id || ''}','${item.player_id || ''}','dropped')">Drop</button>
                        </div>
                    </div>
                `).join('')
                : `<div class="runtime-empty">No pending check-ins.</div>`;

            const staleHtml = staleMatches.length
                ? staleMatches.map(match => `
                    <div class="runtime-list-row">
                        <div>
                            <div class="runtime-list-label">${formatRuntimeName(match.side1)} vs ${formatRuntimeName(match.side2)}</div>
                            <div class="runtime-list-meta">${formatStaleState(match)}</div>
                        </div>
                        <div class="runtime-actions">
                            <button class="runtime-btn ghost" type="button" onclick="sendTournamentRuntimeReminder('${match.id}')">Remind</button>
                            <button class="runtime-btn ghost" type="button" onclick="promptTournamentRoomUpdate('${match.id}')">Set Room</button>
                        </div>
                    </div>
                `).join('')
                : `<div class="runtime-empty">No stale matches.</div>`;

            const roomHtml = roomAssignments.length
                ? roomAssignments.map(match => `
                    <div class="runtime-list-row">
                        <div>
                            <div class="runtime-list-label">${match.room_label || `${formatRuntimeName(match.side1)} vs ${formatRuntimeName(match.side2)}`}</div>
                            <div class="runtime-list-meta">${match.room_status || 'open'}${match.room_url ? `<br>${match.room_url}` : ''}</div>
                        </div>
                        <div class="runtime-actions">
                            <button class="runtime-btn ghost" type="button" onclick="promptTournamentRoomUpdate('${match.id}')">Edit</button>
                            <button class="runtime-btn ghost" type="button" onclick="setTournamentRoomLifecycle('closed','${match.id}')">Close</button>
                            <button class="runtime-btn ghost" type="button" onclick="setTournamentRoomLifecycle('archived','${match.id}')">Archive</button>
                        </div>
                    </div>
                `).join('')
                : `<div class="runtime-empty">No match rooms yet.</div>`;

            const disputedHtml = disputed.length
                ? disputed.map(match => `
                    <div class="runtime-list-row">
                        <div>
                            <div class="runtime-list-label">${formatRuntimeName(match.side1)} vs ${formatRuntimeName(match.side2)}</div>
                            <div class="runtime-list-meta">${match.result_review?.dispute_notes || 'Result disputed'}</div>
                        </div>
                        <button class="runtime-btn secondary" type="button" onclick="respondToTournamentResult('resolve','${match.id}')">Resolve</button>
                    </div>
                `).join('')
                : `<div class="runtime-empty">No disputed matches.</div>`;

            return `
                <details class="host-disclosure">
                    <summary>Director / Runtime Controls</summary>
                    <div style="margin-top: 16px;">
                        <div class="runtime-item-label" style="margin-bottom: 8px;">Pending Check-Ins</div>
                        <div class="runtime-list">
                            ${uncheckedHtml}
                        </div>
                        <div class="runtime-item-label" style="margin: 12px 0 8px;">Stale Matches</div>
                        <div class="runtime-list">
                            ${staleHtml}
                        </div>
                        <div class="runtime-item-label" style="margin: 12px 0 8px;">Room Ops</div>
                        <div class="runtime-list">
                            ${roomHtml}
                        </div>
                        <div class="runtime-item-label" style="margin: 12px 0 8px;">Disputes</div>
                        <div class="runtime-list">
                            ${disputedHtml}
                        </div>
                        <div class="runtime-item-label" style="margin: 12px 0 8px;">Audit Trail</div>
                        ${renderAuditTrail(tournamentRuntime?.recent_audit || [])}
                    </div>
                </details>
            `;
        }

        function renderRuntimeCard() {
            const runtime = tournamentRuntime;

            if (!shouldShowTournamentRuntime()) {
                return '';
            }

            if (!runtime) {
                return `
                    <div class="runtime-card">
                        <div class="runtime-card-header">
                            <div class="runtime-title">Tournament Runtime</div>
                            <div class="runtime-status">Loading</div>
                        </div>
                        <div class="runtime-card-body">
                            <div class="runtime-summary">Checking registration, live match assignment, chat room, and tournament actions.</div>
                        </div>
                    </div>
                `;
            }

            const activeMatch = runtime.active_match;
            const summary = !auth.currentUser
                ? 'Sign in to see your registration, match assignment, room link, and player actions for this tournament.'
                : (runtime.viewer?.is_registered
                ? (activeMatch
                    ? `You are registered. Current match: ${formatRuntimeName(activeMatch.side1)} vs ${formatRuntimeName(activeMatch.side2)}.`
                    : 'You are registered. No live match is assigned yet.')
                : 'You are signed in, but this account is not registered for this tournament yet.');
            const runtimeFeatures = [
                shouldShowTournamentChat() ? 'tournament chat' : null,
                shouldShowDirectChallenges() ? 'direct challenges' : null,
                isRuntimeFeatureEnabled('allow_player_self_report', true) ? 'player result reporting' : null,
                shouldShowVideoStreaming() ? 'live board/thrower video' : null,
                shouldShowScoreAssist() ? 'score assist' : null,
                isRuntimeFeatureEnabled('enable_runtime_notifications', true) ? 'runtime notifications' : null
            ].filter(Boolean);
            const capabilityNote = runtimeFeatures.length
                ? `Enabled for this tournament: ${runtimeFeatures.join(', ')}.`
                : 'No optional online runtime actions are enabled for this tournament.';
            const readyLabel = activeMatch?.viewer_side
                ? (activeMatch.match_ready?.[activeMatch.viewer_side] ? 'Ready' : 'Not ready')
                : 'N/A';
            const reviewLabel = activeMatch?.status === 'completed'
                ? getResultReviewLabel(activeMatch.result_review)
                : 'Pending result';

            return `
                <section class="runtime-card">
                    <div class="runtime-card-header">
                        <div class="runtime-title">Your Tournament Runtime</div>
                        <div class="runtime-status">${getRuntimeStatusLabel(runtime.action)}</div>
                    </div>
                    <div class="runtime-card-body">
                        <div class="runtime-host-shell">
                        <div class="runtime-summary">${summary}</div>
                        <div class="runtime-summary" style="margin-top: 8px; color: var(--text-dim);">${capabilityNote}</div>
                        <div class="runtime-grid">
                            <div class="runtime-item">
                                <div class="runtime-item-label">Viewer</div>
                                <div class="runtime-item-value">${runtime.viewer?.name || 'Guest'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Role</div>
                                <div class="runtime-item-value">${runtime.viewer?.role || 'guest'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Registration</div>
                                <div class="runtime-item-value">${runtime.viewer?.is_registered ? (runtime.viewer?.registration_status || 'active') : 'Not linked'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Checked In</div>
                                <div class="runtime-item-value">${runtime.viewer?.checked_in ? 'Yes' : 'No'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Current Match</div>
                                <div class="runtime-item-value">${activeMatch ? `${formatRuntimeName(activeMatch.side1)} vs ${formatRuntimeName(activeMatch.side2)}` : 'Waiting'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Room / Board</div>
                                <div class="runtime-item-value">${activeMatch?.room_label || activeMatch?.board || 'Not assigned'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Room Status</div>
                                <div class="runtime-item-value">${activeMatch?.room_status || 'n/a'}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Ready State</div>
                                <div class="runtime-item-value">${readyLabel}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Result Review</div>
                                <div class="runtime-item-value">${reviewLabel}</div>
                            </div>
                            <div class="runtime-item">
                                <div class="runtime-item-label">Runtime Health</div>
                                <div class="runtime-item-value">${activeMatch ? formatStaleState(activeMatch) : 'Waiting'}</div>
                            </div>
                        </div>
                        ${renderRuntimeActions()}
                        <div>
                            <div class="runtime-item-label" style="margin-bottom: 8px;">Assigned / Upcoming Matches</div>
                            ${renderRuntimeList(runtime.upcoming_matches, 'No upcoming matches assigned.')}
                        </div>
                        ${shouldShowVideoStreaming() && activeMatch ? '<div id="tournamentVideoRuntime" style="margin-top: 18px;"></div>' : ''}
                        ${renderHostQueue(runtime.host_queue)}
                        </div>
                    </div>
                </section>
            `;
        }

        async function loadTournamentRuntime() {
            if (!tournamentId) return;
            const activeUser = auth.currentUser || await waitForAuthReady(5000);
            if (!activeUser) {
                tournamentRuntime = {
                    success: false,
                    viewer: { role: 'guest', is_registered: false },
                    action: 'register',
                    upcoming_matches: [],
                    completed_matches: []
                };
                if (tournamentData) {
                    renderPage();
                }
                return;
            }

            try {
                const result = await callFunction('getTournamentPlayerRuntime', {
                    tournament_id: tournamentId
                });
                tournamentRuntime = result?.success ? result : {
                    success: false,
                    viewer: { role: activeUser ? 'player' : 'guest', is_registered: false },
                    action: activeUser ? 'await_assignment' : 'register',
                    upcoming_matches: [],
                    completed_matches: []
                };
            } catch (error) {
                tournamentRuntime = {
                    success: false,
                    viewer: { role: activeUser ? 'player' : 'guest', is_registered: false },
                    action: activeUser ? 'await_assignment' : 'register',
                    upcoming_matches: [],
                    completed_matches: [],
                    error: error.message
                };
            }

            if (tournamentData) {
                renderPage();
            }
        }

        function mountTournamentVideoRuntime() {
            const container = document.getElementById('tournamentVideoRuntime');
            if (!container || !shouldShowVideoStreaming() || !tournamentRuntime?.active_match?.id || !window.initLiveVideoSession) {
                return;
            }

            window.initLiveVideoSession({
                leagueId: `tournament:${tournamentId}`,
                matchId: tournamentRuntime.active_match.id,
                enableScoreAssist: shouldShowScoreAssist(),
                gameType: getRuntimeGameType(tournamentRuntime.active_match),
                root: container
            });
        }

        window.setTournamentCheckIn = async function(checkedIn = true) {
            await callFunction('setTournamentPlayerCheckIn', {
                tournament_id: tournamentId,
                checked_in: checkedIn
            });
            await loadTournamentRuntime();
        };

        window.setTournamentMatchReady = async function(ready = true) {
            if (!tournamentRuntime?.active_match?.id) return;
            await callFunction('setTournamentMatchReady', {
                tournament_id: tournamentId,
                match_id: tournamentRuntime.active_match.id,
                ready
            });
            await loadTournamentRuntime();
        };

        window.promptTournamentRoomUpdate = async function(matchIdOverride = null) {
            const targetMatch = matchIdOverride
                ? (tournamentRuntime?.upcoming_matches || []).concat(tournamentRuntime?.completed_matches || [], tournamentRuntime?.host_queue?.stale_matches || [], tournamentRuntime?.host_queue?.room_assignments || []).find(match => match.id === matchIdOverride)
                : tournamentRuntime?.active_match;
            if (!targetMatch?.id) return;
            const currentLabel = targetMatch.room_label || '';
            const currentUrl = targetMatch.room_url || '';
            const roomLabel = window.prompt('Room label / board name', currentLabel);
            if (roomLabel === null) return;
            const roomUrl = window.prompt('Room URL (optional)', currentUrl);
            if (roomUrl === null) return;
            await callFunction('updateTournamentMatchRoom', {
                tournament_id: tournamentId,
                match_id: targetMatch.id,
                room_label: roomLabel,
                room_url: roomUrl,
                stream_url: roomUrl
            });
            await loadTournamentRuntime();
        };
