        window.checkInTournamentParticipant = async function(registrationId, playerId) {
            await callFunction('setTournamentPlayerCheckIn', {
                tournament_id: tournamentId,
                registration_id: registrationId || null,
                player_id: playerId || null,
                checked_in: true
            });
            await loadTournamentRuntime();
        };

        window.setTournamentParticipantAvailability = async function(registrationId, playerId, runtimeStatus) {
            await callFunction('setTournamentParticipantAvailability', {
                tournament_id: tournamentId,
                registration_id: registrationId || null,
                player_id: playerId || null,
                runtime_status: runtimeStatus
            });
            await loadTournamentRuntime();
        };

        window.setTournamentRoomLifecycle = async function(lifecycleAction, matchIdOverride = null) {
            const matchId = matchIdOverride || tournamentRuntime?.active_match?.id;
            if (!matchId) return;
            await callFunction('setTournamentMatchRoomLifecycle', {
                tournament_id: tournamentId,
                match_id: matchId,
                lifecycle_action: lifecycleAction
            });
            await loadTournamentRuntime();
        };

        window.sendTournamentRuntimeReminder = async function(matchId) {
            if (!matchId) return;
            await callFunction('sendTournamentRuntimeReminder', {
                tournament_id: tournamentId,
                match_id: matchId
            });
            await loadTournamentRuntime();
        };

        window.respondToTournamentResult = async function(action, matchIdOverride = null) {
            const matchId = matchIdOverride || tournamentRuntime?.active_match?.id;
            if (!matchId) return;
            let notes = '';
            if (action === 'dispute' || action === 'resolve') {
                notes = window.prompt(action === 'dispute' ? 'What is wrong with the recorded result?' : 'Resolution notes', '') || '';
            }
            await callFunction('respondTournamentMatchResult', {
                tournament_id: tournamentId,
                match_id: matchId,
                action,
                notes
            });
            await loadTournamentRuntime();
        };

        function isEventClickable() {
            const effectiveStatus = getEffectiveTournamentStatus();
            return effectiveStatus === 'Live' || effectiveStatus === 'Completed';
        }

        function renderEventCard(event) {
            const regs = registrations[event.id] || [];
            const count = regs.length
                || event.registered_count
                || event.player_count
                || 0;
            const eventType = getEventType(event.name || event.event_name);
            const clickable = isEventClickable();
            const eventUrl = `/pages/event-view.html?tournament_id=${tournamentId}&event_id=${event.id}`;
            const bracketLabel = humanizeTournamentFormat(event.bracket_type || event.format || tournamentData?.format || '');
            const legsLabel = event.num_legs || event.best_of || event.legs_to_win || 3;
            const gameLabel = humanizeTournamentFormat(event.game || event.game_type || tournamentData?.game_type || '501');
            const feeLabel = event.entry_fee ? '$' + parseFloat(event.entry_fee).toFixed(2) : 'FREE';
            const effectiveStatus = getEffectiveTournamentStatus();
            const eventActionLabel = effectiveStatus === 'Completed'
                ? 'VIEW RESULTS'
                : (clickable ? 'OPEN EVENT' : 'REGISTRATION');
            const eventActionHelp = effectiveStatus === 'Completed'
                ? 'Bracket, results, and placements'
                : (clickable ? 'Bracket and player details' : 'Tap register above');

            const tag = clickable ? 'a' : 'div';
            const linkAttr = clickable ? `href="${eventUrl}"` : '';

            return `
                <${tag} class="event-card" ${linkAttr} ${clickable ? 'style="cursor: pointer;"' : ''}>
                    <div class="event-header ${eventType}">
                        <div class="event-name">${event.name || event.event_name}</div>
                        <div class="event-fee">${feeLabel}</div>
                        <div class="event-summary-row">
                            <span class="event-pill">${gameLabel}</span>
                            <span class="event-pill">${bracketLabel || 'Single Elimination'}</span>
                        </div>
                    </div>
                    <div class="event-body">
                        <div class="event-details-grid">
                            <div class="event-detail-block">
                                <span class="event-detail-label">Game</span>
                                <span class="event-detail-value">${gameLabel}</span>
                            </div>
                            <div class="event-detail-block">
                                <span class="event-detail-label">Bracket</span>
                                <span class="event-detail-value">${bracketLabel || 'Single Elimination'}</span>
                            </div>
                            <div class="event-detail-block">
                                <span class="event-detail-label">Leg Structure</span>
                                <span class="event-detail-value">Best of ${legsLabel}</span>
                            </div>
                            <div class="event-detail-block">
                                <span class="event-detail-label">Entry</span>
                                <span class="event-detail-value">${event.entry_type || 'individual'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="event-signups">
                        <div>
                            <div class="event-signups-count">${count}</div>
                            <div class="event-signups-label">SIGNED UP</div>
                        </div>
                        <div class="event-cta-copy">
                            <div class="event-signups-label">${eventActionLabel}</div>
                            <div class="event-open-label">${eventActionHelp}</div>
                        </div>
                    </div>
                </${tag}>
            `;
        }

        function humanizeTournamentFormat(format) {
            const value = String(format || '').replace(/_/g, ' ').replace(/-/g, ' ').trim();
            if (!value) return '';
            return value.replace(/\b\w/g, ch => ch.toUpperCase());
        }

        function humanizeTournamentStatus(status) {
            const value = String(status || '').replace(/_/g, ' ').trim().toLowerCase();
            if (!value) return 'Created';
            return value.replace(/\b\w/g, ch => ch.toUpperCase());
        }

        function getEventType(name) {
            const lower = (name || '').toLowerCase();
            if (lower.includes('single')) return 'singles';
            if (lower.includes('double')) return 'doubles';
            if (lower.includes('triple') || lower.includes('team')) return 'triples';
            return 'other';
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'TBD';
            return new Date(dateStr).toLocaleDateString('en-US', {
                weekday: 'long',
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });
        }

        window.openModal = function() {
            selectedEvents.clear();
            renderRegistrationForm();
            document.getElementById('registerModal').classList.add('active');
        };

        window.closeModal = function() {
            document.getElementById('registerModal').classList.remove('active');
        };

        function renderRegistrationForm() {
            const html = `
                <div class="pin-section">
                    <div class="pin-section-title">REGISTRATION MODE</div>
                    <div class="pin-row">
                        <button type="button" id="registerSelfBtn" class="pin-btn selected" onclick="setRegistrationMode('self')">REGISTER MYSELF</button>
                        <button type="button" id="registerOtherBtn" class="pin-btn" onclick="setRegistrationMode('other')">REGISTER SOMEONE ELSE</button>
                    </div>
                    <div id="registrationAuthNotice" style="color: var(--text-dim); font-size: 14px; margin-top: 10px;">Using your signed-in account for autofill.</div>
                </div>

                <form id="registrationForm" onsubmit="submitRegistration(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name <span>*</span></label>
                        <input type="text" id="regName" name="full_name" class="form-input" required placeholder="John Smith">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email <span>*</span></label>
                        <input type="email" id="regEmail" name="email" class="form-input" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone <span>*</span></label>
                        <input type="tel" id="regPhone" name="phone" class="form-input" required placeholder="555-123-4567">
                    </div>

                    <!-- Event Selection -->
                    <div class="events-selection">
                        <div class="events-selection-header">SELECT EVENTS</div>
                        ${events.map(event => `
                            <label class="event-option" data-event-id="${event.id}" tabindex="0" role="checkbox" aria-checked="false" onclick="toggleEvent('${event.id}', this, event)" onkeydown="handleEventOptionKeydown('${event.id}', this, event)">
                                <input type="checkbox" name="events" value="${event.id}" onclick="event.stopPropagation()">
                                <div class="event-option-info">
                                    <div class="event-option-name">${event.name || event.event_name}</div>
                                    <div class="event-option-desc">${event.format || '501'} - ${event.bracket_type || 'Double Elim'}</div>
                                </div>
                                <div class="event-option-fee">${event.entry_fee ? '$' + parseFloat(event.entry_fee).toFixed(2) : 'FREE'}</div>
                            </label>
                        `).join('')}
                    </div>

                    <div class="total-display">
                        <span class="total-label">TOTAL</span>
                        <span class="total-amount" id="totalAmount">$0.00</span>
                    </div>

                    <label class="checkbox-group">
                        <input type="checkbox" name="sms_opt_in" checked>
                        <span>Send me SMS updates</span>
                    </label>

                    <div id="paymentSection" style="display: none;">
                        <div style="font-family: 'Bebas Neue', cursive; font-size: 18px; margin-bottom: 15px;">PAYMENT METHOD</div>
                        <label class="payment-option selected" onclick="selectPayment(this, 'paypal')">
                            <input type="radio" name="payment_method" value="paypal" checked>
                            <div>
                                <div class="payment-label">Pay Now (PayPal)</div>
                                <div class="payment-desc">Secure payment, instant confirmation</div>
                            </div>
                        </label>
                        <label class="payment-option" onclick="selectPayment(this, 'later')">
                            <input type="radio" name="payment_method" value="later">
                            <div>
                                <div class="payment-label">Pay Later</div>
                                <div class="payment-desc">Reserve your spot, pay before event</div>
                            </div>
                        </label>
                        <label class="payment-option" onclick="selectPayment(this, 'event')">
                            <input type="radio" name="payment_method" value="event">
                            <div>
                                <div class="payment-label">Pay at Event</div>
                                <div class="payment-desc">Cash or card at check-in</div>
                            </div>
                        </label>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">SELECT EVENTS TO CONTINUE</button>
                </form>
            `;

            document.getElementById('modalBody').innerHTML = html;
            updateTotal();
            registrationMode = 'self';
            autofillRegistrationForm(true);
        }

        window.toggleEvent = function(eventId, element, domEvent = null) {
            if (domEvent) {
                domEvent.preventDefault();
                domEvent.stopPropagation();
            }
            const checkbox = element.querySelector('input');
            checkbox.checked = !checkbox.checked;

            if (checkbox.checked) {
                selectedEvents.add(eventId);
                element.classList.add('selected');
                element.setAttribute('aria-checked', 'true');
            } else {
                selectedEvents.delete(eventId);
                element.classList.remove('selected');
                element.setAttribute('aria-checked', 'false');
            }

            updateTotal();
        };

        window.handleEventOptionKeydown = function(eventId, element, domEvent) {
            if (domEvent.key === ' ' || domEvent.key === 'Enter') {
                toggleEvent(eventId, element, domEvent);
            }
        };

        function updateTotal() {
            let total = 0;
            selectedEvents.forEach(eventId => {
                const event = events.find(e => e.id === eventId);
                if (event && event.entry_fee) {
                    total += parseFloat(event.entry_fee);
                }
            });

            document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
            document.getElementById('paymentSection').style.display = total > 0 ? 'block' : 'none';

            const btn = document.getElementById('submitBtn');
            if (selectedEvents.size === 0) {
                btn.textContent = 'SELECT EVENTS TO CONTINUE';
                btn.disabled = true;
            } else {
                btn.textContent = total > 0 ? 'REGISTER ($' + total.toFixed(2) + ')' : 'REGISTER';
                btn.disabled = false;
            }
        }

        window.selectPayment = function(el, method) {
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
            el.querySelector('input').checked = true;
        };

        window.submitRegistration = async function(e) {
            e.preventDefault();

            if (selectedEvents.size === 0) {
                toastWarning('Please select at least one event');
                return;
            }

            const form = e.target;
            const formData = new FormData(form);
            const btn = document.getElementById('submitBtn');

            let total = 0;
            selectedEvents.forEach(eventId => {
                const event = events.find(e => e.id === eventId);
                if (event && event.entry_fee) total += parseFloat(event.entry_fee);
            });

            const paymentMethod = total > 0 ? (formData.get('payment_method') || 'event') : 'free';

            btn.disabled = true;
            btn.textContent = 'REGISTERING...';

            try {
                const result = await callFunction('registerForTournament', {
                    tournament_id: tournamentId,
                    full_name: formData.get('full_name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    event_ids: Array.from(selectedEvents),
                    sms_opt_in: formData.get('sms_opt_in') ? true : false,
                    payment_method: paymentMethod,
                    total_amount: total,
                });

                if (!result.success) {
                    throw new Error(result.error || 'Registration failed');
                }

                if (paymentMethod === 'paypal' && result.paypal_url) {
                    window.location.href = result.paypal_url;
                    return;
                }

                showSuccess(result);

            } catch (error) {
                toastError('Error: ' + error.message);
                btn.disabled = false;
                updateTotal();
            }
        };

        function showSuccess(result) {
            const html = `
                <div class="success-content">
                    <div class="success-icon">🎉</div>
                    <div class="success-title">YOU'RE REGISTERED!</div>
                    <div class="success-message">
                        You've been registered for ${selectedEvents.size} event(s).
                        ${result.payment_status === 'pending' ? 'Please complete payment before the event.' : 'Check your email for confirmation details.'}
                    </div>
                    <button class="submit-btn" onclick="closeModal(); location.reload();">DONE</button>
                </div>
            `;

            document.getElementById('modalBody').innerHTML = html;
        }

        function showError(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="error-message">
                    <strong>Error</strong><br>${message}
                </div>
            `;
        }
    </script>
    <script src="/js/nav-menu.js"></script>
<script src="/components/brdc-navigation-init.js?v=14"></script>
<script>initBRDCNavigation({ page: 'tournament-view' });</script>
<script src="/js/brdc-share.js"></script>
</body>
</html>
