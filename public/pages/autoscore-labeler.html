<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BRDC Auto-Score — Tablet Labeler</title>
<style>
  :root { --pink:#FF469A; --cyan:#19E3FF; --gold:#FDD835; --ink:#0f1320; }
  body { margin:0; background:var(--ink); color:#e8eefc; font:14px/1.45 system-ui,sans-serif; }
  header { padding:10px 16px; background:#141a2c; border-bottom:1px solid #243; display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:15px; margin:0; color:var(--cyan); }
  .stat { background:#0a0d18; border:1px solid #243; border-radius:8px; padding:4px 10px; }
  .stat b { color:var(--gold); }
  #live { color:#8fa0c8; } #live.on { color:#38e08f; }
  main { display:flex; gap:14px; padding:14px; flex-wrap:wrap; }
  .stagewrap { position:relative; }
  canvas { background:#000; border-radius:10px; max-width:96vw; touch-action:none; cursor:crosshair;
           -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; } /* suppress iOS long-press callout */
  .panel { min-width:240px; max-width:340px; }
  button { background:#1b2236; color:#e8eefc; border:1px solid #2c3550; border-radius:8px; padding:11px 12px; font-weight:600; cursor:pointer; margin:3px 0; width:100%; }
  button.primary { background:var(--pink); border-color:var(--pink); color:#fff; }
  button.gold { background:var(--gold); border-color:var(--gold); color:#222; }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .hint { font-size:12px; color:#8fa0c8; margin:8px 0; }
  .legend span { display:inline-block; margin-right:10px; font-size:12px; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; vertical-align:middle; margin-right:4px; }
  #log { font-family:ui-monospace,monospace; font-size:11px; color:#9fb0d0; background:#0a0d18; border:1px solid #243; border-radius:8px; padding:8px; margin-top:8px; max-height:160px; overflow:auto; white-space:pre-wrap; }
  label.split { font-size:12px; color:#8fa0c8; display:flex; gap:6px; align-items:center; margin:6px 0; }
</style>
</head>
<body>
<header>
  <h1>🎯 Tablet Labeler</h1>
  <div class="stat" id="live">○ waiting for phone</div>
  <div class="stat">train: <b id="nTrain">0</b></div>
  <div class="stat">val: <b id="nVal">0</b></div>
  <div class="stat">darts: <b id="nDarts">0</b></div>
</header>
<main>
  <div class="stagewrap">
    <canvas id="stage" width="1280" height="720"></canvas>
  </div>
  <div class="panel">
    <button class="primary" id="btnCvCal" disabled>⚡ Auto-cal (CV)</button>
    <button class="gold" id="btnCal" disabled>Calibrate (tap 20)</button>
    <hr style="border-color:#243">
    <button class="primary" id="btnFreeze" disabled>Freeze frame</button>
    <div class="hint">On the frozen frame: <b>tap each dart tip</b> (a magnifier pops up — drag to nudge, lift to set). <b>Drag</b> any dot to fix. The cyan cal dots are draggable too.</div>
    <button id="btnUndo" disabled>↶ Undo last dart</button>
    <label class="split"><input type="checkbox" id="valSplit"> save next to <b>val</b> set (hold out ~20%)</label>
    <button class="primary" id="btnSave" disabled>Save sample → dataset</button>
    <button id="btnResume" disabled>Resume live (discard frame)</button>
    <div class="legend" style="margin-top:10px">
      <span><i class="dot" style="background:#19E3FF"></i>cal pts (4)</span>
      <span><i class="dot" style="background:#FF469A"></i>darts</span>
    </div>
    <div id="log"></div>
  </div>
</main>

<script type="module">
import { autoCalibrate, calibrate, refineCalibration, applyHomography, scoreFromImagePoint }
  from '/js/autoscore-engine.js?v=7';
import { drawLoupe } from '/js/loupe.js?v=1';

const $ = id => document.getElementById(id);
const stage = $('stage'), ctx = stage.getContext('2d', { willReadFrequently:true });
const CAL_CLASSES = ['cal_top','cal_right','cal_bottom','cal_left']; // class idx 0..3; dart = 4

let cal=null, calPoints=[], darts=[];
let frozen=false, awaitingAnchor=false, freezeImg=null;
let drag=null;    // {type:'cal'|'dart', idx}
let loupe=null;   // {x,y,type} while a point is being placed/dragged

// ── Streamed frame source (replaces the local camera) ──
const frame = new Image();
let frameReady=false, gotDims=false, lastRx=0;
frame.onload = () => {
  frameReady = true; lastRx = Date.now();
  if(!gotDims){ stage.width=frame.naturalWidth||1280; stage.height=frame.naturalHeight||720; gotDims=true;
    $('btnCvCal').disabled=false; $('btnCal').disabled=false; $('btnFreeze').disabled=false;
    log(`receiving ${stage.width}×${stage.height} from phone`); }
};
async function pollFrame(){
  try{ const t = await fetch('/stream-latest',{cache:'no-store'}).then(r=>r.text());
    if(t && t.startsWith('data:')) frame.src = t; }catch{}
  const fresh = Date.now()-lastRx < 2000;
  $('live').textContent = (frameReady&&fresh) ? '● live' : '○ waiting for phone';
  $('live').className = (frameReady&&fresh) ? 'on' : '';
}
setInterval(pollFrame, 300);

const log=(m)=>{ const t=new Date().toLocaleTimeString(); $('log').textContent=`${t}  ${m}\n`+$('log').textContent; };
async function refreshStats(){ try{ const s=await fetch('/capture/stats').then(r=>r.json()); $('nTrain').textContent=s.train; $('nVal').textContent=s.val; }catch{} }
refreshStats(); setInterval(refreshStats, 5000);

function frameData(){
  const c=document.createElement('canvas'); c.width=stage.width; c.height=stage.height;
  const cx=c.getContext('2d',{willReadFrequently:true}); cx.drawImage(frame,0,0,c.width,c.height);
  return cx.getImageData(0,0,c.width,c.height);
}

// ── Calibration ──
$('btnCal').addEventListener('click',()=>{ awaitingAnchor=true; log('tap once inside the 20 wedge'); });
function runAutoCal(anchor){
  awaitingAnchor=false;
  try{
    const fr=frameData();
    const a=autoCalibrate(fr.data,fr.width,fr.height,anchor);
    let res=a; try{ res=refineCalibration(fr.data,fr.width,fr.height,a.calPoints,{regWeight:0.04}); }catch{}
    cal={H:res.H,inverse:res.inverse}; calPoints=res.calPoints.map(p=>({x:p.x,y:p.y}));
    log(`calibrated ✔ (residual ${(a.residualMm).toFixed(1)}mm) — Freeze, then label`); draw();
  }catch(e){ log('auto-cal failed: '+e.message+' — re-tap the 20'); awaitingAnchor=true; }
}
$('btnCvCal').addEventListener('click', async ()=>{
  awaitingAnchor=false; log('⚡ CV calibrating from board rings…');
  try{
    const fr=frameData();
    const c=document.createElement('canvas'); c.width=fr.width; c.height=fr.height;
    c.getContext('2d').putImageData(fr,0,0);
    const r=await fetch('/calibrate',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({image:c.toDataURL('image/jpeg',0.92)})}).then(x=>x.json());
    if(!r.ok){ log('CV-cal failed: '+r.error+' — use tap-20'); return; }
    calPoints=[r.cal.top,r.cal.right,r.cal.bottom,r.cal.left].map(p=>({x:p[0],y:p[1]}));
    cal=calibrate(calPoints);
    try{ const ref=refineCalibration(fr.data,fr.width,fr.height,calPoints,{regWeight:0.04});
         cal={H:ref.H,inverse:ref.inverse}; calPoints=ref.calPoints.map(p=>({x:p.x,y:p.y})); }catch{}
    log(`⚡ CV-cal ✔ bull (${r.bull[0]},${r.bull[1]}) — Freeze, then label`); draw();
  }catch(e){ log('CV-cal error: '+e.message); }
});

// ── Freeze the current streamed frame ──
$('btnFreeze').addEventListener('click',()=>{
  if(!frameReady){ log('no frame from the phone yet'); return; }
  frozen=true;
  ctx.drawImage(frame,0,0,stage.width,stage.height);
  freezeImg=(()=>{ const c=document.createElement('canvas');c.width=stage.width;c.height=stage.height;c.getContext('2d').drawImage(frame,0,0,c.width,c.height);return c; })();
  $('btnSave').disabled=false; $('btnResume').disabled=false;
  draw();
  log(`frozen — tap each dart tip (magnifier helps), then Save.`);
});
$('btnResume').addEventListener('click',()=>{ frozen=false; freezeImg=null; darts=[]; $('nDarts').textContent=0; $('btnSave').disabled=true; $('btnResume').disabled=true; $('btnUndo').disabled=true; });
$('btnUndo').addEventListener('click',()=>{ if(darts.length){ darts.pop(); $('nDarts').textContent=darts.length; $('btnUndo').disabled=darts.length===0; draw(); } });

// ── Save sample ──
$('btnSave').addEventListener('click',async ()=>{
  if(!freezeImg||calPoints.length!==4){ log('need calibration + a frozen frame'); return; }
  const W=stage.width,H=stage.height;
  const box=Math.max(16,Math.round(W*0.02));
  const bw=(box/W).toFixed(6), bh=(box/H).toFixed(6);
  const lines=[];
  calPoints.forEach((p,i)=> lines.push(`${i} ${(p.x/W).toFixed(6)} ${(p.y/H).toFixed(6)} ${bw} ${bh}`));
  darts.forEach(p=> lines.push(`4 ${(p.x/W).toFixed(6)} ${(p.y/H).toFixed(6)} ${bw} ${bh}`));
  const id=`brdc_${Date.now()}_${Math.floor((performance.now()%1)*1e6)}`;
  const image=freezeImg.toDataURL('image/jpeg',0.92);
  const split=$('valSplit').checked?'val':'train';
  try{
    const r=await fetch('/capture',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id,image,label:lines.join('\n')+'\n',split})}).then(r=>r.json());
    log(`saved ${split} #${r.count}: 4 cal + ${darts.length} darts`);
    refreshStats();
    darts=[]; frozen=false; freezeImg=null; $('nDarts').textContent=0; $('btnSave').disabled=true; $('btnResume').disabled=true; $('btnUndo').disabled=true; // keep calibration; resume live
  }catch(e){ log('save failed: '+e.message); }
});

// ── Interaction (place/drag dots with the magnifier loupe) ──
function evtPt(e){ const r=stage.getBoundingClientRect(); return { x:(e.clientX-r.left)*(stage.width/r.width), y:(e.clientY-r.top)*(stage.height/r.height) }; }
function liveScale(){ const r=stage.getBoundingClientRect(); return stage.width/r.width; }
function hit(pt){
  for(let i=0;i<calPoints.length;i++) if(Math.hypot(calPoints[i].x-pt.x,calPoints[i].y-pt.y)<18) return {type:'cal',idx:i};
  for(let i=0;i<darts.length;i++) if(Math.hypot(darts[i].x-pt.x,darts[i].y-pt.y)<18) return {type:'dart',idx:i};
  return null;
}
function endDrag(e){ if(drag&&e){ try{ stage.releasePointerCapture(e.pointerId); }catch{} } drag=null; loupe=null; draw(); }
stage.addEventListener('pointerdown',e=>{
  if(awaitingAnchor){ runAutoCal(evtPt(e)); return; }
  const pt=evtPt(e); const h=hit(pt);
  if(h){ drag=h; }
  else if(frozen){ darts.push(pt); drag={type:'dart',idx:darts.length-1}; $('nDarts').textContent=darts.length; $('btnUndo').disabled=false; }
  if(drag){ try{ stage.setPointerCapture(e.pointerId); }catch{} const p=drag.type==='cal'?calPoints[drag.idx]:darts[drag.idx]; loupe={x:p.x,y:p.y,type:drag.type}; }
  draw();
});
stage.addEventListener('pointermove',e=>{ if(!drag)return;
  const raw=evtPt(e);
  const pt={ x:Math.min(Math.max(raw.x,0),stage.width), y:Math.min(Math.max(raw.y,0),stage.height) };
  if(drag.type==='cal') calPoints[drag.idx]=pt; else darts[drag.idx]=pt;
  loupe={x:pt.x,y:pt.y,type:drag.type}; draw(); });
window.addEventListener('pointerup',e=>{ if(drag) endDrag(e); });               // commit on lift-off
stage.addEventListener('pointercancel',e=>{ if(drag) endDrag(e); });
stage.addEventListener('contextmenu',e=>{ e.preventDefault(); const h=hit(evtPt(e));
  if(h&&h.type==='dart'){ darts.splice(h.idx,1); $('nDarts').textContent=darts.length; $('btnUndo').disabled=darts.length===0; draw(); } });

// ── Draw ──
function loop(){ if(!frozen && frameReady){ ctx.drawImage(frame,0,0,stage.width,stage.height); draw(false); } requestAnimationFrame(loop); }
requestAnimationFrame(loop);
function draw(redrawBase=true){
  if(frozen&&freezeImg&&redrawBase) ctx.drawImage(freezeImg,0,0);
  if(cal){
    const rings=[170,162,107,99,15.9];
    for(const r of rings){ ctx.beginPath();
      for(let a=0;a<=360;a+=4){ const rad=a*Math.PI/180; const p=applyHomography(cal.inverse,{x:r*Math.sin(rad),y:-r*Math.cos(rad)}); a===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y); }
      ctx.lineWidth=2.5; ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.stroke(); ctx.lineWidth=1; ctx.strokeStyle='rgba(25,227,255,.5)'; ctx.stroke(); }
  }
  calPoints.forEach((p,i)=>{ ctx.beginPath(); ctx.arc(p.x,p.y,8,0,7); ctx.fillStyle='#19E3FF'; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#000'; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='bold 11px sans-serif'; ctx.fillText(CAL_CLASSES[i].slice(4),p.x+10,p.y+4); });
  darts.forEach((p,i)=>{ ctx.beginPath(); ctx.arc(p.x,p.y,7,0,7); ctx.fillStyle='#FF469A'; ctx.fill(); ctx.lineWidth=2; ctx.strokeStyle='#000'; ctx.stroke();
    if(cal){ const s=scoreFromImagePoint(cal.H,p); ctx.fillStyle='#FDD835'; ctx.font='bold 13px sans-serif'; ctx.fillText(s.label,p.x+9,p.y-8); } });
  // magnifier loupe LAST. Drawn only on the visible ctx — saves read freezeImg, never ctx.
  if(loupe){ const source=frozen?freezeImg:frame;
    if(source) drawLoupe(ctx,source,loupe,liveScale(),{color:loupe.type==='cal'?'#19E3FF':'#FF469A',srcCanvasW:stage.width,srcCanvasH:stage.height}); }
}
</script>
</body>
</html>
