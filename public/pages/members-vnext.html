<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members VNext - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
</head>
<body class="vnext-light-page members-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="membersStatus">Loading members...</p>
                <h1>Members</h1>
                <p>League players and fill-ins in one clean directory.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" href="/pages/triples-vnext.html">Triples league</a>
                <a class="ves-action" href="/pages/messages-vnext.html">Messages</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Member summary">
            <article><span id="memberCount">-</span><strong>Members</strong><em>Roster players plus fill-ins.</em></article>
            <article><span id="playerCount">-</span><strong>League players</strong><em>Assigned to active teams.</em></article>
            <article><span id="fillinCount">-</span><strong>Fill-ins</strong><em>Available substitutes.</em></article>
        </section>

        <section class="ves-member-toolbar" aria-label="Member filters">
            <input id="memberSearch" type="search" placeholder="Search players, teams, levels..." autocomplete="off">
            <div class="ves-filters compact" id="memberFilters">
                <button class="active" type="button" data-member-filter="all">All</button>
                <button type="button" data-member-filter="A">A</button>
                <button type="button" data-member-filter="B">B</button>
                <button type="button" data-member-filter="C">C</button>
                <button type="button" data-member-filter="F">Fill-ins</button>
            </div>
        </section>

        <section class="ves-grid members" id="memberGrid">
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
        </section>
    </main>

    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/members-vnext.js?v=1"></script>
    <script>
        initBRDCNavigation({ page: 'members', pageTitle: 'Members', showBreadcrumbs: false, showBackButton: true });
    </script>
</body>
</html>
