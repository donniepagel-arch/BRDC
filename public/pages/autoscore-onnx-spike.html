<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto-Score ONNX Runtime Spike</title>
<style>
  body { margin:0; background:#0f1320; color:#e8eefc; font:14px/1.5 system-ui,sans-serif; padding:20px; }
  h1 { font-size:18px; color:#3DEFFF; }
  .row { margin:6px 0; }
  .k { color:#8fa0c8; display:inline-block; min-width:180px; }
  .v { color:#FDD835; font-weight:600; }
  .ok { color:#5be38a; } .err { color:#ff6b8a; }
  #log { margin-top:16px; background:#0a0d18; border:1px solid #223; border-radius:8px; padding:12px; white-space:pre-wrap; font-family:ui-monospace,monospace; font-size:12px; max-height:50vh; overflow:auto; }
  button { background:#FF469A; color:#fff; border:0; border-radius:8px; padding:10px 18px; font-weight:700; cursor:pointer; }
</style>
</head>
<body>
<h1>🎯 Auto-Score — ONNX Runtime Web spike</h1>
<p>Proves a vision model runs <b>in the browser</b> (WebGPU→WASM), measures load + inference latency.
This de-risks Option B's deploy path before any training.</p>
<button id="run">Run spike</button>
<div id="results"></div>
<div id="log"></div>

<script type="module">
const logEl = document.getElementById('log');
const resEl = document.getElementById('results');
const log = (m, cls='') => { const t = new Date().toLocaleTimeString(); logEl.textContent += `\n${t}  ${m}`; logEl.scrollTop = logEl.scrollHeight; if (cls) console.log(m); };
const row = (k, v, cls='') => { resEl.innerHTML += `<div class="row"><span class="k">${k}</span><span class="v ${cls}">${v}</span></div>`; };

const ORT_VER = '1.20.1';
const ORT_BASE = `https://cdn.jsdelivr.net/npm/onnxruntime-web@${ORT_VER}/dist/`;
// MobileNetV2 (14MB) — a realistic vision-model size class, same as the dart
// keypoint model will be. Served SAME-ORIGIN from local disk (no CORS).
const MODEL_URL = '/models/spike/mobilenetv2-12.onnx';
const MODEL_INPUT_DIMS = [1, 3, 224, 224];

document.getElementById('run').addEventListener('click', async () => {
  resEl.innerHTML = ''; logEl.textContent = '';
  row('WebGPU in this browser', 'navigator.gpu' in window ? ('gpu' in navigator ? 'yes' : 'no') : (navigator.gpu ? 'yes' : 'no'),
      navigator.gpu ? 'ok' : 'err');
  try {
    log('importing onnxruntime-web (webgpu build) from CDN…');
    const ort = await import(ORT_BASE + 'ort.webgpu.min.mjs');
    ort.env.wasm.wasmPaths = ORT_BASE;
    ort.env.wasm.numThreads = 1; // spike: keep it simple/cross-origin-isolation-free
    log('ort-web loaded, version ' + (ort.env.versions?.common || ORT_VER));

    log('fetching model (same-origin)…');
    const buf = await fetch(MODEL_URL).then(r => { if(!r.ok) throw new Error('model HTTP '+r.status); return r.arrayBuffer(); });
    log('model bytes: ' + buf.byteLength.toLocaleString());

    let backend = 'webgpu', session;
    const tLoad0 = performance.now();
    try {
      session = await ort.InferenceSession.create(buf, { executionProviders: ['webgpu'] });
    } catch (e) {
      log('webgpu EP failed (' + e.message + ') → falling back to wasm', 'err');
      backend = 'wasm';
      session = await ort.InferenceSession.create(buf, { executionProviders: ['wasm'] });
    }
    const loadMs = performance.now() - tLoad0;
    row('Backend (execution provider)', backend, backend==='webgpu'?'ok':'');
    row('Model load time', loadMs.toFixed(0) + ' ms');
    log('input names: ' + session.inputNames + ' | output names: ' + session.outputNames);

    const elems = MODEL_INPUT_DIMS.reduce((a,b)=>a*b,1);
    const input = new ort.Tensor('float32', new Float32Array(elems).fill(0.1), MODEL_INPUT_DIMS);
    const feeds = { [session.inputNames[0]]: input };

    // warm-up + timed runs
    await session.run(feeds);
    const N = 20, times = [];
    for (let i = 0; i < N; i++) {
      const s = performance.now();
      const out = await session.run(feeds);
      times.push(performance.now() - s);
      if (i === 0) { const o = out[session.outputNames[0]]; log('output shape: [' + o.dims + ']'); }
    }
    times.sort((a,b)=>a-b);
    const median = times[N>>1], min = times[0], max = times[N-1];
    row('Inference latency (median)', median.toFixed(2) + ' ms', median < 60 ? 'ok' : 'err');
    row('Inference latency (min/max)', `${min.toFixed(2)} / ${max.toFixed(2)} ms`);
    row('Throughput', (1000/median).toFixed(0) + ' fps');
    log('SPIKE OK ✔  in-browser ONNX inference works on this machine.');
    row('VERDICT', 'in-browser ONNX inference WORKS', 'ok');
    // expose for the test harness
    window.__spikeResult = { backend, loadMs, median, min, max, fps: 1000/median, modelBytes: buf.byteLength };
  } catch (e) {
    log('SPIKE FAILED: ' + (e.stack || e.message), 'err');
    row('VERDICT', 'FAILED: ' + e.message, 'err');
    window.__spikeResult = { error: String(e.message || e) };
  }
});
</script>
</body>
</html>
