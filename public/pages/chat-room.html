<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF469A">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <script src="/js/brdc-toast.js"></script>
    <link rel="stylesheet" href="/css/messaging.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: linear-gradient(135deg, var(--bg-dark, #1a1a2e) 0%, #0f0f23 100%);
            color: var(--text-primary, #f0f0f0);
        }

        /* ========== DISCORD-STYLE 3-COLUMN LAYOUT ========== */
        .chat-app {
            display: flex;
            height: 100vh;
            height: 100dvh;
            width: 100%;
        }

        /* LEFT SIDEBAR - Channel List (mobile-first: drawer) */
        .left-sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 85vw;
            z-index: 700;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
            background: rgba(15, 15, 35, 0.98);
            display: flex;
            flex-direction: column;
        }
        .left-sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 2px solid var(--pink, #FF469A);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(22, 33, 62, 0.8);
        }

        .sidebar-logo {
            width: 40px;
            height: 40px;
        }

        .sidebar-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            letter-spacing: 3px;
            color: var(--pink, #FF469A);
        }

        .sidebar-search {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(145, 215, 235, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--teal, #91D7EB);
        }

        .search-input::placeholder {
            color: var(--text-dim, #8a8aa3);
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .channel-category {
            margin-bottom: 4px;
        }

        .channel-category.collapsed .channel-items {
            display: none;
        }

        .sidebar-footer {
            padding: 12px 16px;
            border-top: 1px solid rgba(145, 215, 235, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(22, 33, 62, 0.5);
        }

        .user-avatar-small {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: white;
            position: relative;
        }

        .user-avatar-small .online-dot,
        .user-avatar-small .offline-dot {
            width: 12px;
            height: 12px;
            bottom: 0;
            right: 0;
            border-color: rgba(15, 15, 35, 0.98);
        }

        .user-info-small {
            flex: 1;
            min-width: 0;
        }

        .user-name-small {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-status-small {
            font-size: 11px;
            color: #22c55e;
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        /* CENTER - Chat Area */
        .chat-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: rgba(26, 26, 46, 0.5);
        }

        .chat-header {
            height: 48px;
            background: rgba(30, 30, 60, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        }

        .chat-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1;
        }

        .chat-header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .header-action-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 6px;
            transition: background 0.15s;
            color: var(--text-dim);
        }
        .header-action-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
        }
        .header-action-btn.active {
            background: rgba(145, 215, 235, 0.2);
            color: var(--teal);
        }

        .header-channel-icon {
            font-size: 18px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .hamburger-btn {
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .hamburger-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .hamburger-btn span {
            display: block;
            width: 18px;
            height: 2px;
            background: var(--text-primary);
            border-radius: 1px;
            transition: all 0.2s;
        }

        .header-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-room-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.2;
        }

        .header-meta {
            font-size: 11px;
            color: var(--text-dim, #8a8aa3);
            line-height: 1;
        }

        /* Pinned Section */
        .pinned-section {
            background: linear-gradient(90deg, rgba(253, 216, 53, 0.15), rgba(253, 216, 53, 0.05));
            border-bottom: 1px solid rgba(253, 216, 53, 0.3);
            padding: 10px 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .pinned-section.visible { display: flex; }

        .pinned-icon {
            color: var(--yellow, #FDD835);
            font-size: 16px;
        }

        .pinned-content {
            flex: 1;
            min-width: 0;
        }

        .pinned-title {
            font-size: 11px;
            font-weight: 700;
            color: var(--yellow, #FDD835);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .pinned-message {
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pinned-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
        }

        /* Message List */
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        /* Typing Indicator */
        .typing-indicator-bar {
            padding: 8px 20px;
            background: rgba(145, 215, 235, 0.08);
            font-size: 13px;
            color: var(--teal);
            display: none;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgba(145, 215, 235, 0.1);
        }

        .typing-indicator-bar.visible { display: flex; }

        .typing-dots { display: flex; gap: 4px; }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--teal);
            border-radius: 50%;
            animation: typingPulse 1.4s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        /* Reply Preview (inside input area) */
        .reply-preview {
            display: none;
            padding: 8px 12px;
            background: rgba(145, 215, 235, 0.08);
            border-left: 3px solid var(--teal);
            border-radius: 0 6px 6px 0;
            margin-bottom: 8px;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .reply-preview.visible { display: flex; }

        .reply-preview-text {
            font-size: 12px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .reply-preview-close {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 18px;
            cursor: pointer;
            line-height: 1;
            padding: 0 2px;
            flex-shrink: 0;
        }
        .reply-preview-close:hover {
            color: var(--pink);
        }

        /* Input Area */
        .message-input-area {
            padding: 0 12px 12px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom, 0));
            background: rgba(22, 33, 62, 0.95);
            border-top: 1px solid rgba(145, 215, 235, 0.15);
            position: relative;
        }

        .message-input-area.archived {
            display: flex;
            justify-content: center;
            color: var(--text-dim);
            font-size: 14px;
            padding: 20px;
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            min-width: 0;
        }

        .input-action-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            transition: all 0.15s;
        }

        .input-action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
            min-width: 0;
        }

        .message-input {
            width: 100%;
            min-height: 44px;
            max-height: 150px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 22px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        .message-input:focus {
            border-color: var(--teal);
        }

        .message-input::placeholder {
            color: var(--text-dim);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--teal), #6bc0d4);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 2px 10px rgba(145, 215, 235, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, var(--pink), #d63384);
            box-shadow: 0 4px 15px rgba(255, 70, 154, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Mention Autocomplete */
        .mention-autocomplete {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: var(--bg-panel, #16213e);
            border: 2px solid var(--teal);
            border-radius: 12px 12px 0 0;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.4);
        }

        .mention-autocomplete.visible { display: block; }

        .mention-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .mention-item:hover, .mention-item.selected {
            background: rgba(145, 215, 235, 0.15);
        }

        .mention-item-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
        }

        .mention-item-info {
            flex: 1;
        }

        .mention-item-name {
            font-size: 14px;
            font-weight: 600;
        }

        .mention-item-role {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Emoji Picker - styles defined below after status dots */

        /* Online/Offline status dots (member avatars) */
        .online-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 10px;
            height: 10px;
            background: #3ba55c;
            border-radius: 50%;
            border: 2px solid rgba(15, 15, 35, 0.98);
        }
        .offline-dot {
            position: absolute;
            bottom: -1px;
            right: -1px;
            width: 10px;
            height: 10px;
            background: #747f8d;
            border-radius: 50%;
            border: 2px solid rgba(15, 15, 35, 0.98);
        }

        /* Role colors (Discord-style) */
        .role-admin { color: #e74c3c; }
        .role-director { color: var(--yellow, #FDD835); }
        .role-player { color: var(--text-light, #f0f0f0); }

        .role-badge-small {
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-left: 6px;
        }
        .role-badge-small.admin { background: rgba(231, 76, 60, 0.2); color: #e74c3c; }
        .role-badge-small.director { background: rgba(253, 216, 53, 0.2); color: var(--yellow); }

        /* Enhanced emoji picker */
        .emoji-picker-container {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            max-height: 300px;
            background: var(--bg-panel, #16213e);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px 12px 0 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 50;
            width: auto;
            padding: 0;
        }
        .emoji-picker-container.visible {
            display: flex;
        }

        .emoji-search {
            padding: 8px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .emoji-search input {
            width: 100%;
            padding: 8px 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: var(--text-light);
            font-size: 13px;
            outline: none;
        }
        .emoji-search input::placeholder {
            color: var(--text-dim);
        }

        .emoji-grid {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            max-height: 200px;
            -webkit-overflow-scrolling: touch;
        }

        .emoji-btn {
            width: 100%;
            aspect-ratio: 1;
            border: none;
            background: none;
            font-size: 22px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            transition: background 0.1s;
        }
        .emoji-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .emoji-categories {
            display: flex;
            border-top: 1px solid rgba(255,255,255,0.08);
            padding: 4px;
            gap: 2px;
        }
        .emoji-category-btn {
            flex: 1;
            padding: 6px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            opacity: 0.5;
            transition: all 0.15s;
        }
        .emoji-category-btn.active {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }
        .emoji-category-btn:hover {
            opacity: 0.8;
        }

        /* RIGHT SIDEBAR - Members (mobile-first: drawer) */
        .right-sidebar {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 260px;
            max-width: 85vw;
            z-index: 700;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -4px 0 20px rgba(0,0,0,0.5);
            background: rgba(15, 15, 35, 0.98);
            display: flex;
            flex-direction: column;
        }
        .right-sidebar.open {
            transform: translateX(0);
        }

        .members-header {
            padding: 16px;
            border-bottom: 1px solid rgba(145, 215, 235, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .members-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .members-count {
            font-size: 12px;
            color: var(--text-dim);
        }

        .members-close-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .members-close-btn:hover {
            color: var(--pink);
        }

        .members-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .members-group {
            margin-bottom: 16px;
        }

        .members-group-title {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 1px;
            padding: 8px 10px;
        }

        .member-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .member-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .member-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: white;
            position: relative;
            flex-shrink: 0;
        }

        /* status-dot replaced by .online-dot / .offline-dot */

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .member-role {
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(253, 216, 53, 0.2);
            color: var(--yellow);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .member-role.admin { background: rgba(255, 70, 154, 0.2); color: var(--pink); }
        .member-role.captain { background: rgba(145, 215, 235, 0.2); color: var(--teal); }

        /* Drawer Overlay */
        .chat-drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 600;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .chat-drawer-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        body.drawer-open {
            overflow: hidden;
        }

        /* Message Bubbles */
        .message-group {
            display: flex;
            gap: 12px;
            padding: 4px 0;
        }

        .message-group + .message-group {
            margin-top: 8px;
        }

        .message-group.same-sender {
            margin-top: 0;
        }

        .message-group.same-sender .message-avatar,
        .message-group.same-sender .message-sender,
        .message-group.same-sender .message-time-full {
            display: none;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--pink), var(--teal));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
            min-width: 0;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-sender {
            font-size: 14px;
            font-weight: 600;
            color: var(--pink);
        }
        .message-sender.role-admin { color: #e74c3c; }
        .message-sender.role-player { color: var(--pink); }

        .message-time-full {
            font-size: 11px;
            color: var(--text-dim);
        }

        .message-bubble {
            position: relative;
            max-width: 100%;
            padding: 8px 12px;
            border-radius: 8px;

                        if (session && session.pin) {
                            playerPin = session.pin.toUpperCase();
                            localStorage.setItem('brdc_player_pin', playerPin);
                        }
                    }
                } catch (e) {
                    console.warn('Session fallback failed:', e);
                }
            }

            if (!playerPin) {
                window.location.href = '/pages/messages.html';
                return;
            }

            // Start presence heartbeat
            if (window.brdcPresence) {
                window.brdcPresence.startPresenceHeartbeat('chat-room');
            }

            // Load rooms first
            await loadAllRooms();

            // If no room specified, select first available
            if (!roomId && Object.values(allRooms).flat().length > 0) {
                const firstRoom = Object.values(allRooms).flat()[0];
                roomId = firstRoom.id;
                history.replaceState(null, '', `?room=${roomId}`);
            }

            if (!roomId) {
                showEmptyState();
                return;
            }

            await loadChatRoom();

            // Setup input handlers
            setupInputHandlers();

            // Initialize emoji picker
            showEmojiCategory('smileys');

            // Initialize swipe gestures and long-press
            initSwipeGestures();
            initLongPress();
        });

        function setupInputHandlers() {
            const messageInput = document.getElementById('messageInput');

            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            messageInput.addEventListener('input', (e) => {
                autoResize(messageInput);
                handleTyping();
                handleMentionInput(e);
            });

            messageInput.addEventListener('keydown', (e) => {
                if (handleMentionKeydown(e)) {
                    e.preventDefault();
                }
            });

            // Close emoji picker on outside click
            document.addEventListener('click', (e) => {
                if (emojiPickerOpen && !e.target.closest('#emojiPicker') && !e.target.closest('.input-action-btn')) {
                    closeEmojiPicker();
                }
            });
        }

        function showEmptyState() {
            document.getElementById('loadingContainer').style.display = 'none';
            document.getElementById('chatApp').style.display = 'flex';
            document.getElementById('messageList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">&#128172;</div>
                    <div class="empty-state-title">NO CHAT ROOMS YET</div>
                    <div class="empty-state-text">Join a league or team to access chat channels.</div>
                </div>
            `;
            document.getElementById('inputArea').style.display = 'none';
        }

        // ========== ROOM LOADING ==========

        async function loadAllRooms() {
            try {
                const result = await callFunction('getPlayerChatRooms', { player_pin: playerPin });

                if (result.success) {
                    allRooms = result.rooms;
                    currentPlayerId = result.player_id;
                    currentPlayerName = result.player_name || 'Player';

                    // Update current user display
                    document.getElementById('currentUserName').textContent = currentPlayerName;
                    document.getElementById('currentUserInitials').textContent = getInitials(currentPlayerName);

                    renderChannelList();
                    setupRoomListener();
                }
            } catch (error) {
                console.error('Error loading rooms:', error);
            }
        }

        function setupRoomListener() {
            if (!currentPlayerId) return;

            const roomsRef = collection(db, 'chat_rooms');
            const q = query(roomsRef, where('participants', 'array-contains', currentPlayerId));

            unsubscribeRooms = onSnapshot(q, (snapshot) => {
                const rooms = { league: [], team: [], match: [], tournament: [], tournament_event: [] };

                snapshot.forEach(d => {
                    const data = d.data();
                    const roomItem = {
                        id: d.id,
                        name: data.name,
                        type: data.type,
                        unread_count: data.unread_count?.[currentPlayerId] || 0,
                        last_message: data.last_message,
                        status: data.status
                    };

                    if (data.type === 'league') rooms.league.push(roomItem);
                    else if (data.type === 'team') rooms.team.push(roomItem);
                    else if (data.type === 'match' && data.status === 'active') rooms.match.push(roomItem);
                    else if (data.type === 'tournament') rooms.tournament.push(roomItem);
                    else if (data.type === 'tournament_event') rooms.tournament_event.push(roomItem);
                });

                allRooms = rooms;
                renderChannelList();
            });
        }

        function renderChannelList() {
            const categoryIcon = {
                league: '&#127942;',
                team: '&#128101;',
                match: '&#127919;',
                tournament: '&#127941;',
                tournament_event: '&#128197;'
            };
            const categories = [
                { key: 'league', title: 'LEAGUES' },
                { key: 'team', title: 'TEAMS' },
                { key: 'match', title: 'ACTIVE MATCHES' },
                { key: 'tournament', title: 'TOURNAMENTS' }
            ];

            let html = '';

            categories.forEach(cat => {
                const rooms = [...(allRooms[cat.key] || [])];
                if (cat.key === 'tournament') {
                    rooms.push(...(allRooms.tournament_event || []));
                }

                if (rooms.length === 0) return;

                html += `
                    <div class="channel-category" data-category="${cat.key}">
                        <div class="channel-category-header" onclick="toggleCategory('${cat.key}')">
                            <span class="channel-category-arrow">&#9660;</span>
                            <span>${cat.title} &mdash; ${rooms.length}</span>
                        </div>
                        <div class="channel-items">
                            ${rooms.map(r => `
                                <div class="channel-item ${r.id === roomId ? 'active' : ''} ${r.unread_count > 0 ? 'unread' : ''}"
                                     onclick="switchRoom('${r.id}')" data-room-id="${r.id}">
                                    <span class="channel-icon">${categoryIcon[r.type] || '#'}</span>
                                    <span class="channel-name">${escapeHtml(r.name)}</span>
                                    ${r.unread_count > 0 ? `<span class="unread-badge">${r.unread_count}</span>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });

            const emptyHtml = '<div style="padding: 20px; text-align: center; color: var(--text-dim); font-size: 13px;">No channels yet</div>';

            document.getElementById('channelList').innerHTML = html || emptyHtml;

        window.toggleCategory = function(categoryKey) {
            document.querySelectorAll(`.channel-category[data-category="${categoryKey}"]`).forEach(el => {
                el.classList.toggle('collapsed');
            });
        };

        window.filterChannels = function(searchTerm) {
            const term = searchTerm.toLowerCase();
            document.querySelectorAll('.channel-item').forEach(item => {
                const name = item.querySelector('.channel-name').textContent.toLowerCase();
                item.style.display = name.includes(term) ? 'flex' : 'none';
            });
        };

        window.switchRoom = async function(newRoomId) {
            if (newRoomId === roomId) {
                closeAllDrawers();
                return;
            }
            if (isLoadingRoom) return;
            isLoadingRoom = true;

            // Cleanup old listeners
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeTyping) unsubscribeTyping();

            roomId = newRoomId;
            history.pushState(null, '', `?room=${roomId}`);
            closeAllDrawers();

            try {
                await loadChatRoom();
            } finally {
                isLoadingRoom = false;
            }
        };

        // ========== CHAT ROOM LOADING ==========

        async function loadChatRoom() {
            try {
                const result = await callFunction('getChatRoomMessages', {
                    room_id: roomId,
                    player_pin: playerPin,
                    limit: 50
                });

                if (result.success) {
                    roomData = result.room;

                    // Update header
                    document.getElementById('headerName').textContent = roomData.name;
                    document.getElementById('headerMemberCount').textContent = `${roomData.participant_count} members`;

                    // Update room icon in header
                    const iconEl = document.getElementById('roomIcon');
                    const iconMap = { league: '&#127942;', team: '&#128101;', match: '&#127919;', tournament: '&#127941;', tournament_event: '&#128197;' };
                    iconEl.innerHTML = iconMap[roomData.type] || '#';

                    // Update input placeholder with room name
                    const msgInput = document.getElementById('messageInput');
                    if (msgInput) msgInput.placeholder = `Message #${roomData.name}`;

                    // Handle archived
                    if (roomData.status === 'archived') {
                        document.getElementById('inputArea').innerHTML = '<span>This chat has been archived</span>';
                        document.getElementById('inputArea').classList.add('archived');
                    }

                    // Show UI
                    document.getElementById('loadingContainer').style.display = 'none';
                    document.getElementById('chatApp').style.display = 'flex';

                    renderMessages(result.messages);
                    loadParticipants();
                    loadPinnedMessages();
                    checkMuteStatus();
                    setupRealtimeListener();
                    renderChannelList(); // Update active state
                } else {
                    toastError('Failed to load chat room');
                    window.location.href = '/pages/messages.html';
                }
            } catch (error) {
                console.error('Error loading chat room:', error);
                toastError('Error loading chat room');
                window.location.href = '/pages/messages.html';
            }
        }

        async function setupRealtimeListener() {
            const messagesRef = collection(db, 'chat_rooms', roomId, 'messages');

            // Load initial page of messages (most recent 20)
            const initialQuery = query(
                messagesRef,
                orderBy('timestamp', 'desc'),
                limit(MESSAGES_PER_PAGE)
            );

            const initialSnapshot = await getDocs(initialQuery);

            if (initialSnapshot.empty) {
                allMessages = [];
                displayedMessages = [];
                hasMoreMessages = false;
                renderMessagesWithPagination();
            } else {
                const messages = [];
                initialSnapshot.forEach(d => {
                    const data = d.data();
                    messages.push({
                        id: d.id,
                        ...data,
                        timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                        is_own: data.sender_id === currentPlayerId
                    });
                });

                // Messages are in descending order, reverse to show oldest first
                allMessages = messages.reverse();
                displayedMessages = [...allMessages];

                // Track oldest loaded message for pagination
                if (allMessages.length > 0) {
                    oldestLoadedTimestamp = new Date(allMessages[0].timestamp);
                }

                // Check if there are more messages
                hasMoreMessages = initialSnapshot.size === MESSAGES_PER_PAGE;

                renderMessagesWithPagination();
            }

            // Set up real-time listener for NEW messages only (after the most recent loaded)
            const newestTimestamp = allMessages.length > 0
                ? new Date(allMessages[allMessages.length - 1].timestamp)
                : new Date(0);

            const realtimeQuery = query(
                messagesRef,
                orderBy('timestamp', 'asc'),
                startAfter(newestTimestamp)
            );

            unsubscribeMessages = onSnapshot(realtimeQuery, (snapshot) => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const newMessage = {
                            id: change.doc.id,
                            ...data,
                            timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                            is_own: data.sender_id === currentPlayerId
                        };
                        allMessages.push(newMessage);
                        displayedMessages.push(newMessage);
                        renderMessagesWithPagination();
                    }
                });

                if (markReadTimeout) clearTimeout(markReadTimeout);
                markReadTimeout = setTimeout(() => {
                    callFunction('markChatRoomRead', {
                        room_id: roomId,
                        player_pin: playerPin
                    }).catch(console.error);
                }, 1000);
            });

            setupTypingListener();
        }

        async function loadOlderMessages() {
            if (!hasMoreMessages || !oldestLoadedTimestamp) return;

            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (loadMoreBtn) loadMoreBtn.textContent = 'Loading...';

            try {
                const messagesRef = collection(db, 'chat_rooms', roomId, 'messages');
                const olderQuery = query(
                    messagesRef,
                    orderBy('timestamp', 'desc'),
                    startAfter(oldestLoadedTimestamp),
                    limit(MESSAGES_PER_PAGE)
                );

                const olderSnapshot = await getDocs(olderQuery);

                if (olderSnapshot.empty) {
                    hasMoreMessages = false;
                } else {
                    const olderMessages = [];
                    olderSnapshot.forEach(d => {
                        const data = d.data();
                        olderMessages.push({
                            id: d.id,
                            ...data,
                            timestamp: data.timestamp?.toDate?.()?.toISOString() || null,
                            is_own: data.sender_id === currentPlayerId
                        });
                    });

                    // Prepend older messages (they're in desc order, so reverse)
                    const reversedOlder = olderMessages.reverse();
                    allMessages = [...reversedOlder, ...allMessages];
                    displayedMessages = [...allMessages];

                    // Update oldest timestamp
                    if (reversedOlder.length > 0) {
                        oldestLoadedTimestamp = new Date(reversedOlder[0].timestamp);
                    }

                    hasMoreMessages = olderSnapshot.size === MESSAGES_PER_PAGE;
                }

                renderMessagesWithPagination();
            } catch (error) {
                console.error('Error loading older messages:', error);
                if (loadMoreBtn) loadMoreBtn.textContent = 'Load More Messages';
            }
        }

        function renderMessagesWithPagination() {
            const container = document.getElementById('messageList');

            // Add "Load more" button if there are more messages
            let loadMoreHTML = '';
            if (hasMoreMessages) {
                loadMoreHTML = `
                    <button id="loadMoreBtn" onclick="loadOlderMessages()"
                            style="width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg-card);
                                   border: 1px solid var(--border-color); border-radius: 8px; color: var(--teal);
                                   font-weight: 600; cursor: pointer; transition: all 0.2s;">
                        Load More Messages
                    </button>
                `;
            }

            // Render messages using existing renderMessages function
            // But we need to prepend the load more button
            renderMessages(displayedMessages);

            // Prepend load more button
            if (loadMoreHTML) {
                container.insertAdjacentHTML('afterbegin', loadMoreHTML);
            }

            // Scroll to bottom only if this is the initial load or a new message was added
            // (Don't scroll when loading older messages)
            if (!window.hasScrolledToBottom) {
                scrollToBottom();
                window.hasScrolledToBottom = true;
            }
        }

        // Make loadOlderMessages available globally
        window.loadOlderMessages = loadOlderMessages;

        function setupTypingListener() {
            const typingRef = collection(db, 'chat_rooms', roomId, 'typing');

            unsubscribeTyping = onSnapshot(typingRef, (snapshot) => {
                const typingUsers = [];

                snapshot.forEach(d => {
                    const data = d.data();
                    if (d.id !== currentPlayerId) {
                        const timestamp = data.timestamp?.toDate?.() || new Date(0);
                        const fiveSecondsAgo = new Date(Date.now() - 5000);
                        if (timestamp > fiveSecondsAgo) {
                            typingUsers.push(data.player_name);
                        }
                    }
                });

                updateTypingIndicator(typingUsers);
            });
        }

        function updateTypingIndicator(typingUsers) {
            const indicator = document.getElementById('typingIndicator');
            const typingText = document.getElementById('typingText');

            if (typingUsers.length === 0) {
                indicator.classList.remove('visible');
                return;
            }

            indicator.classList.add('visible');

            if (typingUsers.length === 1) {
                typingText.textContent = `${typingUsers[0]} is typing...`;
            } else if (typingUsers.length === 2) {
                typingText.textContent = `${typingUsers[0]} and ${typingUsers[1]} are typing...`;
            } else {
                typingText.textContent = `${typingUsers[0]} and ${typingUsers.length - 1} others are typing...`;
            }
        }

        // ========== PARTICIPANTS/MEMBERS ==========

        async function loadParticipants() {
            try {
                const result = await callFunction('getChatRoomParticipants', {
                    room_id: roomId,
                    player_pin: playerPin
                });

                if (result.success) {
                    participants = result.participants;
                    if (result.current_player_id) currentPlayerId = result.current_player_id;
                    renderMembers();
                }
            } catch (error) {
                console.error('Error loading participants:', error);

        function renderMembers() {
            const online = participants.filter(p => p.is_online);
            const offline = participants.filter(p => !p.is_online);

            const onlineCountEl = document.getElementById('headerOnlineCount');

        function renderMemberItem(p, status) {

                <div class="member-item" onclick="openPlayerProfile('${p.id}')">
