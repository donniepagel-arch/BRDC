        window.openPlayerProfile = function(playerId) {
            window.open(`/pages/player-profile.html?id=${playerId}`, '_blank');
        };

        // ========== MESSAGES ==========

        function renderMessages(messages) {
            const container = document.getElementById('messageList');
            lastMessageDate = null;
            lastSenderId = null;

            if (!messages || messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">&#128172;</div>
                        <div class="empty-state-title">NO MESSAGES YET</div>
                        <div class="empty-state-text">Be the first to say something!</div>
                    </div>
                `;
                return;
            }

            let html = '';

            let lastMsgTimestamp = null;

            messages.forEach((msg, index) => {
                const msgDate = msg.timestamp ? new Date(msg.timestamp).toDateString() : null;

                // Date divider
                if (msgDate && msgDate !== lastMessageDate) {
                    html += `<div class="message-date-divider"><span>${formatDateDivider(msg.timestamp)}</span></div>`;
                    lastMessageDate = msgDate;
                    lastSenderId = null;
                    lastMsgTimestamp = null;
                }

                // System message
                if (msg.type === 'system') {
                    html += `<div class="message-group system" data-message-id="${msg.id}"><div class="message-bubble system">${escapeHtml(msg.text)}</div></div>`;
                    lastSenderId = null;
                    lastMsgTimestamp = null;
                    return;
                }

                // Time-based grouping: break group if > 5 minutes between messages
                const currentMsgTime = msg.timestamp ? new Date(msg.timestamp) : new Date(0);
                const timeDiff = lastMsgTimestamp ? (currentMsgTime - lastMsgTimestamp) : Infinity;
                const isSameSender = msg.sender_id === lastSenderId
                    && !msg.deleted
                    && msg.type !== 'system'
                    && timeDiff < 300000; // 5 minutes

                const isDeleted = msg.deleted;
                const time = msg.timestamp ? formatMessageTime(msg.timestamp) : '';
                const fullTime = msg.timestamp ? formatFullTime(msg.timestamp) : '';
                const reactionsHtml = renderReactions(msg.reactions, msg.id);
                const replyQuoteHtml = renderReplyQuote(msg.reply_to);
                const editedIndicator = msg.edited && !isDeleted ? '<span class="message-edited">(edited)</span>' : '';

                const canEdit = msg.is_own && !isDeleted && (Date.now() - currentMsgTime.getTime()) < 5 * 60 * 1000;
                const canDelete = msg.is_own && !isDeleted;

                const escapedText = escapeHtml(msg.text || '').substring(0, 50).replace(/'/g, "\\'").replace(/"/g, '&quot;');

                // Determine role color for sender name
                const senderParticipant = participants.find(p => p.id === msg.sender_id);
                const senderRoleClass = senderParticipant
                    ? (senderParticipant.is_admin ? 'role-admin' : 'role-player')
                    : '';
                const senderBadge = senderParticipant
                    ? (senderParticipant.is_admin ? '<span class="role-badge-small admin">Admin</span>' : '')
                    : '';

                html += `
                    <div class="message-group ${isSameSender ? 'same-sender' : ''} ${msg.is_own ? 'own-message' : ''}" data-message-id="${msg.id}" title="${fullTime}">
                        <div class="message-avatar">${getInitials(msg.sender_name)}</div>
                        <div class="message-content">
                            <div class="message-header">
                                <span class="message-sender ${senderRoleClass}">${escapeHtml(msg.sender_name)}${senderBadge}</span>
                                <span class="message-time-full">${fullTime}</span>
                            </div>
                            ${replyQuoteHtml}
                            <div class="message-bubble ${isDeleted ? 'deleted' : ''}">
                                ${!isDeleted ? `
                                <div class="message-actions">
                                    <button class="message-action-btn" onclick="showReactionPicker('${msg.id}')" title="React">&#128512;</button>
                                    <button class="message-action-btn" onclick="startReply('${msg.id}', '${escapeHtml(msg.sender_name)}', '${escapedText}')" title="Reply">&#8617;</button>
                                    ${canEdit ? `<button class="message-action-btn" onclick="startEdit('${msg.id}', '${escapeHtml(msg.text || '').replace(/'/g, "\\'").replace(/"/g, '&quot;')}')" title="Edit">&#9998;</button>` : ''}
                                    ${canDelete ? `<button class="message-action-btn" onclick="deleteMessage('${msg.id}')" title="Delete">&#128465;</button>` : ''}
                                </div>
                                ` : ''}
                                <div class="message-text">${isDeleted ? '<em style="color: var(--text-dim);">Message deleted</em>' : formatMessageText(msg.text, msg.mentions)}</div>
                                <span class="message-time-hover">${time}</span>
                                ${editedIndicator}
                            </div>
                            ${reactionsHtml}
                        </div>
                    </div>
                `;

                lastSenderId = msg.sender_id;
                lastMsgTimestamp = currentMsgTime;
            });

            container.innerHTML = html;
            container.scrollTop = container.scrollHeight;
        }

        function scrollToBottom() {
            const container = document.getElementById('messageList');
            if (container) container.scrollTop = container.scrollHeight;
        }

        window.sendMessage = async function() {
            if (roomData?.status === 'archived') return;

            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            try {
                const payload = {
                    room_id: roomId,
                    sender_pin: playerPin,
                    text: text
                };

                if (replyingTo) payload.reply_to = replyingTo;

                const result = await callFunction('sendChatMessage', payload);

                if (result.success) {
                    input.value = '';
                    input.style.height = 'auto';
                    cancelReply();

                    if (isCurrentlyTyping) {
                        isCurrentlyTyping = false;
                        sendTypingStatus(false);
                    }
                }
            } catch (error) {
                console.error('Error sending message:', error);
                toastError('Failed to send message. Please try again.');
            } finally {
                sendBtn.disabled = false;
            }
        };

        // ========== TYPING ==========

        function handleTyping() {
            const input = document.getElementById('messageInput');
            const hasText = input.value.trim().length > 0;

            if (hasText && !isCurrentlyTyping) {
                isCurrentlyTyping = true;
                sendTypingStatus(true);
            }

            if (typingTimeout) clearTimeout(typingTimeout);

            typingTimeout = setTimeout(() => {
                if (isCurrentlyTyping) {
                    isCurrentlyTyping = false;
                    sendTypingStatus(false);
                }
            }, 3000);

            if (!hasText && isCurrentlyTyping) {
                isCurrentlyTyping = false;
                sendTypingStatus(false);
            }
        }

        async function sendTypingStatus(isTyping) {
            try {
                await callFunction('setTypingStatus', {
                    room_id: roomId,
                    player_pin: playerPin,
                    is_typing: isTyping
                });
            } catch (error) {
                console.error('Error setting typing status:', error);
            }
        }

        // ========== @MENTIONS ==========

        function handleMentionInput(e) {
            const input = document.getElementById('messageInput');
            const text = input.value;
            const cursorPos = input.selectionStart;
            const textBeforeCursor = text.substring(0, cursorPos);
            const lastAtIndex = textBeforeCursor.lastIndexOf('@');

            if (lastAtIndex !== -1) {
                const textAfterAt = textBeforeCursor.substring(lastAtIndex + 1);
                if (!textAfterAt.includes(' ') && !textAfterAt.includes('\n')) {
                    mentionStartIndex = lastAtIndex;
                    showMentionAutocomplete(textAfterAt.toLowerCase());
                    return;
                }
            }

            hideMentionAutocomplete();
        }

        function showMentionAutocomplete(searchTerm) {
            const autocomplete = document.getElementById('mentionAutocomplete');

            const filtered = participants.filter(p => {
                if (p.id === currentPlayerId) return false;
                return p.name.toLowerCase().includes(searchTerm);
            });

            if (filtered.length === 0) {
                hideMentionAutocomplete();
                return;
            }

            selectedMentionIndex = 0;

            let html = '';
            filtered.slice(0, 8).forEach((p, index) => {
                const roleLabel = p.is_admin ? 'Admin' : (p.is_captain ? 'Captain' : '');
                html += `
                    <div class="mention-item ${index === 0 ? 'selected' : ''}"
                         data-id="${p.id}" data-name="${escapeHtml(p.name)}"
                         onclick="selectMention('${p.id}', '${escapeHtml(p.name).replace(/'/g, "\\'")}')">
                        <div class="mention-item-avatar">${getInitials(p.name)}</div>
                        <div class="mention-item-info">
                            <div class="mention-item-name">${escapeHtml(p.name)}</div>
                            ${roleLabel ? `<div class="mention-item-role">${roleLabel}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            autocomplete.innerHTML = html;
            autocomplete.classList.add('visible');
        }

        function hideMentionAutocomplete() {
            document.getElementById('mentionAutocomplete').classList.remove('visible');
            mentionStartIndex = -1;
        }

        function handleMentionKeydown(e) {
            const autocomplete = document.getElementById('mentionAutocomplete');
            if (!autocomplete.classList.contains('visible')) return false;

            const items = autocomplete.querySelectorAll('.mention-item');
            if (items.length === 0) return false;

            if (e.key === 'ArrowDown') {
                selectedMentionIndex = Math.min(selectedMentionIndex + 1, items.length - 1);
                items.forEach((item, i) => item.classList.toggle('selected', i === selectedMentionIndex));
                return true;
            } else if (e.key === 'ArrowUp') {
                selectedMentionIndex = Math.max(selectedMentionIndex - 1, 0);
                items.forEach((item, i) => item.classList.toggle('selected', i === selectedMentionIndex));
                return true;
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                const selected = items[selectedMentionIndex];
                if (selected) selectMention(selected.dataset.id, selected.dataset.name);
                return true;
            } else if (e.key === 'Escape') {
                hideMentionAutocomplete();
                return true;
            }

            return false;
        }

        window.selectMention = function(playerId, playerName) {
            const input = document.getElementById('messageInput');
            const text = input.value;
            const beforeMention = text.substring(0, mentionStartIndex);
            const afterCursor = text.substring(input.selectionStart);
            const firstName = playerName.split(' ')[0];

            input.value = beforeMention + '@' + firstName + ' ' + afterCursor;
            const newCursorPos = mentionStartIndex + firstName.length + 2;
            input.setSelectionRange(newCursorPos, newCursorPos);
            input.focus();
            hideMentionAutocomplete();
        };

        // ========== EMOJI PICKER ==========

        window.toggleEmojiPicker = function() {
            const picker = document.getElementById('emojiPicker');
            if (emojiPickerOpen) {
                closeEmojiPicker();
            } else {
                picker.classList.add('visible');
                emojiPickerOpen = true;
            }
        };

        function closeEmojiPicker() {
            document.getElementById('emojiPicker').classList.remove('visible');
            emojiPickerOpen = false;
        }

        let currentEmojiCategory = 'smileys';

        window.showEmojiCategory = function(category) {
            currentEmojiCategory = category;
            const grid = document.getElementById('emojiGrid');
            const categoryEmojis = emojis[category] || emojis.smileys;

            grid.innerHTML = categoryEmojis.map(emoji =>
                `<button class="emoji-btn" onclick="insertEmoji('${emoji}')">${emoji}</button>`
            ).join('');

            document.querySelectorAll('.emoji-category-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            // Clear search input
            const searchInput = document.getElementById('emojiSearch');
            if (searchInput) searchInput.value = '';
        };

        window.filterEmojis = function(query) {
            const grid = document.getElementById('emojiGrid');
            if (!query) {
                // Show current category when search is cleared
                showEmojiCategory(currentEmojiCategory || 'smileys');
                return;
            }
            // Show all emojis from all categories when searching
            let all = [];
            Object.values(emojis).forEach(arr => all.push(...arr));
            // Deduplicate
            all = [...new Set(all)];
            grid.innerHTML = all.map(emoji =>
                `<button class="emoji-btn" onclick="insertEmoji('${emoji}')">${emoji}</button>`
            ).join('');
            // Deactivate category buttons during search
            document.querySelectorAll('.emoji-category-btn').forEach(btn => {
                btn.classList.remove('active');
            });
        };

        window.insertEmoji = function(emoji) {
            const input = document.getElementById('messageInput');
            const cursorPos = input.selectionStart;
            const text = input.value;
            input.value = text.substring(0, cursorPos) + emoji + text.substring(cursorPos);
            input.setSelectionRange(cursorPos + emoji.length, cursorPos + emoji.length);
            input.focus();
            closeEmojiPicker();
        };

        // ========== REACTIONS ==========

        function renderReactions(reactions, messageId) {
            if (!reactions || Object.keys(reactions).length === 0) return '';

            let html = '<div class="message-reactions">';
            for (const [emoji, users] of Object.entries(reactions)) {
                const count = Object.keys(users).length;
                if (count === 0) continue;
                const isOwn = users[currentPlayerId] ? 'own' : '';
                html += `
                    <div class="reaction-badge ${isOwn}" onclick="toggleReaction('${messageId}', '${emoji}')">
                        <span>${emoji}</span>
                        <span class="reaction-count">${count}</span>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }

        window.showReactionPicker = function(messageId) {
            const picker = document.getElementById('reactionPicker');
            const bubble = document.querySelector(`[data-message-id="${messageId}"] .message-bubble`);
            if (!bubble) return;

            currentReactionMessageId = messageId;
            const rect = bubble.getBoundingClientRect();
            picker.style.top = (rect.top - 50) + 'px';
            picker.style.left = Math.min(rect.left, window.innerWidth - 320) + 'px';
            picker.classList.add('visible');

            setTimeout(() => {
                document.addEventListener('click', closeReactionPicker, { once: true });
            }, 10);
        };

        function closeReactionPicker() {
            document.getElementById('reactionPicker').classList.remove('visible');
            currentReactionMessageId = null;
        }

        window.addReaction = async function(emoji) {
            if (!currentReactionMessageId) return;
            const messageId = currentReactionMessageId;
            closeReactionPicker();

            try {
                await callFunction('addMessageReaction', {
                    room_id: roomId,
                    message_id: messageId,
                    player_pin: playerPin,
                    emoji: emoji
                });
            } catch (error) {
                console.error('Error adding reaction:', error);
            }
        };

        window.toggleReaction = async function(messageId, emoji) {
            try {
                await callFunction('addMessageReaction', {
                    room_id: roomId,
                    message_id: messageId,
                    player_pin: playerPin,
                    emoji: emoji
                });
            } catch (error) {
                console.error('Error toggling reaction:', error);
            }
        };

        // ========== REPLY ==========

        function renderReplyQuote(replyTo) {
            if (!replyTo?.message_id) return '';
            return `
                <div class="message-reply-quote" onclick="scrollToMessage('${replyTo.message_id}')">
                    <div class="reply-quote-sender">${escapeHtml(replyTo.sender_name)}</div>
                    <div class="reply-quote-text">${escapeHtml(replyTo.text)}</div>
                </div>
            `;
        }

        window.startReply = function(messageId, senderName, text) {
            replyingTo = { message_id: messageId, sender_name: senderName, text: text };
            document.getElementById('replyPreviewText').textContent = `Replying to ${senderName}: ${text}`;
            document.getElementById('replyPreview').classList.add('visible');
            document.getElementById('messageInput').focus();
        };

        window.cancelReply = function() {
            replyingTo = null;
            document.getElementById('replyPreview').classList.remove('visible');
        };

        window.scrollToMessage = function(messageId) {
            const group = document.querySelector(`[data-message-id="${messageId}"]`);
            if (group) {
                group.scrollIntoView({ behavior: 'smooth', block: 'center' });
                group.style.background = 'rgba(145, 215, 235, 0.1)';
                setTimeout(() => group.style.background = '', 2000);
            }
        };

        // ========== EDIT/DELETE ==========

        window.startEdit = function(messageId, currentText) {
            editingMessageId = messageId;
            document.getElementById('editModalInput').value = currentText;
            document.getElementById('editModal').classList.add('visible');
            document.getElementById('editModalInput').focus();
        };

        window.cancelEdit = function() {
            editingMessageId = null;
            document.getElementById('editModal').classList.remove('visible');
        };

        window.saveEdit = async function() {
            if (!editingMessageId) return;

            const newText = document.getElementById('editModalInput').value.trim();
            if (!newText) {
                toastWarning('Message cannot be empty');
                return;
            }

            try {
                const result = await callFunction('editChatMessage', {
                    room_id: roomId,
                    message_id: editingMessageId,
                    player_pin: playerPin,
                    new_text: newText
                });

                if (result.success) cancelEdit();
                else toastError(result.error || 'Failed to edit message');
            } catch (error) {
                console.error('Error editing message:', error);
            }
        };

        window.deleteMessage = async function(messageId) {
            if (!confirm('Delete this message?')) return;

            try {
                await callFunction('deleteChatMessage', {
                    room_id: roomId,
                    message_id: messageId,
                    player_pin: playerPin
                });
            } catch (error) {
                console.error('Error deleting message:', error);
                toastError('Failed to delete message.');
            }
        };

        // ========== MUTE ==========

        async function checkMuteStatus() {
            try {
                const roomDoc = await getDoc(doc(db, 'chat_rooms', roomId));
                if (roomDoc.exists()) {
                    const data = roomDoc.data();
                    isMuted = (data.muted_by || []).includes(currentPlayerId);
                    updateMuteButton();
                }
            } catch (error) {
                console.error('Error checking mute status:', error);
            }
        }

        function updateMuteButton() {
            const btn = document.getElementById('muteBtn');
            btn.innerHTML = isMuted ? '&#128277;' : '&#128276;';
            btn.classList.toggle('muted', isMuted);
        }

        window.toggleMute = async function() {
            try {
                const result = await callFunction('toggleChatRoomMute', {
                    room_id: roomId,
                    player_pin: playerPin,
                    muted: !isMuted
                });

                if (result.success) {
                    isMuted = !isMuted;
                    updateMuteButton();
                }
            } catch (error) {
                console.error('Error toggling mute:', error);
            }
        };

        // ========== PINNED ==========

        async function loadPinnedMessages() {
            try {
                const result = await callFunction('getPinnedMessages', {
                    room_id: roomId,
                    player_pin: playerPin
                });

                if (result.success && result.pinned_messages.length > 0) {
                    const pinned = result.pinned_messages[0];
                    document.getElementById('pinnedMessage').innerHTML = `<strong>${escapeHtml(pinned.sender_name)}:</strong> ${escapeHtml(pinned.text)}`;
                    document.getElementById('pinBtn').classList.add('active');
                }
            } catch (error) {
                console.error('Error loading pinned messages:', error);
            }
        }

        window.togglePinned = function() {
            showPinned = !showPinned;
            document.getElementById('pinnedSection').classList.toggle('visible', showPinned);
            document.getElementById('pinBtn').classList.toggle('active', showPinned);
        };

        window.hidePinned = function() {
            showPinned = false;
            document.getElementById('pinnedSection').classList.remove('visible');
            document.getElementById('pinBtn').classList.remove('active');
        };

        // ========== DRAWER SYSTEM ==========

        function isDrawerOpen() {
            return document.querySelector('.left-sidebar.open') || document.querySelector('.right-sidebar.open');
        }

        function openLeftDrawer() {
            const sidebar = document.querySelector('.left-sidebar');
            const overlay = document.getElementById('chatDrawerOverlay');
            if (sidebar) sidebar.classList.add('open');
            if (overlay) overlay.classList.add('open');
            document.body.classList.add('drawer-open');
        }

        function openRightDrawer() {
            const sidebar = document.getElementById('rightSidebar');
            const overlay = document.getElementById('chatDrawerOverlay');
            if (sidebar) sidebar.classList.add('open');
            if (overlay) overlay.classList.add('open');
            document.body.classList.add('drawer-open');
        }

        window.closeAllDrawers = function() {
            document.querySelectorAll('.left-sidebar, .right-sidebar').forEach(function(el) { el.classList.remove('open'); });
            const overlay = document.getElementById('chatDrawerOverlay');
            if (overlay) overlay.classList.remove('open');
            document.body.classList.remove('drawer-open');
        };

        window.openDrawer = function() {
            openLeftDrawer();
        };

        window.toggleMembersSidebar = function() {
            if (window.innerWidth >= 1024) {
                // Desktop: toggle display
                const sidebar = document.getElementById('rightSidebar');
                const isHidden = sidebar.style.display === 'none';
                sidebar.style.display = isHidden ? 'flex' : 'none';
                document.getElementById('membersBtn')?.classList.toggle('active');
            } else {
                // Mobile: drawer
                const sidebar = document.getElementById('rightSidebar');
                if (sidebar.classList.contains('open')) {
                    closeAllDrawers();
                } else {
                    openRightDrawer();
                }
            }
        };

        // ========== SWIPE GESTURES ==========

        function initSwipeGestures() {
            let touchStartX = 0;
            let touchStartY = 0;
            let isSwiping = false;
            let swipeDirection = null;

            const leftSidebar = document.querySelector('.left-sidebar');
            const rightSidebar = document.getElementById('rightSidebar');

            document.addEventListener('touchstart', function(e) {
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;

                // Only track edge swipes on mobile
                if (window.innerWidth >= 1024) return;

                if (touch.clientX < 20 && !isDrawerOpen()) {
                    isSwiping = true;
                    swipeDirection = 'right'; // swipe to open left panel
                } else if (touch.clientX > window.innerWidth - 20 && !isDrawerOpen()) {
                    isSwiping = true;
                    swipeDirection = 'left'; // swipe to open right panel
                }
            }, { passive: true });

            document.addEventListener('touchmove', function(e) {
                if (!isSwiping) return;

                const touch = e.touches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = Math.abs(touch.clientY - touchStartY);

                // Cancel if mostly vertical (scrolling)
                if (deltaY > 30) {
                    isSwiping = false;
                    return;
                }

                if (swipeDirection === 'right' && deltaX > 50) {
                    openLeftDrawer();
                    isSwiping = false;
                } else if (swipeDirection === 'left' && deltaX < -50) {
                    openRightDrawer();
                    isSwiping = false;
                }
            }, { passive: true });

            document.addEventListener('touchend', function() {
                isSwiping = false;
                swipeDirection = null;
            }, { passive: true });

            // Swipe-to-close on open drawers
            if (leftSidebar) {
                let drawerTouchStartX = 0;
                leftSidebar.addEventListener('touchstart', function(e) {
                    drawerTouchStartX = e.touches[0].clientX;
                }, { passive: true });
                leftSidebar.addEventListener('touchmove', function(e) {
                    if (!leftSidebar.classList.contains('open')) return;
                    const diff = drawerTouchStartX - e.touches[0].clientX;
                    if (diff > 80) {
                        closeAllDrawers();
                    }
                }, { passive: true });
            }

            if (rightSidebar) {
                let drawerTouchStartX = 0;
                rightSidebar.addEventListener('touchstart', function(e) {
                    drawerTouchStartX = e.touches[0].clientX;
                }, { passive: true });
                rightSidebar.addEventListener('touchmove', function(e) {
                    if (!rightSidebar.classList.contains('open')) return;
                    const diff = e.touches[0].clientX - drawerTouchStartX;
                    if (diff > 80) {
                        closeAllDrawers();
                    }
                }, { passive: true });
            }
        }

        // ========== LONG-PRESS CONTEXT MENU ==========

        let longPressTimer = null;
        let longPressTarget = null;

        function initLongPress() {
            const messageList = document.getElementById('messageList');
            if (!messageList) return;

            messageList.addEventListener('touchstart', function(e) {
                const msgGroup = e.target.closest('.message-group');
                if (!msgGroup || msgGroup.classList.contains('system')) return;

                longPressTarget = msgGroup;
                longPressTimer = setTimeout(function() {
                    // Haptic feedback if available
                    if (navigator.vibrate) navigator.vibrate(30);
                    showContextMenu(msgGroup, e.touches[0]);
                }, 500);
            }, { passive: true });

            messageList.addEventListener('touchmove', function() {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }, { passive: true });

            messageList.addEventListener('touchend', function() {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }, { passive: true });

            // Right-click context menu on desktop
            messageList.addEventListener('contextmenu', function(e) {
                const msgGroup = e.target.closest('.message-group');
                if (!msgGroup || msgGroup.classList.contains('system')) return;
                e.preventDefault();
                showContextMenu(msgGroup, { clientX: e.clientX, clientY: e.clientY });
            });
        }

        function showContextMenu(msgGroup, touch) {
            closeContextMenu();

            const messageId = msgGroup.dataset.messageId;
            const isOwn = msgGroup.classList.contains('own-message');
            const messageText = msgGroup.querySelector('.message-text')?.textContent || '';
            const senderName = msgGroup.querySelector('.message-sender')?.textContent || '';

            // Create backdrop
            const backdrop = document.createElement('div');
            backdrop.className = 'context-menu-backdrop';
            backdrop.onclick = closeContextMenu;
            document.body.appendChild(backdrop);

            // Create menu
            const menu = document.createElement('div');
            menu.className = 'message-context-menu';
            menu.id = 'contextMenu';

            const quickReactions = ['\u{1F600}', '\u{1F602}', '\u{2764}', '\u{1F44D}', '\u{1F3AF}', '\u{1F525}'];

            const escapedSender = escapeHtml(senderName).replace(/'/g, "\\'");
            const escapedPreview = escapeHtml(messageText).substring(0, 50).replace(/'/g, "\\'");
            const escapedFull = escapeHtml(messageText).replace(/'/g, "\\'").replace(/"/g, '&quot;');

            menu.innerHTML = `
                <div class="context-menu-reactions">
                    ${quickReactions.map(function(emoji) {
                        return '<button type="button" onclick="contextMenuReaction(\'' + messageId + '\', \'' + emoji + '\')">' + emoji + '</button>';
                    }).join('')}
                </div>
                <button type="button" class="context-menu-item" onclick="startReply('${messageId}', '${escapedSender}', '${escapedPreview}'); closeContextMenu();">
                    <span>\u21A9\uFE0F</span> Reply
                </button>
                <button type="button" class="context-menu-item" onclick="copyMessageText('${messageId}'); closeContextMenu();">
                    <span>\u{1F4CB}</span> Copy Text
                </button>
                ${isOwn ? `
                    <button type="button" class="context-menu-item" onclick="startEdit('${messageId}', '${escapedFull}'); closeContextMenu();">
                        <span>\u270F\uFE0F</span> Edit Message
                    </button>
                    <button type="button" class="context-menu-item danger" onclick="deleteMessage('${messageId}'); closeContextMenu();">
                        <span>\u{1F5D1}\uFE0F</span> Delete Message
                    </button>
                ` : ''}
            `;

            document.body.appendChild(menu);

            // Position the menu near the touch/click point
            const menuRect = menu.getBoundingClientRect();
            let top = touch.clientY - menuRect.height - 10;
            let left = touch.clientX - menuRect.width / 2;

            // Keep within viewport
            if (top < 10) top = touch.clientY + 10;
            if (left < 10) left = 10;
            if (left + menuRect.width > window.innerWidth - 10) left = window.innerWidth - menuRect.width - 10;

            menu.style.top = top + 'px';
            menu.style.left = left + 'px';
        }

        window.closeContextMenu = function() {
            const menu = document.getElementById('contextMenu');
            const backdrop = document.querySelector('.context-menu-backdrop');
            if (menu) menu.remove();
            if (backdrop) backdrop.remove();
        };

        window.contextMenuReaction = function(messageId, emoji) {
            currentReactionMessageId = messageId;
            addReaction(emoji);
            closeContextMenu();
        };

        window.copyMessageText = function(messageId) {
            const msg = allMessages.find(function(m) { return m.id === messageId; });
            if (msg && msg.text) {
                navigator.clipboard.writeText(msg.text).then(function() {
                    if (window.toastSuccess) toastSuccess('Copied to clipboard');
                }).catch(function() {
                    if (window.toastError) toastError('Failed to copy');
                });
            }
        };

        window.goToSettings = function() {
            window.location.href = '/pages/dashboard.html';
        };

        // ========== HELPERS ==========

        function formatDateDivider(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const today = new Date();
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            if (date.toDateString() === today.toDateString()) return 'Today';
            if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';

            return date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        }

        function formatMessageTime(isoString) {
            if (!isoString) return '';
            return new Date(isoString).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function formatFullTime(isoString) {
            if (!isoString) return '';
            const date = new Date(isoString);
            const today = new Date();

            if (date.toDateString() === today.toDateString()) {
                return 'Today at ' + date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            }

            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' at ' +
                   date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatMessageText(text, mentions) {
            let escaped = escapeHtml(text);
            escaped = escaped.replace(/@(\w+)/g, (match, name) => {
                const isSelf = participants.some(p =>
                    p.id === currentPlayerId && p.name?.toLowerCase().includes(name.toLowerCase())
                );
                return `<span class="mention-highlight${isSelf ? ' self' : ''}">${match}</span>`;
            });
            return escaped;
        }

        function getInitials(name) {
            if (!name) return '?';
            const parts = name.split(' ');
            if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name.substring(0, 2).toUpperCase();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
        }

        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (unsubscribeMessages) unsubscribeMessages();
            if (unsubscribeTyping) unsubscribeTyping();
            if (unsubscribeRooms) unsubscribeRooms();
            if (isCurrentlyTyping) sendTypingStatus(false);
            if (window.brdcPresence) window.brdcPresence.stopPresenceHeartbeat();
        });
    </script>
