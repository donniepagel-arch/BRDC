<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Director VNext - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
</head>
<body class="vnext-light-page director-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="directorStatus">Loading director board...</p>
                <h1 id="directorTitle">League Director</h1>
                <p>Triples operations for schedule, standings, rosters, reports, and league rooms.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" href="/pages/triples-vnext.html">League hub</a>
                <a class="ves-action" href="/pages/captain-dashboard-vnext.html">Import reports</a>
                <a class="ves-action" href="/pages/messages-vnext.html">Messages</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Director summary">
            <article><span id="directorTeams">-</span><strong>Teams</strong><em>Active Triples teams.</em></article>
            <article><span id="directorMatches">-</span><strong>Matches</strong><em>Scheduled and completed nights.</em></article>
            <article><span id="directorPlayers">-</span><strong>Players</strong><em>Roster players plus fill-ins.</em></article>
        </section>

        <section class="ves-filters" aria-label="Director sections">
            <button class="active" type="button" data-director-target="standings">Standings</button>
            <button type="button" data-director-target="schedule">Schedule</button>
            <button type="button" data-director-target="teams">Teams</button>
            <button type="button" data-director-target="players">Players</button>
            <button type="button" data-director-target="tools">Tools</button>
        </section>

        <section class="ves-grid list director-pane active" data-director-pane="standings" id="directorStandings"><div class="ves-skeleton"></div></section>
        <section class="ves-grid list director-pane" data-director-pane="schedule" id="directorSchedule"></section>
        <section class="ves-grid director-pane" data-director-pane="teams" id="directorTeamsGrid"></section>
        <section class="ves-grid director-pane" data-director-pane="players" id="directorPlayersGrid"></section>
        <section class="ves-grid director-pane" data-director-pane="tools" id="directorTools"></section>
    </main>

    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/league-director-vnext.js?v=1"></script>
    <script>
        initBRDCNavigation({ page: 'league-director', pageTitle: 'League Director', showBreadcrumbs: false, showBackButton: true });
    </script>
</body>
</html>
