<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aim Darts — BRDC</title>
<link rel="icon" type="image/png" href="/images/favicon.png">
<style>
  :root{
    --pink:#FF469A; --teal:#91D7EB; --gold:#FDD835;
    --bg:#0c1020; --panel:#161d35; --ink:#f3f6ff; --muted:#8ea0c8;
    --board-cream:#f0e0c0; --board-dark:#16100a; --red:#c8402a; --green:#2d8a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:10px;overflow-x:hidden}
  .ad-top{width:100%;max-width:600px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .ad-title{font-family:'Bebas Neue',sans-serif;letter-spacing:2px;font-size:1.5rem;color:var(--gold)}
  .ad-title small{display:block;font-family:Inter;font-size:.5rem;letter-spacing:2px;color:var(--muted)}
  .ad-exit{background:none;border:1px solid #33406a;color:var(--muted);border-radius:8px;padding:7px 12px;font-size:.8rem;cursor:pointer}
  .ad-exit:hover{color:var(--ink);border-color:var(--pink)}
  /* player scoreboard */
  .ad-players{width:100%;max-width:600px;display:flex;gap:8px;margin-bottom:10px}
  .ad-pl{flex:1;background:var(--panel);border:2px solid #25305a;border-radius:12px;padding:8px 10px;text-align:center;transition:.15s}
  .ad-pl.active{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 18px rgba(253,216,53,.15)}
  .ad-pl .nm{font-size:.78rem;color:var(--muted);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ad-pl.active .nm{color:var(--gold)}
  .ad-pl .rem{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:800;line-height:1.1}
  .ad-pl .leg{font-size:.62rem;color:var(--muted)}
  canvas{background:var(--board-dark);border:4px solid #2a1810;border-radius:50%;
    box-shadow:0 0 30px rgba(0,0,0,.7);display:block;cursor:crosshair;touch-action:none;max-width:94vw;height:auto}
  .ad-turn{display:flex;gap:10px;margin-top:12px;align-items:center;flex-wrap:wrap;justify-content:center}
  .ad-slot{width:76px;text-align:center;padding:7px 4px;border:1px solid #25305a;border-radius:8px;background:var(--panel)}
  .ad-slot.active{border-color:var(--gold);background:rgba(253,216,53,.07)}
  .ad-slot .l{font-size:.6rem;color:var(--muted)}
  .ad-slot .s{font-size:1.05rem;color:var(--gold);font-weight:800;font-family:'JetBrains Mono',monospace}
  .ad-tt{color:var(--muted);font-size:.72rem}
  .ad-tt b{color:var(--gold)}
  .ad-msg{margin-top:12px;padding:9px 14px;background:var(--panel);border-left:3px solid var(--gold);border-radius:6px;
    font-size:.9rem;min-height:1.2em;width:600px;max-width:95vw;text-align:center}
  .ad-msg.win{border-left-color:#39ff14;color:#39ff14}
  .ad-msg.bust{border-left-color:var(--red);color:#ff8a7a}
  .ad-hint{margin-top:10px;color:var(--muted);font-size:.78rem;text-align:center;max-width:560px;line-height:1.5}
  kbd{background:#0e1530;padding:1px 6px;border-radius:3px;border:1px solid #33406a;color:var(--ink);font-size:.74rem}
  .ad-big{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(7,10,22,.92);z-index:50;text-align:center;padding:24px}
  .ad-big.show{display:flex}
  .ad-big h2{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:3px;color:#39ff14;text-shadow:0 0 18px rgba(57,255,20,.4)}
  .ad-big p{color:var(--muted);margin:8px 0 18px}
  .ad-big .row{display:flex;gap:10px}
  .ad-btn{background:linear-gradient(180deg,var(--pink),#d63384);color:#fff;border:0;border-radius:10px;
    padding:12px 22px;font-weight:800;cursor:pointer;font-size:.95rem}
  .ad-btn.ghost{background:none;border:1px solid #33406a;color:var(--muted)}
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@700;800&display=swap">
<script src="/js/dartboard-render.js?v=1"></script>
</head>
<body>
  <div class="ad-top">
    <div class="ad-title" id="adTitle">AIM DARTS<small id="adSub">501 · DOUBLE OUT</small></div>
    <button class="ad-exit" id="adExit">Exit</button>
  </div>
  <div class="ad-players" id="adPlayers"></div>
  <canvas id="game-canvas" width="520" height="520"></canvas>
  <div class="ad-turn">
    <div class="ad-slot" id="slot0"><div class="l">DART 1</div><div class="s" id="s0">—</div></div>
    <div class="ad-slot" id="slot1"><div class="l">DART 2</div><div class="s" id="s1">—</div></div>
    <div class="ad-slot" id="slot2"><div class="l">DART 3</div><div class="s" id="s2">—</div></div>
    <div class="ad-tt">Turn: <b id="turnTotal">0</b></div>
  </div>
  <div class="ad-msg" id="msg">Tap the board (or press SPACE) to lock the sweeping line — once for side-to-side, once for up-down.</div>
  <div class="ad-hint"><kbd>Space</kbd>/tap — lock aim (X then Y) · <kbd>R</kbd> restart · two clicks throw one dart at the crosshair (with a little natural wobble)</div>

  <div class="ad-big" id="bigOverlay">
    <h2 id="bigTitle">GAME SHOT!</h2>
    <p id="bigSub"></p>
    <div class="row">
      <button class="ad-btn" id="bigAgain">Play again</button>
      <button class="ad-btn ghost" id="bigExit">Done</button>
    </div>
  </div>

<script>
(function(){
  // ── Launch params (clean, aim-specific; populated by scorer-setup) ──────────
  const qp = new URLSearchParams(location.search);
  const X01 = parseInt(qp.get('x01') || '501', 10);
  const OUT = (qp.get('out') || 'double').toLowerCase();   // double | straight | master
  const IN_RULE = (qp.get('in') || 'straight').toLowerCase();
  const MODE = (qp.get('mode') || 'casual').toLowerCase();
  const LEGS_TO_WIN = Math.max(1, parseInt(qp.get('legs') || '1', 10));
  let players;
  try { players = JSON.parse(decodeURIComponent(qp.get('players') || '')) ; } catch { players = null; }
  if (!Array.isArray(players) || !players.length) {
    players = [{ name: 'Player 1' }, { name: 'Player 2' }];   // standalone fallback
  }
  players = players.map((p, i) => ({ id: p.id || null, name: p.name || ('Player ' + (i + 1)), is_bot: !!p.is_bot }));
  document.getElementById('adSub').textContent = `${X01} · ${OUT === 'double' ? 'DOUBLE' : OUT === 'master' ? 'MASTER' : 'STRAIGHT'} OUT` + (LEGS_TO_WIN > 1 ? ` · BO${LEGS_TO_WIN*2-1}` : '');

  const FN_BASE = 'https://us-central1-brdc-v2.cloudfunctions.net';

  const canvas = document.getElementById('game-canvas');
  canvas.width=1000; canvas.height=1000; canvas.style.width='500px'; canvas.style.maxWidth='94vw'; canvas.style.height='auto';
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2, R = W*0.43;
  const msgEl = document.getElementById('msg');
  const turnTotalEl = document.getElementById('turnTotal');

  // ── Scoring via the shared realistic-board renderer (DB) ────────────────────
  const SEGMENTS=DB.SEG;
  // aim sweep spans the whole board so every double (incl. D20 top / D3 bottom) is reachable
  const AX0=CX-R-6,AX1=CX+R+6,AY0=CY-R-6,AY1=CY+R+6;
  const scoreDart=(x,y)=>DB.score(x,y,CX,CY,R);
  // valid finish: double-out (or bull) for 'double'; treble allowed for 'master'; any for 'straight'
  function isValidOut(ring){return OUT==='straight'?true:OUT==='master'?(ring==='double'||ring==='triple'):ring==='double';}

  // ── Multiplayer state ───────────────────────────────────────────────────────
  let state, statTrack;
  function freshStats(){return{darts_thrown:0,points_scored:0,tons:0,ton_40:0,ton_80:0,checkout:0,high_score:0,_turnPts:0,_turnDarts:0};}
  function reset(){
    state={
      players:players.map(p=>({...p,remaining:X01,legs:0,started:false})),
      cur:0, dartIndex:0, phase:'aim_x',
      aimX:CX,aimY:CY, sweepX:0,sweepY:0,sweepDirX:1,sweepDirY:1,
      turnDarts:[], turnStart:X01, leg:1, over:false
    };
    statTrack=players.map(()=>({legs:[],cur:freshStats()}));
    buildPlayerCards(); renderTurn(); updateCards();
    setMsg(`${cp().name} to throw. Lock side-to-side aim.`,'');
  }
  const cp=()=>state.players[state.cur];

  function buildPlayerCards(){
    const wrap=document.getElementById('adPlayers');wrap.innerHTML='';
    state.players.forEach((p,i)=>{
      const d=document.createElement('div');d.className='ad-pl'+(i===state.cur?' active':'');d.id='pl'+i;
      d.innerHTML=`<div class="nm">${p.name}</div><div class="rem" id="rem${i}">${p.remaining}</div>`+
        (LEGS_TO_WIN>1?`<div class="leg">legs ${p.legs}/${LEGS_TO_WIN}</div>`:'');
      wrap.appendChild(d);
    });
  }
  function updateCards(){
    state.players.forEach((p,i)=>{
      document.getElementById('pl'+i)?.classList.toggle('active',i===state.cur);
      const r=document.getElementById('rem'+i);if(r)r.textContent=p.remaining;
    });
  }
  function renderTurn(){
    for(let i=0;i<3;i++){
      document.getElementById('slot'+i).classList.toggle('active',i===state.dartIndex&&(state.phase==='aim_x'||state.phase==='aim_y'));
      document.getElementById('s'+i).textContent=state.turnDarts[i]?state.turnDarts[i].label:'—';
    }
    turnTotalEl.textContent=state.turnDarts.reduce((s,d)=>s+d.score,0);
  }
  function setMsg(t,c){msgEl.textContent=t;msgEl.className='ad-msg'+(c?' '+c:'');}

  // accumulate per-dart into current player's turn buffer
  function trackDart(pi,dart){
    const st=statTrack[pi].cur;st.darts_thrown++;st._turnDarts++;
  }
  function trackTurnEnd(pi,turnScore,busted,checkoutVal){
    const st=statTrack[pi].cur;
    if(!busted){st.points_scored+=turnScore;}
    if(turnScore>=180)st.ton_80++;else if(turnScore>=140)st.ton_40++;else if(turnScore>=100)st.tons++;
    if(turnScore>st.high_score)st.high_score=turnScore;
    if(checkoutVal)st.checkout=checkoutVal;
  }

  function lockX(){state.aimX=AX0+state.sweepX*(AX1-AX0);state.phase='aim_y';setMsg('Side locked. Now lock up-down.','');}
  function lockY(){
    state.aimY=AY0+state.sweepY*(AY1-AY0);
    const wob=R*0.016,fx=state.aimX+(Math.random()-.5)*wob,fy=state.aimY+(Math.random()-.5)*wob;
    // dart flies before it scores (anticipation)
    state.phase='flight'; state.flight={t0:performance.now(),dur:470,toX:fx,toY:fy};
  }
  function landDart(){
    const fx=state.flight.toX, fy=state.flight.toY, res=scoreDart(fx,fy);
    state.flight=null;
    const dart={x:fx,y:fy,score:res.score,label:res.label,ring:res.ring};
    state.turnDarts.push(dart);trackDart(state.cur,dart);
    const before=cp().remaining, after=before-res.score;
    let bust=false,win=false;
    if(after<0||after===1)bust=true;
    else if(after===0){ if(isValidOut(res.ring)){win=true;} else bust=true; }
    if(bust){dart.bust=true;cp().remaining=state.turnStart;setMsg('BUST — turn ends, stays at '+state.turnStart,'bust');}
    else{cp().remaining=after;if(win){dart.win=true;}else setMsg(`${cp().name}: ${dart.label} (${dart.score})`,'');}
    renderTurn();updateCards();
    if(win){ onLegWin(); return; }
    if(bust){ endTurn(true); return; }
    if(state.dartIndex<2){ state.dartIndex++; state.aimX=CX;state.aimY=CY;state.sweepX=0;state.sweepY=0;state.phase='aim_x'; renderTurn(); }
    else { endTurn(false); }
  }
  function endTurn(busted){
    const turnScore=state.turnDarts.reduce((s,d)=>s+d.score,0);
    trackTurnEnd(state.cur,turnScore,busted,null);
    // next player
    setTimeout(()=>{
      state.cur=(state.cur+1)%state.players.length;
      state.dartIndex=0;state.turnDarts=[];state.turnStart=cp().remaining;
      state.aimX=CX;state.aimY=CY;state.sweepX=0;state.sweepY=0;state.phase='aim_x';
      renderTurn();updateCards();
      setMsg(`${cp().name} to throw. Remaining ${cp().remaining}. Lock side-to-side.`,'');
    },700);
  }
  function onLegWin(){
    const turnScore=state.turnDarts.reduce((s,d)=>s+d.score,0);
    const checkoutVal=state.turnStart; // points cleared this turn = the checkout
    trackTurnEnd(state.cur,turnScore,false,checkoutVal);
    cp().legs++;
    // close out each player's current-leg stats into their legs[]
    statTrack.forEach((t,i)=>{ t.legs.push({...t.cur,winner:i===state.cur}); t.cur=freshStats(); });
    updateCards();
    if(cp().legs>=LEGS_TO_WIN){ finishGame(); return; }
    // next leg — loser throws first
    setMsg(`${cp().name} takes the leg! ${cp().name} ${cp().legs}–${state.players.filter((_,i)=>i!==state.cur).map(p=>p.legs).join('/')}`,'win');
    setTimeout(()=>{
      state.leg++;
      state.players.forEach(p=>p.remaining=X01);
      state.cur=(state.cur+1)%state.players.length; // simple rotate to next starter
      state.dartIndex=0;state.turnDarts=[];state.turnStart=X01;
      state.aimX=CX;state.aimY=CY;state.sweepX=0;state.sweepY=0;state.phase='aim_x';
      buildPlayerCards();renderTurn();updateCards();
      setMsg(`Leg ${state.leg}. ${cp().name} to throw.`,'');
    },1400);
  }

  // ── Finish → save like a casual scorer game ────────────────────────────────
  async function finishGame(){
    state.phase='over';state.over=true;
    const winner=state.cur;
    const big=document.getElementById('bigOverlay');
    document.getElementById('bigTitle').textContent=`${cp().name.toUpperCase()} WINS!`;
    // Build savePickupGame payload (2-player attribution; pairs winner vs each opponent)
    let saveNote='';
    if(MODE==='casual'){
      try{
        // legs[] expects {winner, player1_stats, player2_stats} per the scorer's pickup format.
        // For 2 players we map p0->player1, p1->player2. (3+ players: save head as p1, best opponent as p2.)
        const p1=0, p2=(state.players.length>1?1:0);
        const legCount=Math.max(statTrack[p1].legs.length,1);
        const legs=[];
        for(let L=0;L<legCount;L++){
          const a=statTrack[p1].legs[L]||freshStats(), b=statTrack[p2].legs[L]||freshStats();
          legs.push({
            winner: a.winner?0:1,
            player1_stats:packStats(a),
            player2_stats:packStats(b)
          });
        }
        const payload={
          game_type:String(X01),
          players:[ {id:state.players[p1].id,name:state.players[p1].name,is_bot:!!state.players[p1].is_bot},
                    {id:state.players[p2].id,name:state.players[p2].name,is_bot:!!state.players[p2].is_bot} ],
          winner_index: winner===p1?0:1,
          legs,
          match_config:{ source:'aim-darts', x01:X01, doubleOut:OUT==='double', out_rule:OUT, in_rule:IN_RULE, best_of:LEGS_TO_WIN*2-1 }
        };
        const r=await fetch(FN_BASE+'/savePickupGame',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
        const j=await r.json().catch(()=>({}));
        saveNote = r.ok ? '✓ Saved to your casual games.' : ('Could not save: '+(j.error||r.status));
      }catch(e){ saveNote='Could not save game ('+e.message+').'; }
    }
    document.getElementById('bigSub').textContent =
      (LEGS_TO_WIN>1?`${state.players.map(p=>p.name+' '+p.legs).join('  ·  ')}\n`:'') + saveNote;
    big.classList.add('show');
  }
  function packStats(s){
    const darts=s.darts_thrown||0, pts=s.points_scored||0;
    return{
      darts_thrown:darts, points_scored:pts,
      three_dart_avg: darts>0 ? +((pts/darts)*3).toFixed(2) : 0,
      tons:s.tons||0, ton_40:s.ton_40||0, ton_80:s.ton_80||0,
      checkout:s.checkout||0, high_score:s.high_score||0,
      first9_darts:0,first9_points:0,checkout_attempts:s.checkout?1:0,checkout_darts:0
    };
  }

  // ── Input + loop ────────────────────────────────────────────────────────────
  function commit(){
    if(state.over)return;
    if(state.phase==='aim_x')lockX();
    else if(state.phase==='aim_y')lockY();
  }
  document.addEventListener('keydown',e=>{
    if(e.key===' '||e.key==='Enter'){e.preventDefault();commit();}
    if(e.key==='r'||e.key==='R')reset();
  });
  canvas.addEventListener('mousedown',commit);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();commit();},{passive:false});
  document.getElementById('adExit').addEventListener('click',exitGame);
  document.getElementById('bigExit').addEventListener('click',exitGame);
  document.getElementById('bigAgain').addEventListener('click',()=>{document.getElementById('bigOverlay').classList.remove('show');reset();});
  function exitGame(){
    try{ if(history.length>1){history.back();return;} }catch{}
    location.href='/pages/scorer-setup-vnext.html';
  }

  function update(){
    if(state.phase==='aim_x'){state.sweepX+=0.014*state.sweepDirX;if(state.sweepX>=1){state.sweepX=1;state.sweepDirX=-1}if(state.sweepX<=0){state.sweepX=0;state.sweepDirX=1}}
    else if(state.phase==='aim_y'){state.sweepY+=0.018*state.sweepDirY;if(state.sweepY>=1){state.sweepY=1;state.sweepDirY=-1}if(state.sweepY<=0){state.sweepY=0;state.sweepDirY=1}}
    else if(state.phase==='flight'&&state.flight){ if(performance.now()-state.flight.t0>=state.flight.dur) landDart(); }
  }
  function drawSweepers(){
    if(state.phase==='aim_x'){
      const x=AX0+state.sweepX*(AX1-AX0);
      ctx.strokeStyle='#FDD835';ctx.shadowColor='#FDD835';ctx.shadowBlur=12;ctx.lineWidth=R*0.01;
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();ctx.shadowBlur=0;
    }else if(state.phase==='aim_y'){
      ctx.strokeStyle='rgba(253,216,53,.4)';ctx.lineWidth=R*0.008;ctx.beginPath();ctx.moveTo(state.aimX,0);ctx.lineTo(state.aimX,H);ctx.stroke();
      const y=AY0+state.sweepY*(AY1-AY0);
      ctx.strokeStyle='#FDD835';ctx.shadowColor='#FDD835';ctx.shadowBlur=12;ctx.lineWidth=R*0.01;
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();ctx.shadowBlur=0;
    }
  }
  function drawDart(d,scale=1,alpha=1){
    ctx.save();ctx.globalAlpha=alpha;const L=R*0.07*scale;
    ctx.strokeStyle='#cfd3da';ctx.lineWidth=R*0.012*scale;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+L,d.y-L);ctx.stroke();
    ctx.fillStyle=d.bust?'#c8402a':(d.win?'#39ff14':'#FF469A');ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=8*scale;
    ctx.beginPath();ctx.moveTo(d.x+L,d.y-L);ctx.lineTo(d.x+L*1.32,d.y-L*0.85);ctx.lineTo(d.x+L*1.62,d.y-L*1.32);ctx.lineTo(d.x+L*1.32,d.y-L*1.62);ctx.lineTo(d.x+L*0.85,d.y-L*1.32);ctx.closePath();ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#e2e2e2';ctx.beginPath();ctx.arc(d.x,d.y,R*0.011*scale,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  function drawFlight(){
    const f=state.flight,p=Math.min(1,(performance.now()-f.t0)/f.dur),e=1-Math.pow(1-p,3),fromY=H+R*0.6;
    drawDart({x:f.toX,y:fromY+(f.toY-fromY)*e}, 0.5+0.85*e, 0.4+0.6*e);
  }
  function draw(){
    ctx.fillStyle='#0c1020';ctx.fillRect(0,0,W,H);
    DB.draw(ctx,CX,CY,R,{});
    state.turnDarts.forEach(d=>drawDart(d));
    if(state.phase==='flight'&&state.flight)drawFlight();
    if(state.phase==='aim_x'||state.phase==='aim_y')drawSweepers();
  }
  function loop(){update();draw();requestAnimationFrame(loop);}
  reset();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
