<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRDC Clubhouse VNext</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://us-central1-brdc-v2.cloudfunctions.net">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/home-vnext.css?v=52">
</head>
<body class="home-vnext-page has-mobile-nav">
    <main class="hv-shell" id="mainContent">

        <!-- ── 1. HEADLINE HERO + SNAPSHOT (profile launchpad) ───── -->
        <section class="hv-hero" aria-label="Home">
            <p class="hv-hero-kicker">BRDC Dashboard</p>
            <h1 class="hv-hero-title">Home</h1>
        </section>

        <a href="/pages/player-profile-vnext.html" id="welcomeStrip" class="hv-snapshot" aria-label="Your profile and stats">
            <p class="hv-snap-greet" id="welcomeTitle">Welcome back</p>
            <div class="hv-snap-stats" aria-label="Player glance stats">
                <div><strong id="identity3da">-</strong><span>3DA</span></div>
                <div><strong id="identityMpr">-</strong><span>MPR</span></div>
                <div><strong id="snapRank">-</strong><span>Rank</span></div>
                <div><strong id="snapChallenges">0</strong><span>Challenges</span></div>
            </div>
        </a>
        <!-- hidden inputs for JS that still query old IDs (null-safe) -->
        <input type="hidden" id="playerAvatar"><input type="hidden" id="identityWL">
        <input type="hidden" id="challengeBadgeWrap"><input type="hidden" id="challengeBadgeCount">
        <input type="hidden" id="identity3daBar"><input type="hidden" id="identity3daMprBar">
        <input type="hidden" id="identityMpr_bar"><input type="hidden" id="wlStatBlock">
        <input type="hidden" id="rankStatBlock"><input type="hidden" id="identityRank">
        <input type="hidden" id="authStatus"><input type="hidden" id="snapshotCard">
        <input type="hidden" id="quickProfileLink">

        <!-- ── Live now banner (hidden until a live stream is active) ── -->
        <a id="liveNowBanner" class="hv-live-banner" href="#" style="display:none" aria-label="Watch the live stream"></a>

        <!-- ── 2. UP NEXT (League launchpad) ─────────────────────── -->
        <section class="hv-section hv-upnext-section" aria-label="Up next">
            <div id="upNextHero" class="hv-upnext-hero">
                <div class="hv-skeleton tall"></div>
            </div>
        </section>

        <!-- ── 3. NUDGE (Messages + Play now) ─────────────────────── -->
        <!-- Messages half: hidden until JS populates; Play now half: always rendered by JS -->
        <section class="hv-section hv-nudge-section" id="nudgeSection" aria-label="What's happening">
        </section>

        <!-- ── 4. WHAT'S NEXT FOR YOU ────────────────────────────── -->
        <section class="hv-section hv-registrations-section" aria-label="Your events and leagues">
            <article class="hv-card hv-registrations-card" id="registrationsCard">
                <div class="hv-skeleton"></div>
            </article>
        </section>

    </main>

    <script type="module" src="/js/home-vnext.js?v=60"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script>
        initBRDCNavigation({
            page: 'dashboard',
            pageTitle: 'BRDC Dashboard',
            showBreadcrumbs: false,
            showBackButton: false
        });
    </script>
</body>
</html>
