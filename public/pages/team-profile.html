<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Profile - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF469A">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/print.css">
    <link rel="stylesheet" href="/css/team-profile.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&family=Oswald:wght@400;500;600&display=swap');
    </style>
</head>
<body class="fb-page">

<div class="team-container" id="mainContent">
    <!-- Skeleton loading state -->
    <div class="sk-header-panel">
        <div class="sk-header-top">
            <div class="skeleton sk-team-icon"></div>
            <div class="sk-team-info">
                <div class="skeleton sk-name-line"></div>
                <div class="skeleton sk-meta-line"></div>
            </div>
            <div class="sk-badges-col">
                <div class="skeleton sk-badge-lg"></div>
                <div class="skeleton sk-badge-sm"></div>
            </div>
        </div>
        <div class="sk-stats-bar">
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
            <div class="skeleton sk-stat-cell"></div>
        </div>
    </div>
    <div class="sk-tabs-bar">
        <div class="skeleton sk-tab"></div>
        <div class="skeleton sk-tab"></div>
        <div class="skeleton sk-tab"></div>
        <div class="skeleton sk-tab"></div>
    </div>
    <div class="sk-body">
        <div class="skeleton sk-row"></div>
        <div class="skeleton sk-row"></div>
        <div class="skeleton sk-row sk-row-last"></div>
    </div>
</div>

<script src="/js/a11y-helpers.js"></script>
<script type="module">
    import { db, doc, getDoc, collection, getDocs } from '/js/firebase-config.js';

    const urlParams = new URLSearchParams(window.location.search);
    const leagueId = urlParams.get('league_id') || urlParams.get('id');
    const teamId = urlParams.get('team_id');

    let leagueData = null;
    let teamData = null;
    let allPlayers = [];       // All league players
    let teamPlayers = [];      // Players on this team only
    let allTeams = [];         // All teams in league
    let teamsById = new Map(); // teamId -> { name, ... }
    let allMatches = [];       // All league matches
    let teamMatches = [];      // Matches for this team
    let statsByPlayerId = {};  // playerId -> stats doc
    let selectedLevel = 'all';

    // ===== UTILITY =====
    function getOrdinal(n) {
        if (!n || n <= 0) return '';
        const s = ['th','st','nd','rd'];
        const v = n % 100;
        return n + (s[(v-20)%10] || s[v] || s[0]);
    }

    function formatDate(dateVal) {
        if (!dateVal) return 'TBD';
        const date = dateVal.toDate ? dateVal.toDate() : new Date(dateVal);
        if (isNaN(date.getTime())) return 'TBD';
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatLeagueName(name) {
        if (!name) return 'League';
        return name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    // ===== DATA LOADING =====
    async function loadData() {
        if (!leagueId || !teamId) {
            document.getElementById('mainContent').innerHTML =
                '<div class="empty-state">Missing team or league ID</div>';
            return;
        }
        try {
            // Parallel load: league + team + all teams + all players + all stats + all matches
            const [leagueDoc, teamDoc, teamsSnap, playersSnap, statsSnap, matchesSnap] = await Promise.all([
                getDoc(doc(db, 'leagues', leagueId)),
                getDoc(doc(db, 'leagues', leagueId, 'teams', teamId)),
                getDocs(collection(db, 'leagues', leagueId, 'teams')),
                getDocs(collection(db, 'leagues', leagueId, 'players')),
                getDocs(collection(db, 'leagues', leagueId, 'stats')),
                getDocs(collection(db, 'leagues', leagueId, 'matches'))
            ]);

            if (!leagueDoc.exists()) throw new Error('League not found');
            if (!teamDoc.exists()) throw new Error('Team not found');

            leagueData = leagueDoc.data();
            teamData = { id: teamId, ...teamDoc.data() };

            // Build teamsById map for opponent name resolution
            allTeams = teamsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            allTeams.forEach(t => teamsById.set(t.id, t));

            // Build statsByPlayerId
            statsSnap.forEach(d => { statsByPlayerId[d.id] = d.data(); });

            // Build allPlayers and teamPlayers
            allPlayers = playersSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            teamPlayers = allPlayers
                .filter(p => p.team_id === teamId)
                .map(p => ({
                    ...p,
                    is_captain: teamData.captain_id === p.id
                }))
                .sort((a, b) => {
                    // Captain first within position, then by position
                    if (a.is_captain && !b.is_captain) return -1;
                    if (b.is_captain && !a.is_captain) return 1;
                    return (a.position || 99) - (b.position || 99);
                });

            // All matches
            allMatches = matchesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            teamMatches = allMatches.filter(m =>
                m.home_team_id === teamId || m.away_team_id === teamId
            );

            renderPage();
        } catch (err) {
            console.error('Error loading team profile:', err);
            document.getElementById('mainContent').innerHTML =
                `<div class="empty-state">${err.message || 'Error loading data'}</div>`;
        }
    }

    // ===== STANDINGS / RECORDS COMPUTATION =====
    function computeStandings() {
        const records = {};
        allTeams.forEach(t => {
            records[t.id] = { wins: 0, losses: 0, setsWon: 0, setsLost: 0 };
        });

        allMatches.forEach(m => {
            if (m.status !== 'completed') return;
            if (!records[m.home_team_id]) records[m.home_team_id] = { wins:0, losses:0, setsWon:0, setsLost:0 };
            if (!records[m.away_team_id]) records[m.away_team_id] = { wins:0, losses:0, setsWon:0, setsLost:0 };

            const hs = m.home_score || 0;
            const as = m.away_score || 0;
            if (hs > as) {
                records[m.home_team_id].wins++;
                records[m.away_team_id].losses++;
            } else if (as > hs) {
                records[m.away_team_id].wins++;
                records[m.home_team_id].losses++;
            }
            records[m.home_team_id].setsWon += hs;
            records[m.home_team_id].setsLost += as;
            records[m.away_team_id].setsWon += as;
            records[m.away_team_id].setsLost += hs;
        });

        // Sort: wins desc -> setsWon desc
        return allTeams
            .map(t => ({ ...t, ...(records[t.id] || {}) }))
            .sort((a, b) => {
                if (b.wins !== a.wins) return b.wins - a.wins;
                if (a.losses !== b.losses) return a.losses - b.losses;
                return (b.setsWon || 0) - (a.setsWon || 0);
            });
    }

    // ===== TEAM AVG STATS (for standings columns) =====
    function computeTeamAvgStats(tId, playersList) {
        const roster = playersList.filter(p => p.team_id === tId);
        let total3DA = 0, count3DA = 0, totalMPR = 0, countMPR = 0;
        roster.forEach(p => {
            const stats = statsByPlayerId[p.id] || {};
            const avg = get3DA(stats);
            const mpr = getMPR(stats);
            if (avg > 0) { total3DA += avg; count3DA++; }
            if (mpr > 0) { totalMPR += mpr; countMPR++; }
        });
        return {
            avg3DA: count3DA > 0 ? total3DA / count3DA : 0,
            avgMPR: countMPR > 0 ? totalMPR / countMPR : 0
        };
    }

    // ===== CALCULATE TEAM STATS (for header + stats tab) =====
    function calculateTeamStats(levelFilter) {
        const filtered = levelFilter === 'all'
            ? teamPlayers
            : teamPlayers.filter(p => p.level === levelFilter);

        let total3DA = 0, count3DA = 0;
        let totalMPR = 0, countMPR = 0;
        let x01LegsWon = 0, x01LegsPlayed = 0;
        let cricketLegsWon = 0, cricketLegsPlayed = 0;
        let highCheckout = 0, highCheckoutPlayer = '';

        filtered.forEach(p => {
            const stats = statsByPlayerId[p.id] || {};
            const avg = get3DA(stats);
            const mpr = getMPR(stats);
            if (avg > 0) { total3DA += avg; count3DA++; }
            if (mpr > 0) { totalMPR += mpr; countMPR++; }
            x01LegsWon += stats.x01_legs_won || 0;
            x01LegsPlayed += stats.x01_legs_played || 0;
            cricketLegsWon += stats.cricket_legs_won || 0;
            cricketLegsPlayed += stats.cricket_legs_played || 0;
            if ((stats.high_checkout || 0) > highCheckout) {
                highCheckout = stats.high_checkout;
                highCheckoutPlayer = p.name;
            }
        });

        const totalLegsWon = x01LegsWon + cricketLegsWon;
        const totalLegsPlayed = x01LegsPlayed + cricketLegsPlayed;

        return {
            playerCount: filtered.length,
            avg3DA: count3DA > 0 ? total3DA / count3DA : 0,
            avgMPR: countMPR > 0 ? totalMPR / countMPR : 0,
            totalLegsWon, totalLegsPlayed,
            x01LegsWon, x01LegsPlayed,
            cricketLegsWon, cricketLegsPlayed,
            legWinPct: totalLegsPlayed > 0 ? (totalLegsWon / totalLegsPlayed * 100).toFixed(1) : '0.0',
            highCheckout, highCheckoutPlayer,
            filteredPlayers: filtered
        };
    }

    // ===== RENDER PAGE =====
    function renderPage() {
        const standings = computeStandings();
        const teamRank = standings.findIndex(t => t.id === teamId) + 1;
        const teamRecord = standings.find(t => t.id === teamId) || {};
        const wins = teamRecord.wins || 0;
        const losses = teamRecord.losses || 0;
        const setsWon = teamRecord.setsWon || 0;
        const setsLost = teamRecord.setsLost || 0;

        const allStats = calculateTeamStats('all');
        const legWinPct = allStats.legWinPct;

        const leagueName = formatLeagueName(leagueData.name || leagueData.league_name || '');
        const teamName = teamData.name || teamData.team_name || 'Unknown Team';

        document.getElementById('mainContent').innerHTML = `
            <div class="team-header-card">
                <div class="team-header-top">
                    <div class="team-icon">&#127919;</div>
                    <div class="team-info">
                        <div class="team-name">${teamName}</div>
                        <div class="team-meta">
                            <a href="/pages/league-view.html?league_id=${leagueId}">${leagueName}</a>
                        </div>
                    </div>
                    <div class="team-badges">
                        ${teamRank > 0 ? `<span class="team-standing-badge">${getOrdinal(teamRank)} Place</span>` : ''}
                        <span class="team-record-badge">${wins}-${losses}</span>
                    </div>
                </div>

                <div class="team-stats-bar">
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${wins}</span>
                        <span class="team-stat-label">Wins</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${losses}</span>
                        <span class="team-stat-label">Losses</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${setsWon}</span>
                        <span class="team-stat-label">Sets Won</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${setsLost}</span>
                        <span class="team-stat-label">Sets Lost</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${legWinPct}%</span>
                        <span class="team-stat-label">Leg Win%</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${allStats.avg3DA > 0 ? allStats.avg3DA.toFixed(1) : '-'}</span>
                        <span class="team-stat-label">3DA</span>
                    </div>
                    <div class="team-stat-cell">
                        <span class="team-stat-value">${allStats.avgMPR > 0 ? allStats.avgMPR.toFixed(2) : '-'}</span>
                        <span class="team-stat-label">MPR</span>
                    </div>
                </div>

                <div class="team-back-row">
                    <a href="/pages/league-view.html?league_id=${leagueId}" class="team-back-link">&#8592; Back to League</a>
                </div>
            </div>

            <div class="tabs" role="tablist" aria-label="Team sections">
                <button type="button" class="tab active" role="tab" aria-selected="true" onclick="switchTab('roster')">ROSTER</button>
                <button type="button" class="tab" role="tab" aria-selected="false" onclick="switchTab('stats')">STATS</button>
                <button type="button" class="tab" role="tab" aria-selected="false" onclick="switchTab('matches')">MATCHES</button>
                <button type="button" class="tab" role="tab" aria-selected="false" onclick="switchTab('standings')">STANDINGS</button>
            </div>

            <div id="rosterTab" class="tab-content active">
                ${renderRoster()}
            </div>
            <div id="statsTab" class="tab-content">
                ${renderStats(allStats)}
            </div>
            <div id="matchesTab" class="tab-content">
                ${renderMatches(standings)}
            </div>
            <div id="standingsTab" class="tab-content">
                ${renderStandings(standings)}
            </div>
        `;

        if (window.A11y) A11y.initTabs('.tabs', { tabSelector: '.tab', label: 'Team sections' });
    }

    // ===== RENDER ROSTER =====
    function renderRoster() {
        if (teamPlayers.length === 0) {
            return '<div class="empty-state">No players on roster</div>';
        }

        const rows = teamPlayers.map(p => {
            const stats = statsByPlayerId[p.id] || {};
            const avg = get3DA(stats);
            const mpr = getMPR(stats);
            const totalWon = (stats.x01_legs_won || 0) + (stats.cricket_legs_won || 0);
            const totalPlayed = (stats.x01_legs_played || 0) + (stats.cricket_legs_played || 0);
            const winPct = totalPlayed > 0 ? ((totalWon / totalPlayed) * 100).toFixed(0) + '%' : '-';
            const legStr = totalPlayed > 0 ? `${totalWon}/${totalPlayed}` : '-';

            const pos = p.position;
            let posBadge;
            if (pos === 1) posBadge = '<span class="roster-pos-badge p1">P1</span>';
            else if (pos === 2) posBadge = '<span class="roster-pos-badge p2">P2</span>';
            else if (pos === 3) posBadge = '<span class="roster-pos-badge p3">P3</span>';
            else posBadge = '<span class="roster-pos-badge none">&#8212;</span>';

            return `
                <tr class="${p.is_captain ? 'captain-row' : ''}">
                    <td>${posBadge}</td>
                    <td>
                        <a class="roster-player-link" href="/pages/player-profile.html?player_id=${p.id}&league_id=${leagueId}">
                            <span class="roster-player-name">${p.name || 'Unknown'}</span>
                        </a>
                        ${p.level ? `<span class="roster-level-badge ${p.level}">${p.level}</span>` : ''}
                        ${p.is_captain ? '<span class="roster-captain-badge">C</span>' : ''}
                    </td>
                    <td class="numeric">${avg > 0 ? avg.toFixed(1) : '-'}</td>
                    <td class="numeric">${mpr > 0 ? mpr.toFixed(2) : '-'}</td>
                    <td class="numeric">${winPct}</td>
                    <td class="numeric">${legStr}</td>
                </tr>
            `;
        }).join('');

        return `
            <div class="roster-table-wrap">
                <table class="roster-table">
                    <thead>
                        <tr>
                            <th>POS</th>
                            <th>PLAYER</th>
                            <th class="numeric">3DA</th>
                            <th class="numeric">MPR</th>
                            <th class="numeric">WIN%</th>
                            <th class="numeric">LEGS</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    }

    // ===== RENDER STATS =====
    function renderStats(teamStats) {
        const hasA = teamPlayers.some(p => p.level === 'A');
        const hasB = teamPlayers.some(p => p.level === 'B');
        const hasC = teamPlayers.some(p => p.level === 'C');

        const filtered = teamStats.filteredPlayers;

        // Leaderboard helper
        function makeLeaderboard(players, getValue, format) {
            const sorted = [...players]
                .map(p => ({ ...p, value: getValue(statsByPlayerId[p.id] || {}) }))
                .filter(p => p.value > 0)
                .sort((a, b) => b.value - a.value)
                .slice(0, 3);
            if (!sorted.length) return '<div class="empty-state empty-state-card">No data yet</div>';
            return sorted.map((p, i) => `
                <div class="leaderboard-row">
                    <span class="lb-rank ${i===0?'gold':i===1?'silver':'bronze'}">${i+1}</span>
                    <span class="lb-name">${p.name}</span>
                    <span class="lb-value">${format(p.value)}</span>
                </div>
            `).join('');
        }

        // Win% leaderboard (min 5 legs played)
        const winPctPlayers = [...filtered]
            .map(p => {
                const stats = statsByPlayerId[p.id] || {};
                const won = (stats.x01_legs_won || 0) + (stats.cricket_legs_won || 0);
                const played = (stats.x01_legs_played || 0) + (stats.cricket_legs_played || 0);
                return { ...p, value: played >= 5 ? (won / played * 100) : -1 };
            })
            .filter(p => p.value >= 0)
            .sort((a, b) => b.value - a.value)
            .slice(0, 3);

        const hasTons = filtered.some(p => {
            const stats = statsByPlayerId[p.id] || {};
            return (stats.tons_100 || stats.tons_140 || stats.tons_180);
        });

        const x01WinPct = teamStats.x01LegsPlayed > 0
            ? (teamStats.x01LegsWon / teamStats.x01LegsPlayed * 100).toFixed(1) : '0.0';
        const cricketWinPct = teamStats.cricketLegsPlayed > 0
            ? (teamStats.cricketLegsWon / teamStats.cricketLegsPlayed * 100).toFixed(1) : '0.0';

        // High checkout top-3 for 501 card
        const checkoutLeaders = [...filtered]
            .map(p => ({ ...p, value: statsByPlayerId[p.id]?.high_checkout || 0 }))
            .filter(p => p.value > 0)
            .sort((a, b) => b.value - a.value)
            .slice(0, 3);

        return `
            <div class="level-filter-bar">
                <button class="level-btn ${selectedLevel === 'all' ? 'active' : ''}" onclick="setStatsLevel('all')">TEAM</button>
                ${hasA ? `<button class="level-btn level-A ${selectedLevel === 'A' ? 'active' : ''}" onclick="setStatsLevel('A')">A PLAYERS</button>` : ''}
                ${hasB ? `<button class="level-btn level-B ${selectedLevel === 'B' ? 'active' : ''}" onclick="setStatsLevel('B')">B PLAYERS</button>` : ''}
                ${hasC ? `<button class="level-btn level-C ${selectedLevel === 'C' ? 'active' : ''}" onclick="setStatsLevel('C')">C PLAYERS</button>` : ''}
            </div>

            <div class="stats-grid">
                <div class="stats-card">
                    <div class="stats-card-header">${selectedLevel === 'all' ? 'TEAM' : 'LEVEL ' + selectedLevel} PERFORMANCE</div>
                    <div class="stats-card-body">
                        <div class="stats-row"><span class="label">Players</span><span class="value">${teamStats.playerCount}</span></div>
                        <div class="stats-row"><span class="label">Legs Won</span><span class="value">${teamStats.totalLegsWon}</span></div>
                        <div class="stats-row"><span class="label">Legs Played</span><span class="value">${teamStats.totalLegsPlayed}</span></div>
                        <div class="stats-row"><span class="label">Leg Win%</span><span class="value">${teamStats.legWinPct}%</span></div>
                        <div class="stats-row"><span class="label">Avg 3DA</span><span class="value">${teamStats.avg3DA > 0 ? teamStats.avg3DA.toFixed(1) : '-'}</span></div>
                        <div class="stats-row"><span class="label">Avg MPR</span><span class="value">${teamStats.avgMPR > 0 ? teamStats.avgMPR.toFixed(2) : '-'}</span></div>
                        <div class="stats-row"><span class="label">501 Leg Win%</span><span class="value">${x01WinPct}%</span></div>
                        <div class="stats-row"><span class="label">Cricket Leg Win%</span><span class="value">${cricketWinPct}%</span></div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">501 PERFORMANCE</div>
                    <div class="stats-card-body">
                        <div class="stats-row"><span class="label">Legs Won</span><span class="value">${teamStats.x01LegsWon}</span></div>
                        <div class="stats-row"><span class="label">Legs Played</span><span class="value">${teamStats.x01LegsPlayed}</span></div>
                        <div class="stats-row"><span class="label">Win%</span><span class="value">${x01WinPct}%</span></div>
                        ${teamStats.highCheckout > 0 ? `
                        <div class="stats-row"><span class="label">High Checkout</span><span class="value">${teamStats.highCheckout}</span></div>
                        <div class="stats-row"><span class="label">By</span><span class="value value-sm">${teamStats.highCheckoutPlayer}</span></div>
                        ` : ''}
                        ${checkoutLeaders.length > 1 ? checkoutLeaders.map((p, i) => `
                            <div class="leaderboard-row">
                                <span class="lb-rank ${i===0?'gold':i===1?'silver':'bronze'}">${i+1}</span>
                                <span class="lb-name">${p.name}</span>
                                <span class="lb-value">${p.value}</span>
                            </div>
                        `).join('') : ''}
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">CRICKET PERFORMANCE</div>
                    <div class="stats-card-body">
                        <div class="stats-row"><span class="label">Legs Won</span><span class="value">${teamStats.cricketLegsWon}</span></div>
                        <div class="stats-row"><span class="label">Legs Played</span><span class="value">${teamStats.cricketLegsPlayed}</span></div>
                        <div class="stats-row"><span class="label">Win%</span><span class="value">${cricketWinPct}%</span></div>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">BEST 3-DART AVG</div>
                    <div class="stats-card-body">
                        ${makeLeaderboard(filtered, s => get3DA(s), v => v.toFixed(1))}
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">BEST MPR</div>
                    <div class="stats-card-body">
                        ${makeLeaderboard(filtered, s => getMPR(s), v => v.toFixed(2))}
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">MOST LEGS WON</div>
                    <div class="stats-card-body">
                        ${makeLeaderboard(filtered, s => (s.x01_legs_won||0) + (s.cricket_legs_won||0), v => String(v))}
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stats-card-header">BEST WIN% (MIN 5 LEGS)</div>
                    <div class="stats-card-body">
                        ${winPctPlayers.length > 0 ? winPctPlayers.map((p, i) => `
                            <div class="leaderboard-row">
                                <span class="lb-rank ${i===0?'gold':i===1?'silver':'bronze'}">${i+1}</span>
                                <span class="lb-name">${p.name}</span>
                                <span class="lb-value">${p.value.toFixed(1)}%</span>
                            </div>
                        `).join('') : '<div class="empty-state empty-state-card">No data yet</div>'}
                    </div>
                </div>

                ${hasTons ? `
                <div class="stats-card">
                    <div class="stats-card-header">TON COUNTS</div>
                    <div class="stats-card-body">
                        ${makeLeaderboard(filtered, s => (s.tons_180||0), v => String(v) + ' x 180')}
                        ${makeLeaderboard(filtered, s => (s.tons_140||0), v => String(v) + ' x 140+')}
                        ${makeLeaderboard(filtered, s => (s.tons_100||0), v => String(v) + ' x 100+')}
                    </div>
                </div>
                ` : ''}
            </div>
        `;
    }

    // ===== RENDER MATCHES =====
    function renderMatches(standings) {
        const completed = teamMatches
            .filter(m => m.status === 'completed')
            .sort((a, b) => (b.week || 0) - (a.week || 0));
        const upcoming = teamMatches
            .filter(m => m.status !== 'completed')
            .sort((a, b) => (a.week || 0) - (b.week || 0));

        if (!teamMatches.length) {
            return '<div class="empty-state">No matches scheduled</div>';
        }

        let html = '';
        if (completed.length) {
            html += '<div class="match-section-label completed">COMPLETED MATCHES</div>';
            html += completed.map(m => renderMatchCard(m, standings)).join('');
        }
        if (upcoming.length) {
            html += '<div class="match-section-label upcoming">UPCOMING MATCHES</div>';
            html += upcoming.map(m => renderMatchCard(m, standings)).join('');
        }
        return html;
    }

    function renderMatchCard(match, standings) {
        const isHome = match.home_team_id === teamId;
        const isCompleted = match.status === 'completed';
        const hs = match.home_score || 0;
        const as = match.away_score || 0;
        const homeWon = isCompleted && hs > as;
        const awayWon = isCompleted && as > hs;
        const weWon = (isHome && homeWon) || (!isHome && awayWon);

        // Resolve team names via teamsById Map
        const homeTeamObj = teamsById.get(match.home_team_id) || {};
        const awayTeamObj = teamsById.get(match.away_team_id) || {};
        const homeTeamName = homeTeamObj.name || homeTeamObj.team_name || 'Unknown Team';
        const awayTeamName = awayTeamObj.name || awayTeamObj.team_name || 'Unknown Team';

        // Records from standings
        const homeStanding = standings.find(t => t.id === match.home_team_id) || {};
        const awayStanding = standings.find(t => t.id === match.away_team_id) || {};
        const homeRank = standings.findIndex(t => t.id === match.home_team_id) + 1;
        const awayRank = standings.findIndex(t => t.id === match.away_team_id) + 1;
        const homeRecord = `${homeStanding.wins || 0}-${homeStanding.losses || 0}`;
        const awayRecord = `${awayStanding.wins || 0}-${awayStanding.losses || 0}`;

        // Team averages
        const homeAvgStats = computeTeamAvgStats(match.home_team_id, allPlayers);
        const awayAvgStats = computeTeamAvgStats(match.away_team_id, allPlayers);
        const homeAvgStr = homeAvgStats.avg3DA > 0 ? `${homeAvgStats.avg3DA.toFixed(1)} / ${homeAvgStats.avgMPR.toFixed(2)}` : '';
        const awayAvgStr = awayAvgStats.avg3DA > 0 ? `${awayAvgStats.avg3DA.toFixed(1)} / ${awayAvgStats.avgMPR.toFixed(2)}` : '';

        const cardClass = !isCompleted ? 'upcoming' : weWon ? 'win' : 'loss';
        const homeIsUs = match.home_team_id === teamId;
        const awayIsUs = match.away_team_id === teamId;

        return `
            <div class="match-card ${cardClass}">
                <div class="match-card-header ${isCompleted ? 'completed' : ''}">
                    <div class="winner-star-slot">
                        ${isCompleted && homeWon ? '<span class="winner-star">&#9733;</span>' : ''}
                    </div>

                    <div class="match-team-side left">
                        <div class="match-team-meta">
                            <span class="match-team-record">(${homeRecord})</span>
                            ${homeRank > 0 ? `<span class="match-team-standing">${getOrdinal(homeRank)}</span>` : ''}
                        </div>
                        <div class="match-team-name ${homeWon ? 'winner' : ''} ${homeIsUs ? 'our-team' : ''}">${homeTeamName}</div>
                        ${homeAvgStr ? `<div class="match-team-avgs">${homeAvgStr}</div>` : ''}
                    </div>

                    ${isCompleted ? `<div class="match-header-score ${homeWon ? 'winner' : ''}">${hs}</div>` : ''}

                    <div class="match-header-center">
                        <div class="match-week">WEEK ${match.week || '?'}${leagueData.num_weeks ? '/' + leagueData.num_weeks : ''}</div>
                        <div class="match-status ${isCompleted ? 'final' : ''}">${isCompleted ? 'FINAL' : (isHome ? 'VS' : '@')}</div>
                    </div>

                    ${isCompleted ? `<div class="match-header-score ${awayWon ? 'winner' : ''}">${as}</div>` : ''}

                    <div class="match-team-side right">
                        <div class="match-team-meta">
                            ${awayRank > 0 ? `<span class="match-team-standing">${getOrdinal(awayRank)}</span>` : ''}
                            <span class="match-team-record">(${awayRecord})</span>
                        </div>
                        <div class="match-team-name ${awayWon ? 'winner' : ''} ${awayIsUs ? 'our-team' : ''}">${awayTeamName}</div>
                        ${awayAvgStr ? `<div class="match-team-avgs">${awayAvgStr}</div>` : ''}
                    </div>

                    <div class="winner-star-slot">
                        ${isCompleted && awayWon ? '<span class="winner-star">&#9733;</span>' : ''}
                    </div>
                </div>

                <div class="match-card-footer">
                    <span class="match-footer-date">${formatDate(match.match_date)}</span>
                    <button class="match-view-btn" onclick="viewMatch('${match.id}')">
                        ${isCompleted ? 'VIEW REPORT' : 'VIEW MATCH'}
                    </button>
                    <div>
                        ${isCompleted && weWon ? '<span class="match-result-badge win">WIN</span>' : ''}
                        ${isCompleted && !weWon ? '<span class="match-result-badge loss">LOSS</span>' : ''}
                    </div>
                </div>
            </div>
        `;
    }

    // ===== RENDER STANDINGS =====
    function renderStandings(standings) {
        if (!standings.length) {
            return '<div class="empty-state">No standings available</div>';
        }

        const rows = standings.map((t, i) => {
            const rank = i + 1;
            const isCurrent = t.id === teamId;
            const teamAvgStats = computeTeamAvgStats(t.id, allPlayers);
            const tName = t.name || t.team_name || 'Unknown Team';
            const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';

            return `
                <tr class="${isCurrent ? 'current-team' : ''}">
                    <td><span class="standings-rank ${rankClass}">${rank}</span></td>
                    <td>
                        <a class="standings-team-link" href="/pages/team-profile.html?league_id=${leagueId}&team_id=${t.id}">${tName}</a>
                    </td>
                    <td class="numeric">${t.wins || 0}</td>
                    <td class="numeric">${t.losses || 0}</td>
                    <td class="numeric">${t.setsWon || 0}</td>
                    <td class="numeric">${teamAvgStats.avg3DA > 0 ? teamAvgStats.avg3DA.toFixed(1) : '-'}</td>
                    <td class="numeric">${teamAvgStats.avgMPR > 0 ? teamAvgStats.avgMPR.toFixed(2) : '-'}</td>
                </tr>
            `;
        }).join('');

        return `
            <div class="standings-wrap">
                <table class="standings-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>TEAM</th>
                            <th class="numeric">W</th>
                            <th class="numeric">L</th>
                            <th class="numeric">SETS</th>
                            <th class="numeric">3DA</th>
                            <th class="numeric">MPR</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    }

    // ===== TAB SWITCHING (fixed: no event.target) =====
    window.switchTab = function(tabName) {
        document.querySelectorAll('.tab').forEach(t => {
            const isActive = t.getAttribute('onclick') === `switchTab('${tabName}')`;
            t.classList.toggle('active', isActive);
            t.setAttribute('aria-selected', String(isActive));
        });
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(tabName + 'Tab');
        if (target) target.classList.add('active');
    };

    window.setStatsLevel = function(level) {
        selectedLevel = level;
        const stats = calculateTeamStats(level);
        document.getElementById('statsTab').innerHTML = renderStats(stats);
    };

    window.viewMatch = function(matchId) {
        window.location.href = `/pages/match-hub.html?league_id=${leagueId}&match_id=${matchId}`;
    };

    loadData();
</script>

<script src="/js/display-helpers.js"></script>

    initBRDCNavigation({ page: 'team-profile', backUrl: _navBackUrl });
</script>
