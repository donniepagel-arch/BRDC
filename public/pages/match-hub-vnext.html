<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Report VNext - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/match-hub-vnext.css?v=4">
</head>
<body class="mhv-page match-hub-vnext-page has-mobile-nav">
    <main class="mhv-shell" id="mainContent">
        <section class="mhv-hero" id="matchHero">
            <div class="mhv-loading">Loading match report...</div>
        </section>

        <section class="mhv-card mhv-score-card" id="scoreCard"></section>

        <section class="mhv-card mhv-view-card">
            <nav class="mhv-tabs" aria-label="Match report views">
                <button type="button" class="active" data-view-target="sets">Sets</button>
                <button type="button" data-view-target="performance">Performance</button>
                <button type="button" data-view-target="awards">Awards</button>
                <button type="button" data-view-target="leaders">Leaders</button>
                <button type="button" data-view-target="rosters">Rosters</button>
                <button type="button" data-view-target="context">Context</button>
            </nav>

            <div class="mhv-pane active" data-view-pane="sets">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">Match flow</p>
                        <h2>Sets</h2>
                    </div>
                    <div class="mhv-sets-head-tools">
                        <span id="setCountBadge">-</span>
                        <button type="button" id="setsExpandAll" hidden>Expand all</button>
                    </div>
                </div>
                <div id="setsList" class="mhv-set-list"></div>
            </div>

            <div class="mhv-pane" data-view-pane="awards">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">Match counts</p>
                        <h2>Awards</h2>
                    </div>
                    <span>'01 / Cricket</span>
                </div>
                <div id="awardsContainer" class="mhv-counts-wrap"></div>
            </div>

            <div class="mhv-pane" data-view-pane="leaders">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">This match only</p>
                        <h2>Leaders</h2>
                    </div>
                    <span>'01 / Cricket</span>
                </div>
                <div id="leadersContainer" class="mhv-counts-wrap"></div>
            </div>

            <div class="mhv-pane" data-view-pane="performance">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">Stats</p>
                        <h2>Performance</h2>
                    </div>
                    <span>01 / Cricket</span>
                </div>
                <div id="performanceGrid" class="mhv-performance-grid"></div>
            </div>

            <div class="mhv-pane" data-view-pane="rosters">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">Lineups</p>
                        <h2>Rosters</h2>
                    </div>
                    <span>A / B / C</span>
                </div>
                <div id="rosterGrid" class="mhv-roster-grid"></div>
            </div>

            <div class="mhv-pane" data-view-pane="context">
                <div class="mhv-section-head">
                    <div>
                        <p class="mhv-kicker">Details</p>
                        <h2>Match context</h2>
                    </div>
                    <a id="leagueMatchLink" href="/pages/triples-vnext.html">League hub</a>
                </div>
                <div id="contextList" class="mhv-context-list"></div>
            </div>
        </section>
    </main>

    <script type="module" src="/js/match-hub-vnext.js?v=8"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script>
        initBRDCNavigation({
            page: 'league',
            pageTitle: 'Match Report',
            showBreadcrumbs: false,
            showBackButton: true
        });
    </script>
</body>
</html>
