<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dart Trader VNext - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=15">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
</head>
<body class="vnext-light-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker">Marketplace</p>
                <h1>Dart Trader</h1>
                <p id="traderStatus">Loading listings...</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" href="/pages/dart-trader-create-vnext.html">Create listing</a>
                <a class="ves-action" href="/pages/messages-vnext.html">Ask around</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Marketplace summary">
            <article>
                <span id="activeListingCount">-</span>
                <strong>Active listings</strong>
                <em>Gear currently visible in the marketplace.</em>
            </article>
            <article>
                <span id="categoryCount">-</span>
                <strong>Categories</strong>
                <em>Darts, flights, shafts, boards, cases, accessories.</em>
            </article>
            <article>
                <span id="tradeCount">-</span>
                <strong>Trade options</strong>
                <em>Listings without a fixed price.</em>
            </article>
        </section>

        <section class="ves-filters" id="categoryFilters">
            <button class="active" type="button" data-category="all">All</button>
            <button type="button" data-category="darts">Darts</button>
            <button type="button" data-category="flights">Flights</button>
            <button type="button" data-category="shafts">Shafts</button>
            <button type="button" data-category="cases">Cases</button>
            <button type="button" data-category="boards">Boards</button>
            <button type="button" data-category="accessories">Accessories</button>
        </section>

        <section class="ves-grid" id="listingGrid">
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
        </section>
    </main>

    <script src="/js/brdc-toast.js"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/dart-trader-vnext.js?v=3"></script>
    <script>
        initBRDCNavigation({ page: 'trader', pageTitle: 'Dart Trader', showBreadcrumbs: false, showBackButton: true });
    </script>
</body>
</html>
