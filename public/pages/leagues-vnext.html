<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Leagues - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#f7f1e8">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=19">

    <style>
        /* ─── page shell: parchment + dot grid, same treatment as triples-vnext ─── */
        :root {
            --lv-bg: #f7f1e8;
            --lv-paper: #fffaf2;
            --lv-ink: #172033;
            --lv-soft: #536078;
            --lv-muted: #8790a2;
            --lv-line: rgba(23, 32, 51, 0.14);
            --lv-pink: #ed3f91;
            --lv-blue: #147f9f;
            --lv-green: #21a66b;
            --lv-gold: #d69b22;
            --lv-radius: 20px;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body.leagues-vnext-page {
            margin: 0;
            min-height: 100vh;
            padding: 82px 0 max(118px, calc(96px + env(safe-area-inset-bottom)));
            /* Warm Clubhouse-family background (matches Home/Events/Clubhouse) */
            background-image:
                radial-gradient(circle at top left, rgba(244, 63, 147, 0.13), transparent 30rem),
                repeating-linear-gradient(45deg, rgba(94, 72, 45, 0.08) 0 1px, transparent 1px 7px),
                linear-gradient(180deg, #fff7ed 0%, #f7efe2 100%);
            background-size: auto;
            background-repeat: no-repeat;
            background-color: #f7efe2;
            color: var(--lv-ink);
            font-family: Inter, sans-serif;
            font-size: 16px;
        }

        .lv-shell {
            width: min(900px, calc(100% - 32px));
            margin: 0 auto;
        }

        /* ─── hero ─── */
        .lv-hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 20px;
            align-items: end;
            padding: 12px 0 22px;
            border-bottom: 1px solid var(--lv-line);
        }

        .lv-kicker {
            margin: 0 0 6px;
            color: var(--lv-pink);
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .lv-hero h1 {
            margin: 0;
            font-family: "Bebas Neue", cursive;
            font-weight: 400;
            font-size: clamp(2.4rem, 6vw, 3.4rem);
            letter-spacing: 0.04em;
            color: var(--lv-ink);
            line-height: 1;
        }

        .lv-hero-copy {
            margin: 8px 0 0;
            color: var(--lv-soft);
            font-size: 14px;
            line-height: 1.5;
        }

        /* ─── section headings ─── */
        .lv-section {
            margin-top: 28px;
        }

        .lv-section-head {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 12px;
        }

        .lv-section-head h2 {
            margin: 0;
            font-family: "Bebas Neue", cursive;
            font-weight: 400;
            font-size: 1.55rem;
            letter-spacing: 0.06em;
            color: var(--lv-ink);
        }

        .lv-section-count {
            font-size: 12px;
            font-weight: 700;
            color: var(--lv-muted);
            letter-spacing: 0.05em;
        }

        /* ─── league cards ─── */
        .lv-card {
            display: block;
            background: var(--lv-paper);
            border: 1.5px solid var(--lv-line);
            border-radius: var(--lv-radius);
            padding: 16px 18px;
            margin-bottom: 10px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.7) inset,
                        0 2px 6px rgba(23, 32, 51, 0.06),
                        0 20px 46px rgba(23, 32, 51, 0.13);
            transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
            position: relative;
        }

        .lv-card:hover,
        .lv-card:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 26px 56px rgba(23, 32, 51, 0.17);
            border-color: rgba(23, 32, 51, 0.25);
            outline: none;
        }

        .lv-card:active {
            transform: translateY(0);
        }

        .lv-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .lv-card-name {
            font-family: "Bebas Neue", cursive;
            font-size: 1.25rem;
            letter-spacing: 0.06em;
            color: var(--lv-ink);
            line-height: 1.15;
            flex: 1;
        }

        .lv-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .lv-badge-active    { background: rgba(33, 166, 107, 0.15); color: #168754; }
        .lv-badge-reg       { background: rgba(20, 127, 159, 0.15); color: var(--lv-blue); }
        .lv-badge-playoffs  { background: rgba(214, 155, 34, 0.18); color: var(--lv-gold); }
        .lv-badge-completed { background: rgba(83, 96, 120, 0.15); color: var(--lv-soft); }
        .lv-badge-archived  { background: rgba(83, 96, 120, 0.12); color: var(--lv-muted); }
        .lv-badge-open      { background: rgba(20, 127, 159, 0.15); color: var(--lv-blue); }
        .lv-badge-other     { background: rgba(83, 96, 120, 0.12); color: var(--lv-muted); }

        .lv-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-top: 9px;
            font-size: 13px;
            color: var(--lv-soft);
        }

        .lv-card-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .lv-role-pill {
            display: inline-flex;
            align-items: center;
            padding: 2px 7px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }

        .lv-role-captain  { background: rgba(237, 63, 145, 0.15); color: var(--lv-pink); }
        .lv-role-director { background: rgba(214, 155, 34, 0.18); color: var(--lv-gold); }
        .lv-role-player   { background: rgba(20, 127, 159, 0.12); color: var(--lv-blue); }

        /* ─── open-to-join tap hint ─── */
        .lv-card-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--lv-muted);
            font-size: 16px;
            pointer-events: none;
        }

        /* ─── section dividers ─── */
        .lv-divider {
            border: none;
            border-top: 1px solid var(--lv-line);
            margin: 30px 0 0;
        }

        /* ─── empty states ─── */
        .lv-empty {
            background: var(--lv-paper);
            border: 1.5px dashed var(--lv-line);
            border-radius: var(--lv-radius);
            padding: 28px 20px;
            text-align: center;
            color: var(--lv-muted);
        }

        .lv-empty-icon {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .lv-empty-title {
            font-family: "Bebas Neue", cursive;
            font-size: 1.3rem;
            letter-spacing: 0.06em;
            color: var(--lv-soft);
            margin: 0 0 6px;
        }

        .lv-empty-body {
            font-size: 14px;
            line-height: 1.5;
            max-width: 320px;
            margin: 0 auto;
        }

        /* ─── no-leagues full-page empty state ─── */
        .lv-splash {
            margin-top: 32px;
            padding: 32px 20px;
            background: var(--lv-paper);
            border: 1.5px solid var(--lv-line);
            border-radius: var(--lv-radius);
            text-align: center;
        }

        .lv-splash-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .lv-splash h2 {
            margin: 0 0 8px;
            font-family: "Bebas Neue", cursive;
            font-size: 1.8rem;
            letter-spacing: 0.06em;
            color: var(--lv-ink);
        }

        .lv-splash-copy {
            font-size: 15px;
            color: var(--lv-soft);
            max-width: 360px;
            margin: 0 auto 24px;
            line-height: 1.55;
        }

        /* ─── skeleton loaders ─── */
        @keyframes lv-shimmer {
            0%   { background-position: -400px 0; }
            100% { background-position:  400px 0; }
        }

        .lv-skeleton {
            height: 88px;
            border-radius: var(--lv-radius);
            margin-bottom: 10px;
            background: linear-gradient(90deg, rgba(23,32,51,0.06) 0%, rgba(23,32,51,0.12) 50%, rgba(23,32,51,0.06) 100%);
            background-size: 800px 100%;
            animation: lv-shimmer 1.3s infinite linear;
        }

        /* ─── error notice ─── */
        .lv-notice {
            background: rgba(237, 63, 145, 0.08);
            border: 1.5px solid rgba(237, 63, 145, 0.25);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--lv-soft);
            margin-bottom: 10px;
        }

        /* ─── open list (inside no-league splash) ─── */
        .lv-open-section {
            margin-top: 28px;
            text-align: left;
        }

        /* ─── responsive ─── */
        @media (min-width: 640px) {
            .lv-card {
                padding: 18px 22px;
            }
        }
    </style>
</head>
<body class="leagues-vnext-page has-mobile-nav">
    <main class="lv-shell" id="mainContent">

        <section class="lv-hero">
            <div>
                <p class="lv-kicker">Burning River Darts Club</p>
                <h1>My Leagues</h1>
                <p class="lv-hero-copy" id="leaguesSubtitle">Loading your leagues...</p>
            </div>
        </section>

        <div id="leaguesContent">
            <div class="lv-section">
                <div class="lv-skeleton"></div>
                <div class="lv-skeleton"></div>
            </div>
        </div>

    </main>

    <script src="/js/brdc-toast.js"></script>
    <script src="/components/brdc-navigation-init.js?v=19"></script>
    <script type="module" src="/js/leagues-vnext.js?v=2"></script>
    <script>
        initBRDCNavigation({ page: 'league', pageTitle: 'My Leagues' });
    </script>
</body>
</html>
