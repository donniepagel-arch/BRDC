                            const side = leg.winner === 'home' ? t.home : t.away;
                            if (side && side.score != null) winRounds++;
                        });
                        if (winRounds > 0) {
                            const expected = winRounds * 3;
                            const derived = 3 - (expected - winStats.darts);
                            if (derived >= 1 && derived <= 3) derivedCheckoutDarts = derived;
                        }
                    }
                }

                const totalThrows = leg.throws.length;
                leg.throws.forEach((t, tIdx) => {
                    const homeT = t.home || {};
                    const awayT = t.away || {};
                    const isLastThrow = tIdx === totalThrows - 1;

                    // Notable detection
                    const homeNotable = isCricket
                        ? (homeT.notable || (homeT.marks >= 5))
                        : (homeT.notable || (homeT.score >= 100));
                    const awayNotable = isCricket
                        ? (awayT.notable || (awayT.marks >= 5))
                        : (awayT.notable || (awayT.score >= 100));
                    const homeCheckout = homeT.checkout || homeT.remaining === 0;
                    const awayCheckout = awayT.checkout || awayT.remaining === 0;

                    // Darts used on last throw (winner's closing throw)
                    let homeDartsBadge = '';
                    let awayDartsBadge = '';
                    if (isLastThrow && derivedCheckoutDarts) {
                        if (leg.winner === 'home' && (homeCheckout || homeT.closed_out || homeT.score != null)) {
                            homeDartsBadge = `<span class="darts-used">(${derivedCheckoutDarts}d)</span>`;
                        }
                        if (leg.winner === 'away' && (awayCheckout || awayT.closed_out || awayT.score != null)) {
                            awayDartsBadge = `<span class="darts-used">(${derivedCheckoutDarts}d)</span>`;
                        }
                    }

                    // Notable badge on player name side
                    const homeNotableBadge = homeT.notable && !homeCheckout ? `<span class="notable">${homeT.notable}</span>` : '';
                    const awayNotableBadge = awayT.notable && !awayCheckout ? `<span class="notable">${awayT.notable}</span>` : '';

                    if (isCricket) {
                        // Cricket: Name | Hits | Marks | Rnd | Marks | Hits | Name
                        const homeMarksClass = homeNotable && !homeCheckout ? 'notable-score' : '';
                        const awayMarksClass = awayNotable && !awayCheckout ? 'notable-score' : '';
                        html += `
                            <div class="throw-row">
                                <div class="home">${safeName(homeT.player)}${homeNotableBadge}</div>
                                <div class="hits">${homeT.hit || '-'}</div>
                                <div class="marks ${homeMarksClass}">${homeT.marks != null ? homeT.marks + 'M' : '-'}${homeDartsBadge}</div>
                                <div class="round">${t.round || ''}</div>
                                <div class="marks ${awayMarksClass}">${awayT.marks != null ? awayT.marks + 'M' : '-'}${awayDartsBadge}</div>
                                <div class="hits">${awayT.hit || '-'}</div>
                                <div class="away">${awayNotableBadge}${safeName(awayT.player)}</div>
                            </div>
                        `;
                    } else {
                        // 501: Name | Scored | Remaining | Rnd | Remaining | Scored | Name
                        const homeScoredClass = homeCheckout ? 'checkout-score' : homeNotable ? 'notable-score' : '';
                        const awayScoredClass = awayCheckout ? 'checkout-score' : awayNotable ? 'notable-score' : '';
                        html += `
                            <div class="throw-row">
                                <div class="home">${safeName(homeT.player)}${homeNotableBadge}</div>
                                <div class="scored ${homeScoredClass}">${homeT.score != null ? homeT.score : '-'}${homeDartsBadge}</div>
                                <div class="remaining">${homeT.remaining != null ? homeT.remaining : '-'}</div>
                                <div class="round">${t.round || ''}</div>
                                <div class="remaining">${awayT.remaining != null ? awayT.remaining : '-'}</div>
                                <div class="scored ${awayScoredClass}">${awayT.score != null ? awayT.score : '-'}${awayDartsBadge}</div>
                                <div class="away">${awayNotableBadge}${safeName(awayT.player)}</div>
                            </div>
                        `;
                    }
                });

                html += renderLegSummary(homeStats, awayStats, isCricket, leg.winner, checkoutInfo, closeoutInfo, loserRemaining);
                return html;
            }

            // No throws, show summary only
            return renderLegSummary(homeStats, awayStats, isCricket, leg.winner, checkoutInfo, closeoutInfo, loserRemaining);
        }


        function renderLegSummary(homeStats, awayStats, isCricket, winner, checkoutInfo, closeoutInfo, loserRemaining) {
            const homeStat = isCricket
                ? `${homeStats.mpr || '-'} MPR`
                : `${homeStats.three_dart_avg || '-'} 3DA`;
            const awayStat = isCricket
                ? `${awayStats.mpr || '-'} MPR`
                : `${awayStats.three_dart_avg || '-'} 3DA`;

            // Build winner display with checkout/closeout info
            let homeWinnerInfo = '';
            let awayWinnerInfo = '';

            if (winner === 'home') {
                if (checkoutInfo && checkoutInfo.value) {
                    homeWinnerInfo = `<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">★ OUT: ${checkoutInfo.value}</div>`;
                } else if (closeoutInfo) {
                    homeWinnerInfo = `<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">★ CLOSED (${closeoutInfo.marks || '?'}M)</div>`;
                } else {
                    homeWinnerInfo = '<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">★ WINNER</div>';
                }
                if (loserRemaining && !isCricket) {
                    awayWinnerInfo = `<div style="color: var(--text-dim); font-size: 11px; margin-top: 4px;">Left: ${loserRemaining}</div>`;
                }
            } else if (winner === 'away') {
                if (checkoutInfo && checkoutInfo.value) {
                    awayWinnerInfo = `<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">OUT: ${checkoutInfo.value} ★</div>`;
                } else if (closeoutInfo) {
                    awayWinnerInfo = `<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">CLOSED (${closeoutInfo.marks || '?'}M) ★</div>`;
                } else {
                    awayWinnerInfo = '<div style="color: var(--yellow); font-weight: 700; margin-top: 4px;">WINNER ★</div>';
                }
                if (loserRemaining && !isCricket) {
                    homeWinnerInfo = `<div style="color: var(--text-dim); font-size: 11px; margin-top: 4px;">Left: ${loserRemaining}</div>`;
                }
            }

            return `
                <div class="leg-summary">
                    <div class="home">
                        <b>${homeStat}</b> • ${homeStats.darts_thrown || homeStats.darts || '-'} darts
                        ${homeWinnerInfo}
                    </div>
                    <div class="center">${isCricket ? 'MPR' : '3DA'}</div>
                    <div class="away">
                        ${awayStats.darts_thrown || awayStats.darts || '-'} darts • <b>${awayStat}</b>
                        ${awayWinnerInfo}
                    </div>
                </div>
            `;
        }

        // Helper: Get checkout range category
        function getCheckoutRange(score) {
            if (score >= 161) return '161_plus';
            if (score >= 140) return '140_160';
            if (score >= 100) return '100_139';
            if (score >= 60) return '60_99';
            return null; // Below 60, not tracked in ranges
        }

        function formatCheckoutRange(rangeKey) {
            const labels = { '60_99': '60-99', '100_139': '100-139', '140_160': '140-160', '161_plus': '161+' };
            return labels[rangeKey] || rangeKey;
        }

        // ========== PERFORMANCE TAB (DC-Style) ==========
        function renderPerformance() {
            const container = document.getElementById('performanceContainer');
            const games = matchData.games || [];

            // Aggregate stats for all players in this match
            const playerStats = {};
            const homePlayerNames = new Set();
            const awayPlayerNames = new Set();

            // Track checkout ranges per player
            const playerCheckouts = {}; // { playerName: { '60_99': { count: 0, attempts: 0 }, ... } }

            // Track cricket closeouts per player
            const playerCricketCloseouts = {}; // { playerName: { '5m': 0, '6m': 0, ... } }

            // Track leaders
            const leaders = {
                highTurn: { value: 0, player: null, side: null },
                highDO: { value: 0, player: null, side: null },
                high3DA_S: { value: 0, player: null, side: null }, // Singles
                high3DA_D: { value: 0, player: null, side: null }, // Doubles
                highMPR_S: { value: 0, player: null, side: null }, // Singles
                highMPR_D: { value: 0, player: null, side: null }, // Doubles
                cricketHighTurn: { value: 0, player: null, side: null },
                bulls: { value: 0, player: null, side: null },
                triples: { value: 0, player: null, side: null }
            };

            games.forEach(game => {
                const isCricket = game.format === 'cricket';
                const homePlayers = (game.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                const awayPlayers = (game.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                homePlayers.forEach(p => homePlayerNames.add(p));
                awayPlayers.forEach(p => awayPlayerNames.add(p));

                // Apply player filter - skip games not involving selected players
                if (selectedFilterPlayers.length > 0) {
                    const allP = [...homePlayers, ...awayPlayers];
                    if (!selectedFilterPlayers.some(fp => allP.includes(fp))) return;
                }

                const gameType = homePlayers.length === 1 ? 'S' : 'D'; // Singles or Doubles

                (game.legs || []).forEach(leg => {
                    Object.entries(leg.player_stats || {}).filter(([name]) => name && name !== 'undefined').forEach(([name, stats]) => {
                        const side = homePlayerNames.has(name) ? 'home' : 'away';

                        if (!playerStats[name]) {
                            playerStats[name] = {
                                name, side,
                                x01: { darts: 0, points: 0, legs: 0, wins: 0, first9Points: 0, first9Darts: 0, missThrows: 0, totalThrows: 0 },
                                cricket: { darts: 0, marks: 0, legs: 0, wins: 0, bulls: 0, triples: 0, missThrows: 0, totalThrows: 0 },
                                totalGames: 0, totalWins: 0
                            };
                        }

                        const isWinner = (leg.winner === 'home' && homePlayerNames.has(name)) ||
                                         (leg.winner === 'away' && awayPlayerNames.has(name));

                        if (isCricket || leg.format === 'cricket') {
                            playerStats[name].cricket.darts += stats.darts || 0;
                            playerStats[name].cricket.marks += stats.marks || 0;
                            playerStats[name].cricket.legs++;
                            playerStats[name].cricket.bulls += stats.bulls || 0;
                            playerStats[name].cricket.triples += stats.triples || 0;
                            if (isWinner) playerStats[name].cricket.wins++;

                            // Track MPR leader
                            const mpr = stats.mpr || (stats.marks && stats.darts ? stats.marks / (stats.darts / 3) : 0);
                            if (gameType === 'S' && mpr > leaders.highMPR_S.value) {
                                leaders.highMPR_S = { value: mpr, player: name, side };
                            } else if (gameType === 'D' && mpr > leaders.highMPR_D.value) {
                                leaders.highMPR_D = { value: mpr, player: name, side };
                            }
                        } else {
                            playerStats[name].x01.darts += stats.darts || 0;
                            playerStats[name].x01.points += stats.points || 0;
                            playerStats[name].x01.legs++;
                            if (isWinner) playerStats[name].x01.wins++;

                            // Track 3DA leader
                            const avg = stats.points && stats.darts ? (stats.points / stats.darts) * 3 : 0;
                            if (gameType === 'S' && avg > leaders.high3DA_S.value) {
                                leaders.high3DA_S = { value: avg, player: name, side };
                            } else if (gameType === 'D' && avg > leaders.high3DA_D.value) {
                                leaders.high3DA_D = { value: avg, player: name, side };
                            }

                            // Track high checkout
                            if (stats.checkout && stats.checkout > leaders.highDO.value) {
                                leaders.highDO = { value: stats.checkout, player: name, side };
                            }
                        }

                        playerStats[name].totalGames++;
                        if (isWinner) playerStats[name].totalWins++;
                    });

                    // Track First 9 average (first 3 rounds = 9 darts) for X01 games
                    if (!isCricket && leg.format !== 'cricket') {
                        const throws = leg.throws || [];
                        const playerRoundCounts = {};
                        throws.forEach(t => {
                            ['home', 'away'].forEach(side => {
                                const throwData = t[side];
                                if (throwData && safeName(throwData.player) && throwData.score !== undefined) {
                                    const name = safeName(throwData.player);
                                    if (!playerRoundCounts[name]) playerRoundCounts[name] = 0;
                                    playerRoundCounts[name]++;
                                    // First 3 rounds = First 9 darts
                                    if (playerRoundCounts[name] <= 3 && playerStats[name]) {
                                        playerStats[name].x01.first9Points += throwData.score || 0;
                                        playerStats[name].x01.first9Darts += 3;
                                    }
                                }
                            });
                        });
                    }

                    // Track high turns from throws AND checkout range attempts
                    (leg.throws || []).forEach((t, throwIdx) => {
                        // Get previous remaining to know what checkout opportunity existed
                        const prevThrow = throwIdx > 0 ? leg.throws[throwIdx - 1] : null;

                        if (t.home && t.home.score !== undefined) {
                            const score = t.home.score;
                            const playerName = safeName(t.home.player) || homePlayers[0];
                            if (!isCricket && score > leaders.highTurn.value) {
                                leaders.highTurn = { value: score, player: playerName, side: 'home' };
                            }
                            // Track checkout from throws
                            if (t.home.checkout && score > leaders.highDO.value) {
                                leaders.highDO = { value: score, player: playerName, side: 'home' };
                            }

                            // Track checkout range attempts/successes (X01 only)
                            if (!isCricket && leg.format !== 'cricket') {
                                // Calculate what the remaining was BEFORE this throw
                                const remainingBefore = (t.home.remaining != null ? t.home.remaining : 0) + score;
                                const range = getCheckoutRange(remainingBefore);
                                if (range) {
                                    // Initialize player checkout tracking
                                    if (!playerCheckouts[playerName]) {
                                        playerCheckouts[playerName] = {
                                            '60_99': { count: 0, attempts: 0 },
                                            '100_139': { count: 0, attempts: 0 },
                                            '140_160': { count: 0, attempts: 0 },
                                            '161_plus': { count: 0, attempts: 0 }
                                        };
                                    }
                                    // Count attempt for this range
                                    playerCheckouts[playerName][range].attempts++;
                                    // If checkout, count success
                                    if (t.home.checkout || t.home.remaining === 0) {
                                        playerCheckouts[playerName][range].count++;
                                    }
                                }
                            }

                            // Per-player miss tracking for home
                            const pName = safeName(t.home.player);
                            if (pName && playerStats[pName]) {
                                if (isCricket) {
                                    if (t.home.marks != null) {
                                        playerStats[pName].cricket.totalThrows++;
                                        if (t.home.marks === 0) playerStats[pName].cricket.missThrows++;
                                    }
                                } else {
                                    if (t.home.score != null) {
                                        playerStats[pName].x01.totalThrows++;
                                        if (t.home.score === 0) playerStats[pName].x01.missThrows++;
                                    }
                                }
                            }
                        }
                        if (t.away && t.away.score !== undefined) {
                            const score = t.away.score;
                            const playerName = safeName(t.away.player) || awayPlayers[0];
                            if (!isCricket && score > leaders.highTurn.value) {
                                leaders.highTurn = { value: score, player: playerName, side: 'away' };
                            }
                            if (t.away.checkout && score > leaders.highDO.value) {
                                leaders.highDO = { value: score, player: playerName, side: 'away' };
                            }

                            // Track checkout range attempts/successes (X01 only)
                            if (!isCricket && leg.format !== 'cricket') {
                                const remainingBefore = (t.away.remaining != null ? t.away.remaining : 0) + score;
                                const range = getCheckoutRange(remainingBefore);
                                if (range) {
                                    if (!playerCheckouts[playerName]) {
                                        playerCheckouts[playerName] = {
                                            '60_99': { count: 0, attempts: 0 },
                                            '100_139': { count: 0, attempts: 0 },
                                            '140_160': { count: 0, attempts: 0 },
                                            '161_plus': { count: 0, attempts: 0 }
                                        };
                                    }
                                    playerCheckouts[playerName][range].attempts++;
                                    if (t.away.checkout || t.away.remaining === 0) {
                                        playerCheckouts[playerName][range].count++;
                                    }
                                }
                            }

                            // Per-player miss tracking for away
                            const pNameAway = safeName(t.away.player);
                            if (pNameAway && playerStats[pNameAway]) {
                                if (isCricket) {
                                    if (t.away.marks != null) {
                                        playerStats[pNameAway].cricket.totalThrows++;
                                        if (t.away.marks === 0) playerStats[pNameAway].cricket.missThrows++;
                                    }
                                } else {
                                    if (t.away.score != null) {
                                        playerStats[pNameAway].x01.totalThrows++;
                                        if (t.away.score === 0) playerStats[pNameAway].x01.missThrows++;
                                    }
                                }
                            }
                        }

                        // Cricket high marks and closeout tracking
                        if (isCricket) {
                            if (t.home && t.home.marks && t.home.marks > leaders.cricketHighTurn.value) {
                                leaders.cricketHighTurn = { value: t.home.marks, player: safeName(t.home.player) || homePlayers[0], side: 'home' };
                            }
                            if (t.away && t.away.marks && t.away.marks > leaders.cricketHighTurn.value) {
                                leaders.cricketHighTurn = { value: t.away.marks, player: safeName(t.away.player) || awayPlayers[0], side: 'away' };
                            }

                            // Cricket closeout tracking - check if this is the final throw
                            const throwsArray = leg.throws || [];
                            const isLastThrow = throwIdx === throwsArray.length - 1;

                            if (isLastThrow) {
                                // Track closeout for the winner
                                if (t.home && (t.home.closed_out || leg.winner === 'home')) {
                                    const marks = t.home.marks || 0;
                                    const playerName = safeName(t.home.player) || homePlayers[0];
                                    if (marks >= 5 && marks <= 9) {
                                        if (!playerCricketCloseouts[playerName]) {
                                            playerCricketCloseouts[playerName] = { '5m': 0, '6m': 0, '7m': 0, '8m': 0, '9m': 0 };
                                        }
                                        playerCricketCloseouts[playerName][`${marks}m`]++;
                                    }
                                }
                                if (t.away && (t.away.closed_out || leg.winner === 'away')) {
                                    const marks = t.away.marks || 0;
                                    const playerName = safeName(t.away.player) || awayPlayers[0];
                                    if (marks >= 5 && marks <= 9) {
                                        if (!playerCricketCloseouts[playerName]) {
                                            playerCricketCloseouts[playerName] = { '5m': 0, '6m': 0, '7m': 0, '8m': 0, '9m': 0 };
                                        }
                                        playerCricketCloseouts[playerName][`${marks}m`]++;
                                    }
                                }
                            }
                        }
                    });
                });
            });

            // Track bulls and triples leaders
            Object.values(playerStats).forEach(p => {
                if (p.cricket.bulls > leaders.bulls.value) {
                    leaders.bulls = { value: p.cricket.bulls, player: p.name, side: p.side };
                }
                if (p.cricket.triples > leaders.triples.value) {
                    leaders.triples = { value: p.cricket.triples, player: p.name, side: p.side };
                }
            });

            // Build HTML
            let html = '';

            // === COMBINED PLAYER SUMMARY TABLE (top, always visible) ===
            const allPlayers = Object.values(playerStats).sort((a, b) => {
                if (b.totalWins !== a.totalWins) return b.totalWins - a.totalWins;
                return a.name.localeCompare(b.name);
            });

            // Calculate team totals
            const homeTeamName = homeTeam?.team_name || homeTeam?.name || 'Home';
            const awayTeamName = awayTeam?.team_name || awayTeam?.name || 'Away';

            const homeTotal = {
                totalGames: 0, totalWins: 0,
                x01: { darts: 0, points: 0 },
                cricket: { darts: 0, marks: 0 },
                missThrows: 0, totalThrows: 0
            };
            const awayTotal = {
                totalGames: 0, totalWins: 0,
                x01: { darts: 0, points: 0 },
                cricket: { darts: 0, marks: 0 },
                missThrows: 0, totalThrows: 0
            };

            allPlayers.forEach(p => {
                const total = p.side === 'home' ? homeTotal : awayTotal;
                total.totalGames += p.totalGames;
                total.totalWins += p.totalWins;
                total.x01.darts += p.x01.darts;
                total.x01.points += p.x01.points;
                total.cricket.darts += p.cricket.darts;
                total.cricket.marks += p.cricket.marks;
                total.missThrows += p.x01.missThrows + p.cricket.missThrows;
                total.totalThrows += p.x01.totalThrows + p.cricket.totalThrows;
            });

            const homeWinPct = homeTotal.totalGames > 0 ? Math.round((homeTotal.totalWins / homeTotal.totalGames) * 100) : 0;
            const awayWinPct = awayTotal.totalGames > 0 ? Math.round((awayTotal.totalWins / awayTotal.totalGames) * 100) : 0;
            const home3DA = homeTotal.x01.darts > 0 ? ((homeTotal.x01.points / homeTotal.x01.darts) * 3).toFixed(1) : '-';
            const away3DA = awayTotal.x01.darts > 0 ? ((awayTotal.x01.points / awayTotal.x01.darts) * 3).toFixed(1) : '-';
            const homeMPR = homeTotal.cricket.darts > 0 ? (homeTotal.cricket.marks / (homeTotal.cricket.darts / 3)).toFixed(2) : '-';
            const awayMPR = awayTotal.cricket.darts > 0 ? (awayTotal.cricket.marks / (awayTotal.cricket.darts / 3)).toFixed(2) : '-';
            const homeMissPct = homeTotal.totalThrows > 0 ? Math.round((homeTotal.missThrows / homeTotal.totalThrows) * 100) : 0;
            const awayMissPct = awayTotal.totalThrows > 0 ? Math.round((awayTotal.missThrows / awayTotal.totalThrows) * 100) : 0;

            html += `
                <div class="perf-summary-section">
                    <div class="perf-summary-header">PLAYER SUMMARY</div>
                    <table class="perf-table">
                        <thead>
                            <tr>
                                <th>Player</th>
                                <th>Gms</th>
                                <th>Wns</th>
                                <th>Win%</th>
                                <th>3DA</th>
                                <th>MPR</th>
                                <th>Miss%</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="team-total-row home-total">
                                <td>${homeTeamName}</td>
                                <td>${homeTotal.totalGames}</td>
                                <td class="highlight">${homeTotal.totalWins}</td>
                                <td>${homeWinPct}%</td>
                                <td>${home3DA}</td>
                                <td>${homeMPR}</td>
                                <td>${homeMissPct}%</td>
                            </tr>
                            <tr class="team-total-row away-total">
                                <td>${awayTeamName}</td>
                                <td>${awayTotal.totalGames}</td>
                                <td class="highlight">${awayTotal.totalWins}</td>
                                <td>${awayWinPct}%</td>
                                <td>${away3DA}</td>
                                <td>${awayMPR}</td>
                                <td>${awayMissPct}%</td>
                            </tr>
                            ${allPlayers.map(p => {
                                const winPct = p.totalGames > 0 ? Math.round((p.totalWins / p.totalGames) * 100) : 0;
                                const totalMissThrows = p.x01.missThrows + p.cricket.missThrows;
                                const totalAllThrows = p.x01.totalThrows + p.cricket.totalThrows;
                                const missPct = totalAllThrows > 0 ? Math.round((totalMissThrows / totalAllThrows) * 100) : 0;
                                const threeDa = p.x01.darts > 0 ? ((p.x01.points / p.x01.darts) * 3).toFixed(1) : '-';
                                const mpr = p.cricket.darts > 0 ? (p.cricket.marks / (p.cricket.darts / 3)).toFixed(2) : '-';
                                return `
                                    <tr>
                                        <td><a class="player-name ${p.side} player-link" href="/pages/player-profile.html?name=${encodeURIComponent(p.name)}&league_id=${leagueId}">${p.name}</a></td>
                                        <td>${p.totalGames}</td>
                                        <td class="highlight">${p.totalWins}</td>
                                        <td>${winPct}%</td>
                                        <td>${threeDa}</td>
                                        <td>${mpr}</td>
                                        <td>${missPct}%</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;

            // === SUB-TAB NAVIGATION ===
            html += `
                <div class="perf-subtab-nav">
                    <button class="perf-subtab-btn active" onclick="switchPerfSubtab('x01')">&#39;01</button>
                    <button class="perf-subtab-btn" onclick="switchPerfSubtab('cricket')">CRICKET</button>
                </div>
            `;

            // === X01 SUB-TAB ===
            // Find best values for highlighting
            const best3DA = Math.max(...allPlayers.filter(p => p.x01.darts > 0).map(p => (p.x01.points / p.x01.darts) * 3), 0);
            const bestFirst9 = Math.max(...allPlayers.filter(p => p.x01.first9Darts > 0).map(p => (p.x01.first9Points / p.x01.first9Darts) * 3), 0);

            html += '<div class="perf-subtab-content active" id="perfSubtab-x01">';

            // '01 Leaders (combined)
            html += `
                <div class="perf-leaders-section">
                    <div class="perf-leaders-header">'01 LEADERS</div>
                    <div class="perf-leaders-grid">
                        <div class="perf-leader-item">

        // ========== COUNTS TAB ==========
        function renderCounts() {
            const container = document.getElementById('countsContainer');
            const games = matchData.games || [];

            // Per-player tracking objects
            const playerCheckouts = {}; // { name: { high: 0, total: 0, '60_99': 0, '100_139': 0, '140_160': 0, '161_plus': 0 } }
            const playerCheckoutPerf = {}; // { name: { checkoutSum: 0, checkoutCount: 0, checkoutDarts: 0, totalOpportunities: 0, first9Points: 0, first9Darts: 0 } }
            const playerOpportunity = {}; // { name: { x01Legs: 0, attempts: 0, successfulDarts: 0, trackedLegs: Set } }
            const playerTurns100 = {}; // { name: { total: 0, pts: 0, high: 0, r100_119: 0, r120_139: 0, r140_159: 0, r160_179: 0, r180: 0 } }
            const playerTurns95 = {}; // { name: { total: 0, pts: 0, high: 0, r95_113: 0, r114_132: 0, r133_151: 0, r152_170: 0, r171_180: 0 } }
            const playerCricketCloseouts = {}; // { name: { '5m': 0, '6m': 0, '7m': 0, '8m': 0, '9m': 0 } }
            const playerMarkTurns = {}; // { name: { totalThrows: 0, highMarkTotal: 0, count5plus: 0, m5: 0, m6: 0, m7: 0, m8: 0, m9: 0 } }
            const playerBulls = {}; // { name: { allBulls: 0, b3: 0, b4: 0, b5: 0, b6: 0 } }
            const playerMarksman = {}; // { name: { triples: 0, dBulls: 0, hatTricks: 0 } }
            const homePlayerNames = new Set();
            const awayPlayerNames = new Set();

            games.forEach(game => {
                const isCricket = game.format === 'cricket';

                // Apply player filter - skip games not involving selected players
                if (selectedFilterPlayers.length > 0) {
                    const homePl = (game.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                    const awayPl = (game.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                    const allP = [...homePl, ...awayPl];
                    if (!selectedFilterPlayers.some(fp => allP.includes(fp))) return;
                }

                (game.legs || []).forEach((leg, legIdx) => {
                    const isX01 = !isCricket && leg.format !== 'cricket';
                    const legId = game.set + '-' + legIdx; // Unique leg identifier
                    const legPlayersSeen = new Set(); // Track which players we've counted for this leg

                    const throwsArr = leg.throws || [];
                    throwsArr.forEach((t, throwIdx) => {
                        const isLastThrow = throwIdx === throwsArr.length - 1;

                        // ===== HOME THROW =====
                        if (t.home) {
                            const pName = t.home.player;
                            if (pName) homePlayerNames.add(pName);

                            if (isX01) {
                                // Track X01 leg participation
                                if (pName && !legPlayersSeen.has(pName)) {
                                    legPlayersSeen.add(pName);
                                    if (!playerOpportunity[pName]) playerOpportunity[pName] = { x01Legs: 0, attempts: 0, successfulDarts: 0, trackedLegs: new Set() };
                                    playerOpportunity[pName].x01Legs++;
                                    playerOpportunity[pName].trackedLegs.add(legId);
                                }

                                const score = t.home.score || 0;

                                // Initialize trackers
                                if (pName) {
                                    if (!playerCheckouts[pName]) playerCheckouts[pName] = { high: 0, total: 0, '60_99': 0, '100_139': 0, '140_160': 0, '161_plus': 0 };
                                    if (!playerCheckoutPerf[pName]) playerCheckoutPerf[pName] = { checkoutSum: 0, checkoutCount: 0, checkoutDarts: 0, totalOpportunities: 0, first9Points: 0, first9Darts: 0 };
                                    if (!playerTurns100[pName]) playerTurns100[pName] = { total: 0, pts: 0, high: 0, r100_119: 0, r120_139: 0, r140_159: 0, r160_179: 0, r180: 0 };
                                    if (!playerTurns95[pName]) playerTurns95[pName] = { total: 0, pts: 0, high: 0, r95_113: 0, r114_132: 0, r133_151: 0, r152_170: 0, r171_180: 0 };

                                    // Checkout range tracking - ONLY when remaining is 60-170 (actual checkout opportunity)
                                    const remainingBefore = (t.home.remaining != null ? t.home.remaining : 0) + score;
                                    if (remainingBefore >= 60 && remainingBefore <= 170) {
                                        const range = getCheckoutRange(remainingBefore);
                                        if (range) {
                                            playerCheckoutPerf[pName].totalOpportunities++;
                                            playerOpportunity[pName].attempts++;

                                            if (t.home.checkout || t.home.remaining === 0) {
                                                // Successful checkout
                                                playerCheckouts[pName][range]++;
                                                playerCheckouts[pName].total++;
                                                if (score >= 60 && score > playerCheckouts[pName].high) playerCheckouts[pName].high = score;

                                                // Checkout perf (60+ only for AFin)
                                                if (score >= 60) {
                                                    playerCheckoutPerf[pName].checkoutSum += score;
                                                    playerCheckoutPerf[pName].checkoutCount++;
                                                }

                                                const cDarts = t.home.checkout_darts || 3;
                                                playerCheckoutPerf[pName].checkoutDarts += cDarts;
                                                playerOpportunity[pName].successfulDarts += cDarts;
                                            }
                                        }
                                    } else if (remainingBefore >= 2 && remainingBefore < 60) {
                                        // Sub-60 checkout opportunity - still count for opportunity tracking
                                        playerOpportunity[pName].attempts++;
                                        if (t.home.checkout || t.home.remaining === 0) {
                                            const cDarts = t.home.checkout_darts || 3;
                                            playerCheckoutPerf[pName].checkoutDarts += cDarts;
                                            playerOpportunity[pName].successfulDarts += cDarts;
                                        }
                                    }

                                    // First 9 dart tracking (rounds 1-3)
                                    if (t.round && t.round <= 3) {
                                        playerCheckoutPerf[pName].first9Points += score;
                                        playerCheckoutPerf[pName].first9Darts += 3;
                                    }

                                    // 100+ turns
                                    if (score >= 100) {
                                        playerTurns100[pName].total++;
                                        playerTurns100[pName].pts += score;
                                        if (score > playerTurns100[pName].high) playerTurns100[pName].high = score;
                                        if (score >= 180) playerTurns100[pName].r180++;
                                        else if (score >= 160) playerTurns100[pName].r160_179++;
                                        else if (score >= 140) playerTurns100[pName].r140_159++;
                                        else if (score >= 120) playerTurns100[pName].r120_139++;
                                        else playerTurns100[pName].r100_119++;
                                    }

                                    // 95+ turns
                                    if (score >= 95) {
                                        playerTurns95[pName].total++;
                                        playerTurns95[pName].pts += score;
                                        if (score > playerTurns95[pName].high) playerTurns95[pName].high = score;
                                        if (score >= 171) playerTurns95[pName].r171_180++;
                                        else if (score >= 152) playerTurns95[pName].r152_170++;
                                        else if (score >= 133) playerTurns95[pName].r133_151++;
                                        else if (score >= 114) playerTurns95[pName].r114_132++;
                                        else playerTurns95[pName].r95_113++;
                                    }
                                }
                            } else {
                                // Cricket throws
                                if (pName) {
                                    const marks = t.home.marks || 0;
                                    const hit = t.home.hit || '';
                                    // Compute bulls from hit string: DB=2, SB=1
                                    const dbCount = (hit.match(/DB/g) || []).length;
                                    const sbCount = (hit.match(/SB/g) || []).length;
                                    const bulls = dbCount * 2 + sbCount;
                                    // Compute triples from hit string (T followed by number)
                                    const tripleCount = (hit.match(/T\d+/g) || []).length;

                                    if (!playerMarkTurns[pName]) playerMarkTurns[pName] = { totalThrows: 0, highMarkTotal: 0, count5plus: 0, m5: 0, m6: 0, m7: 0, m8: 0, m9: 0 };
                                    if (!playerBulls[pName]) playerBulls[pName] = { allBulls: 0, b3: 0, b4: 0, b5: 0, b6: 0 };
                                    if (!playerMarksman[pName]) playerMarksman[pName] = { triples: 0, dBulls: 0, hatTricks: 0 };

                                    // Mark turns
                                    playerMarkTurns[pName].totalThrows++;
                                    if (marks >= 5) {
                                        playerMarkTurns[pName].count5plus++;
                                        if (marks > playerMarkTurns[pName].highMarkTotal) playerMarkTurns[pName].highMarkTotal = marks;
                                        if (marks >= 9) playerMarkTurns[pName].m9++;
                                        else if (marks >= 8) playerMarkTurns[pName].m8++;
                                        else if (marks >= 7) playerMarkTurns[pName].m7++;
                                        else if (marks >= 6) playerMarkTurns[pName].m6++;
                                        else playerMarkTurns[pName].m5++;
                                    }

                                    // Bulls (count bull marks per turn: DB=2, SB=1)
                                    const bullMarks = dbCount + sbCount; // Number of bull darts (not marks)
                                    playerBulls[pName].allBulls += bullMarks;
                                    if (bullMarks >= 6) playerBulls[pName].b6++;
                                    else if (bullMarks >= 5) playerBulls[pName].b5++;
                                    else if (bullMarks >= 4) playerBulls[pName].b4++;
                                    else if (bullMarks >= 3) playerBulls[pName].b3++;

                                    // Marksman
                                    playerMarksman[pName].triples += tripleCount;
                                    playerMarksman[pName].dBulls += dbCount;

        // Build a paginated section (Performance or Record) with nav controls
        function buildPaginatedSection(sectionId, title, navClass, views) {
            leaderViewState[sectionId] = { current: 0, total: views.length, labels: views.map(function(v) { return v.label; }) };

            var html = '<div class="leader-section">';
            html += '<div class="leader-section-nav ' + navClass + '">';
            html += '<span class="leader-section-title">' + title + '</span>';
            html += '<div class="leader-nav-controls">';
            html += '<button class="leader-nav-btn" onclick="switchLeaderView(\'' + sectionId + '\', -1)" aria-label="Previous view">&#9664;</button>';
            html += '<span class="leader-nav-label" id="' + sectionId + '-label">' + views[0].label + ' (1 of ' + views.length + ')</span>';
            html += '<button class="leader-nav-btn" onclick="switchLeaderView(\'' + sectionId + '\', 1)" aria-label="Next view">&#9654;</button>';
            html += '</div></div>';

            views.forEach(function(v, i) {
                html += '<div id="' + sectionId + '-' + i + '" class="leader-view' + (i === 0 ? ' active' : '') + '">' + v.html + '</div>';
            });
            html += '</div>';
            return html;
        }

            document.getElementById(sectionId + '-' + state.current).classList.add('active');
            document.getElementById(sectionId + '-label').textContent = state.labels[state.current] + ' (' + (state.current + 1) + ' of ' + state.total + ')';

        // ===== AGGREGATION =====

        function aggregateLeaderStats(games) {
            var players = {};
            var homeNames = new Set();
            var awayNames = new Set();
            // Track sets for set record
            var setData = {}; // setNum -> { homeLegWins, awayLegWins, players: Set }

            function ensure(name) {
                if (!players[name]) {
                    players[name] = {
                        name: name,
                        x01: {
                            darts: 0, points: 0, legs: 0, wins: 0,
                            first9Points: 0, first9Legs: 0,
                            count180: 0, countT80: 0, countTonPlus: 0, countTon: 0, count95: 0,
                            bestScore: 0, totalThrows: 0,
                            checkoutHits: 0, checkoutAttempts: 0, highOut: 0,
                            avgFinishSum: 0, avgFinishCount: 0,
                            tonPointsSum: 0,
                            score100_119: 0, score120_139: 0, score140_159: 0, score160_179: 0,
                            bestLegDarts: Infinity,
                            ranges: {
                                '60_99': { c: 0, a: 0 },
                                '100_139': { c: 0, a: 0 },
                                '140_160': { c: 0, a: 0 },
                                '161_plus': { c: 0, a: 0 }
                            }
                        },
                        cricket: {
                            darts: 0, marks: 0, legs: 0, wins: 0,
                            m9: 0, m8: 0, m7: 0, m6: 0, m5: 0,
                            totalRounds: 0, missRounds: 0,
                            tbRounds: 0,
                            bulls3: 0, bulls4: 0, bulls5: 0, bulls6: 0,
                            hatTricks: 0,
                            co: { '9m': 0, '8m': 0, '7m': 0, '6m': 0, '5m': 0, total: 0 }
                        },
                        combined: { legs: 0, wins: 0 },
                        sets: {} // setNum -> 'win'|'loss'|'tie'
                    };
                }
                return players[name];
            }

            // Track opponent stats per player (for O-3DA and O-MPR)
            var opponentStats = {}; // playerName -> { x01Points: 0, x01Darts: 0, cricketMarks: 0, cricketDarts: 0 }

            games.forEach(function(game) {
                var isCricket = game.format === 'cricket';
                var setNum = game.set || 1;
                var hPlayers = (game.home_players || []).map(function(p) { return typeof p === 'string' ? p : (p && p.name ? p.name : 'TBD'); });
                var aPlayers = (game.away_players || []).map(function(p) { return typeof p === 'string' ? p : (p && p.name ? p.name : 'TBD'); });
                hPlayers.forEach(function(p) { homeNames.add(p); });
                aPlayers.forEach(function(p) { awayNames.add(p); });

                // Player filter
                if (selectedFilterPlayers.length > 0) {
                    var allP = hPlayers.concat(aPlayers);
                    if (!selectedFilterPlayers.some(function(fp) { return allP.indexOf(fp) >= 0; })) return;
                }

                // Track set data
                if (!setData[setNum]) setData[setNum] = { homeLegWins: 0, awayLegWins: 0, players: new Set() };
                hPlayers.forEach(function(p) { setData[setNum].players.add(p); });
                aPlayers.forEach(function(p) { setData[setNum].players.add(p); });

                (game.legs || []).forEach(function(leg) {
                    var legIsCricket = isCricket || leg.format === 'cricket';

                    // Track set leg wins
                    if (leg.winner === 'home') setData[setNum].homeLegWins++;
                    else if (leg.winner === 'away') setData[setNum].awayLegWins++;

                    // Aggregate from player_stats
                    Object.entries(leg.player_stats || {}).filter(function(e) { return e[0] && e[0] !== 'undefined'; }).forEach(function(entry) {
                        var name = entry[0], st = entry[1];
                        var p = ensure(name);
                        var isWinner = (leg.winner === 'home' && homeNames.has(name)) ||
                                       (leg.winner === 'away' && awayNames.has(name));

                        p.combined.legs++;
                        if (isWinner) p.combined.wins++;

                        if (legIsCricket) {
                            p.cricket.darts += st.darts || 0;
                            p.cricket.marks += st.marks || 0;
                            p.cricket.legs++;
                            if (isWinner) p.cricket.wins++;
                        } else {
                            p.x01.darts += st.darts || 0;
                            p.x01.points += st.points || 0;
                            p.x01.legs++;
                            if (isWinner) {
                                p.x01.wins++;
                                // Best leg (fewest darts to win)
                                var legDarts = st.darts || 0;
                                if (legDarts > 0 && legDarts < p.x01.bestLegDarts) p.x01.bestLegDarts = legDarts;
                            }
                        }
                    });

                    // Track opponent stats
                    var legPlayerNames = Object.keys(leg.player_stats || {}).filter(function(n) { return n && n !== 'undefined'; });
                    legPlayerNames.forEach(function(pName) {
                        if (!opponentStats[pName]) opponentStats[pName] = { x01Points: 0, x01Darts: 0, cricketMarks: 0, cricketDarts: 0 };
                        // Find opponents (players on other side in this leg)
                        var pSide = homeNames.has(pName) ? 'home' : 'away';
                        legPlayerNames.forEach(function(oName) {
                            if (oName === pName) return;
                            var oSide = homeNames.has(oName) ? 'home' : 'away';
                            if (oSide === pSide) return; // same team, skip
                            var oSt = (leg.player_stats || {})[oName] || {};
                            if (legIsCricket) {
                                opponentStats[pName].cricketDarts += oSt.darts || 0;
                                opponentStats[pName].cricketMarks += oSt.marks || 0;
                            } else {
                                opponentStats[pName].x01Darts += oSt.darts || 0;
                                opponentStats[pName].x01Points += oSt.points || 0;
                            }
                        });
                    });

                    // Aggregate from throws
                    var throwsArr = leg.throws || [];
                    throwsArr.forEach(function(t, tIdx) {
                        ['home', 'away'].forEach(function(side) {
                            var td = t[side];
                            if (!td) return;
                            var rawName = safeName(td.player) || (side === 'home' ? hPlayers[0] : aPlayers[0]);
                            if (!rawName || typeof rawName !== 'string') return;
                            var p = ensure(rawName);

                            if (legIsCricket) {
                                var marks = td.marks || 0;
                                p.cricket.totalRounds++;
                                if (marks === 0) p.cricket.missRounds++;

                                // T&B tracking: rounds where triples or bulls were hit
                                var trpls = td.triples || 0;
                                var blls = td.bulls || 0;
                                if (trpls > 0 || blls > 0) p.cricket.tbRounds++;

                                if (marks >= 9) p.cricket.m9++;
                                else if (marks >= 8) p.cricket.m8++;
                                else if (marks >= 7) p.cricket.m7++;
                                else if (marks >= 6) p.cricket.m6++;
                                else if (marks >= 5) p.cricket.m5++;

                                var bulls = td.bulls || 0;
                                if (bulls >= 6) p.cricket.bulls6++;
                                else if (bulls >= 5) p.cricket.bulls5++;
                                else if (bulls >= 4) p.cricket.bulls4++;
                                else if (bulls >= 3) p.cricket.bulls3++;

                                var triples = td.triples || 0;
                                if (triples >= 3) p.cricket.hatTricks++;

                                // Closeout (last throw of winning side)
                                if (tIdx === throwsArr.length - 1 && leg.winner === side && marks >= 5 && marks <= 9) {
                                    var mk = marks + 'm';
                                    if (p.cricket.co[mk] !== undefined) p.cricket.co[mk]++;
                                    p.cricket.co.total++;
                                }
                            } else {
                                var score = td.score || 0;
                                if (score > 0) p.x01.totalThrows++;

                                // First 9 (rounds 1-3)
                                if (t.round <= 3) {
                                    p.x01.first9Points += score;
                                    if (t.round === 1) p.x01.first9Legs++;
                                }

                                // High score categories
                                if (score >= 180) p.x01.count180++;
                                else if (score >= 171) p.x01.countT80++;
                                else if (score >= 140) p.x01.countTonPlus++;
                                else if (score >= 100) p.x01.countTon++;
                                else if (score >= 95) p.x01.count95++;

                                if (score > p.x01.bestScore) p.x01.bestScore = score;

                                // Ton points (sum of all 100+ scores)
                                if (score >= 100) p.x01.tonPointsSum += score;

                                // Score breakdown (100+ range buckets)
                                if (score >= 180) { /* already in count180 */ }
                                else if (score >= 160) p.x01.score160_179++;
                                else if (score >= 140) p.x01.score140_159++;
                                else if (score >= 120) p.x01.score120_139++;
                                else if (score >= 100) p.x01.score100_119++;

                                // Checkout tracking
                                var remaining = td.remaining;
                                if (remaining !== undefined && score > 0) {
                                    var before = remaining + score;

                                    // General checkout tracking (ALL checkouts, any score)
                                    if (td.checkout || remaining === 0) {
                                        p.x01.checkoutHits++;
                                        if (score > p.x01.highOut) p.x01.highOut = score;
                                        p.x01.avgFinishSum += score;
                                        p.x01.avgFinishCount++;
                                    }

                                    // Count checkout attempts (checkable score 2-170)
                                    if (before >= 2 && before <= 170) {
                                        p.x01.checkoutAttempts++;
                                    }

                                    // Range-specific tracking (60+ only)
                                    var range = getCheckoutRange(before);
                                    if (range) {
                                        p.x01.ranges[range].a++;
                                        if (td.checkout || remaining === 0) {
                                            p.x01.ranges[range].c++;
                                        }
                                    }
                                }
                            }
                        });
                    });
                });
            });

            // Compute set results per player
            Object.entries(setData).forEach(function(entry) {
                var setNum = entry[0], sd = entry[1];
                var setWinner = sd.homeLegWins > sd.awayLegWins ? 'home' : sd.awayLegWins > sd.homeLegWins ? 'away' : 'tie';
                sd.players.forEach(function(name) {
                    var p = ensure(name);
                    var playerSide = homeNames.has(name) ? 'home' : 'away';
                    if (setWinner === 'tie') p.sets[setNum] = 'tie';
                    else if (setWinner === playerSide) p.sets[setNum] = 'win';
                    else p.sets[setNum] = 'loss';
                });
            });

            return { players: players, homeNames: homeNames, awayNames: awayNames, setData: setData, opponentStats: opponentStats };
        }

            if (!bodyHtml) return '';
            return '<div class="leader-table-section"><div class="leader-table-header">' + title + '</div><div class="leader-table-wrapper"><table class="leader-table"><thead><tr><th class="rank-col">#</th><th class="name-col">PLAYER</th>' +

        function markBest(players, keyFn) {
            if (players.length === 0) return new Set();
            var best = keyFn(players[0]);
            var names = new Set();
            players.forEach(function(p) { if (Math.abs(keyFn(p) - best) < 0.001 && best > 0) names.add(p.name); });
            return names;
        }

        function perLeg(count, legs) { return legs > 0 ? (count / legs) : 0; }
        function get3DA(p) { return p.x01.darts > 0 ? (p.x01.points / p.x01.darts) * 3 : 0; }

        // ========== SORTABLE TABLES ==========
        function initSortableTables() {
            document.addEventListener('click', function(e) {
                const th = e.target.closest('th[data-sortable]');
                if (!th) return;
                const table = th.closest('table');
                if (!table) return;
                const tbody = table.querySelector('tbody');
                if (!tbody) return;

                const headerRow = th.parentElement;
                const colIdx = Array.from(headerRow.children).indexOf(th);
                const isAsc = th.classList.contains('sort-asc');

                // Clear sort indicators on all headers in this table
                headerRow.querySelectorAll('th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));

                // Toggle direction
                const dir = isAsc ? 'desc' : 'asc';
                th.classList.add('sort-' + dir);

                // Get rows and sort
                const rows = Array.from(tbody.querySelectorAll('tr'));
                rows.sort(function(a, b) {
                    const aCell = a.children[colIdx];
                    const bCell = b.children[colIdx];
                    if (!aCell || !bCell) return 0;

                    const aText = (aCell.textContent || '').trim();
                    const bText = (bCell.textContent || '').trim();

                    // Parse numeric values (strip %, -, etc.)
                    const aNum = parseFloat(aText.replace('%', ''));
                    const bNum = parseFloat(bText.replace('%', ''));

                    const aIsNum = !isNaN(aNum) && aText !== '-' && aText !== '';
                    const bIsNum = !isNaN(bNum) && bText !== '-' && bText !== '';

                    // Dash / empty goes to bottom always
                    if (!aIsNum && !bIsNum) return aText.localeCompare(bText) * (dir === 'asc' ? 1 : -1);
                    if (!aIsNum) return 1;
                    if (!bIsNum) return -1;

                    return dir === 'asc' ? aNum - bNum : bNum - aNum;
                });

                rows.forEach(function(r) { tbody.appendChild(r); });
            });
        }
