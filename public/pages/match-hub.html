<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Report - BRDC</title>

    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://firestore.googleapis.com">
    <link rel="preconnect" href="https://us-central1-brdc-35f92.cloudfunctions.net">
    <link rel="dns-prefetch" href="https://www.gstatic.com">

    <link rel="icon" type="image/png" href="/images/favicon.png">
    <script src="/js/brdc-toast.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BRDC">
    <link rel="apple-touch-icon" href="/images/gold_logo.png">
    <meta name="theme-color" content="#FF469A">

    <!-- Fonts - non-blocking with display=swap -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;700&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #1e2a47;
            --pink: #FF469A;
            --teal: #91D7EB;
            --yellow: #FDD835;
            --green: #10b981;
            --text-light: #f0f0f0;
            --text-primary: #f0f0f0;
            --text-dim: #8a8aa3;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --black: #000000;
            --border: rgba(255, 255, 255, 0.1);
            --border-strong: #000;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f23 100%);
            min-height: 100vh;
            min-height: 100dvh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-light);
            line-height: 1.6;
            padding-top: calc(56px + env(safe-area-inset-top, 0px));
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 70, 154, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(145, 215, 235, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Header is managed by brdc-navigation.js + fb-mobile.css */

        /* Breadcrumbs - hidden on mobile (back arrow serves same purpose) */
        .breadcrumbs {
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-dim);
            max-width: 1100px;
            margin: 0 auto;
            display: none;
        }
        @media (min-width: 1024px) {
            .breadcrumbs { display: block; }
        }
        .breadcrumbs ol {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 0;
            padding: 0;
        }
        .breadcrumbs li::after {
            content: '>';
            margin-left: 8px;
            color: var(--text-dim);
        }
        .breadcrumbs li:last-child::after {
            content: '';
        }
        .breadcrumbs a {
            color: var(--teal);
            text-decoration: none;
        }
        .breadcrumbs a:hover {
            text-decoration: underline;
        }

        /* Match Header Card */
        .match-header-card {
            background: var(--bg-panel);
            border: 3px solid var(--border-strong);
            border-radius: 16px;
            margin: 24px 16px 16px 16px;
            overflow: hidden;
            box-shadow: 6px 6px 0 rgba(0,0,0,0.4);
        }

        .match-info-section {
            text-align: center;
            padding: 24px 16px 16px;
        }
        .match-league-name {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 0;
        }
        .match-season-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 30px;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-top: 0;
            line-height: 1;
            text-transform: uppercase;
        }
        .match-matchup-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-top: 6px;
            line-height: 1.1;
            text-transform: uppercase;
        }
        .match-matchup-vs {
            font-size: 14px;
            color: var(--text-dim);
            letter-spacing: 3px;
            display: block;
            margin: 2px 0;
        }
        .match-week-date {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 6px;
        }
        .match-timing {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Box Score Table */
        .box-score {
            background: var(--bg-panel);
            margin-bottom: 10px;
        }
        .box-header, .box-row {
            display: grid;
            grid-template-columns: 1fr 52px 48px 48px 48px 52px;
            align-items: center;
            gap: 0;
        }
        .box-header {
            padding: 8px 14px;
            border-bottom: 2px solid rgba(255,255,255,0.15);
        }
        .box-header .box-cell {
            font-family: 'Oswald', sans-serif;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
        }
        .box-header .box-cell.box-team { text-align: left; }
        .box-row {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .box-cell {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            color: var(--text-light);
            text-align: center;
        }
        .box-cell.box-team {
            text-align: left;
            font-family: inherit;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        /* SETS = the "score" column — separated like R|H|E */
        .box-cell.box-score-col {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            font-weight: 700;
            border-left: 2px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .box-header .box-cell.box-score-col {
            font-size: 11px;
            font-family: 'Oswald', sans-serif;
            font-weight: 400;
            border-left: 2px solid rgba(255,255,255,0.15);
            border-right: 1px solid rgba(255,255,255,0.08);
        }
        .box-team-name {
            font-family: 'Oswald', sans-serif;
            font-size: 22px;
            letter-spacing: 1px;
            color: var(--text-light);
        }
        .box-team-record {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            color: var(--text-dim);
        }
        .box-winner-star {
            font-size: 16px;
            color: #FFD700;
            min-width: 16px;
        }
        .box-winner-star:empty { min-width: 16px; }
        .box-cell.stat-winner { color: var(--green); font-weight: 700; }
        .box-row-loser .box-cell { color: rgba(255,255,255,0.55); }
        .box-row-loser .box-team-name { color: rgba(255,255,255,0.55); }
        .box-row-loser .box-cell.stat-winner { color: var(--green); }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            flex-wrap: wrap;
            background: var(--bg-panel);
            border-bottom: 3px solid var(--border-strong);
            position: sticky;
            top: 56px;
            z-index: 99;
        }
        .tab-btn {
            flex: 1 1 0;
            min-width: 0;
            padding: 10px 4px;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            color: var(--text-dim);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
        }
        .tab-btn:hover { color: var(--text-light); background: rgba(255,255,255,0.05); }
        .tab-btn.active {
            color: var(--pink);
            border-bottom-color: var(--pink);
            background: rgba(255, 70, 154, 0.1);
        }

        /* Tab Content */
        .tab-content { display: none; padding: 16px; }
        .tab-content.active { display: block; }

        /* Game Cards (from league-view) */
        .games-container { max-width: 600px; margin: 0 auto; }

        .match-score-card {
            background: var(--bg-panel);
            margin-bottom: 8px;
            padding: 0 0 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .match-score-header {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            padding: 10px 14px;
            background: rgba(0,0,0,0.3);
            color: var(--yellow);
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px;
        }
        .team-columns-header {
            display: grid;
            grid-template-columns: 1fr 32px auto 32px 1fr;
            align-items: center;
            padding: 0 12px;
        }
        .team-col-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .team-col-home { text-align: left; }
        .team-col-away { text-align: right; }
        .team-col-name {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-light);
        }
        .team-col-avg {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dim);
        }
        .team-col-score {
            font-family: 'Oswald', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--text-light);
            line-height: 1;
            padding: 0 8px;
            text-align: center;
        }
        .team-col-star {
            font-size: 22px;
            color: #FFD700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .expand-selector {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .expand-label {
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            color: var(--text-dim);
        }
        .expand-opt {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--text-dim);
            padding: 5px 16px;
            font-family: 'Oswald', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .expand-opt:first-of-type { border-radius: 6px 0 0 6px; }
        .expand-opt:last-of-type { border-radius: 0 6px 6px 0; }
        .expand-opt:not(:first-of-type) { border-left: none; }
        .expand-opt.active {
            background: var(--pink);
            color: #fff;
            border-color: var(--pink);
        }
        .expand-opt:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: var(--text-light);
        }

        /* Line Score (baseball inning-by-inning) */
        .line-score {
            margin: 0 0 12px 0;
            border-bottom: 2px solid rgba(255,255,255,0.12);
            overflow: hidden;
            font-family: 'Oswald', sans-serif;
            background: var(--bg-panel);
        }
        .line-score-row {
            display: grid;
            align-items: center;
            gap: 0;
        }
        .line-score-row.ls-header {
            background: rgba(0,0,0,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.15);
        }
        .ls-header .ls-cell.ls-name {
            text-align: right;
            padding-right: 6px;
        }
        .line-score-row.ls-team {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .line-score-row.ls-team:last-child {
            border-bottom: none;
        }
        .ls-cell {
            text-align: center;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-light);
        }
        .ls-cell.ls-name {
            text-align: left;
            padding-left: 10px;
            font-family: 'Oswald', sans-serif;
            font-size: 15px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ls-cell.ls-header-cell {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            padding: 5px 0;
            letter-spacing: 0.5px;
        }
        .ls-cell.ls-final {
            font-family: 'Oswald', sans-serif;
            font-size: 20px;
            font-weight: 700;
            border-left: 2px solid rgba(255,255,255,0.15);
        }
        .ls-cell.ls-header-cell.ls-final {
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 400;
        }
        .ls-cell.ls-win { color: var(--green); }
        .ls-cell.ls-loss { color: var(--text-dim); }
        .ls-cell.ls-final.ls-winner { color: var(--yellow); }
        .ls-cell.ls-final.ls-loser { color: var(--text-dim); }

        .game-card {
            background: var(--bg-card);
            border: 2px solid var(--border-strong);
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        /* Set Label Bar - top of card */
        .set-label-bar {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            letter-spacing: 1px;
            color: var(--text-dim);
            background: rgba(0,0,0,0.3);
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .set-label-num {
            font-size: 16px;
            font-weight: 700;
            color: var(--yellow);
        }
        .set-label-info {
            font-size: 13px;
        }

        /* Player Roster - 3-column grid with score in center */
        .set-roster {
            display: grid;
            grid-template-columns: 1fr 32px auto 32px 1fr;
            gap: 8px 0;
            padding: 6px 12px 0;
            align-items: stretch;
        }
        .set-winner-star {
            font-size: 22px;
            color: #FFD700;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .roster-column {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
        }
        .roster-column.home { align-items: flex-start; }
        .roster-column.away { align-items: flex-end; text-align: right; }

        .roster-player {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .roster-name {
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            color: var(--text-light);
        }
        .roster-name:hover { text-decoration: underline; color: var(--yellow); }

        .roster-stat {
            font-size: 11px;
            color: var(--text-dim);
            display: none;
        }
        .game-card.expanded .roster-stat {
            display: block;
        }
        .roster-stat.stat-better { color: var(--green); }
        .roster-stat.stat-worse { color: #ef5350; }

        .roster-combined-stat {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-light);
            margin-top: 2px;
            padding-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .roster-combined-stat.stat-better { color: var(--green); }
        .roster-combined-stat.stat-worse { color: #ef5350; }

        .set-score-col {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 60px;
        }
        .set-score {
            font-family: 'Oswald', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: var(--text-light);
            text-align: center;
            padding: 0 8px;
            line-height: 1;
        }
        .set-card-toggle {
            text-align: center;
            padding: 0;
            margin-top: -10px;
        }
        .toggle-detail-btn {
            background: none;
            border: none;
            color: var(--yellow);
            padding: 0 14px 2px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .toggle-detail-btn:hover {
            color: var(--yellow);
        }
        .toggle-detail-btn.expanded {
            color: var(--yellow);
        }

        /* Fill-in and OUT badges */
        .fill-in-badge {
            display: inline-block;
            background: var(--teal);
            color: var(--black, #000);
            font-size: 8px;
            font-weight: 700;
            padding: 2px 4px;
            border-radius: 3px;
            margin: 0 2px;
            vertical-align: middle;
        }

        .out-badge {
            display: inline-block;
            background: #666;
            color: #fff;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 4px;
            border-radius: 3px;
            margin: 0 2px;
            vertical-align: middle;
        }

        /* Leg Detail Cards */
        .legs-detail {
            display: none;
            border-top: 2px solid rgba(255,255,255,0.1);
            padding: 12px;
            background: rgba(0,0,0,0.2);
        }
        .legs-detail.expanded { display: block; }

        .leg-card {
            background: var(--bg-dark);
            border-radius: 8px;
            margin-bottom: 10px;
            border: 2px solid var(--text-dim);
            overflow: hidden;
        }
        .leg-card.home-won { border-color: var(--text-dim); }
        .leg-card.away-won { border-color: var(--text-dim); }

        .leg-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            padding: 12px;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .leg-header:hover { background: rgba(255,255,255,0.05); }

        .leg-player-side {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .leg-player-side.left { align-items: flex-start; }
        .leg-player-side.right { align-items: flex-end; text-align: right; }

        .leg-player-name {
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }
        .leg-player-name:hover { text-decoration: underline; }
        .leg-player-side.left .leg-player-name { color: var(--text-light); }
        .leg-player-side.right .leg-player-name { color: var(--text-light); }

        .cork-badge {
            display: inline-block;
            background: var(--yellow);
            color: var(--bg-dark);
            font-size: 9px;
            font-weight: 700;
            padding: 1px 4px;
            border-radius: 3px;
            vertical-align: middle;
        }

        .leg-player-stat {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            color: var(--text-dim);
        }
        .leg-player-stat.big { color: var(--text-dim); }

        .leg-combined-stat {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            margin-bottom: 4px;
            padding-bottom: 3px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .leg-combined-stat.stat-better { color: var(--text-dim); }
        .leg-combined-stat.stat-worse { color: var(--text-dim); }

        .leg-center {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .leg-number {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            color: var(--yellow);
        }
        .leg-format {
            font-size: 10px;
            color: var(--text-dim);
            background: var(--bg-panel);
            padding: 2px 8px;
            border-radius: 4px;
        }
        .leg-expand-hint {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Throws Detail */
        .throws-detail {
            display: none;
            background: var(--bg-panel);
            padding: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .throws-detail.expanded { display: block; }

        .throws-header {
            display: grid;
            grid-template-columns: 1fr 40px 40px 28px 40px 40px 1fr;
            gap: 4px;
            font-size: 10px;
            color: var(--text-dim);
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 8px;
            text-align: center;
        }
        .throws-header > div:first-child { text-align: left; }
        .throws-header > div:last-child { text-align: right; }

        .throw-row {
            display: grid;
            grid-template-columns: 1fr 40px 40px 28px 40px 40px 1fr;
            gap: 4px;
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }
        .throw-row .home { color: var(--text-light); }
        .throw-row .away { color: var(--text-light); text-align: right; }
        .throw-row:nth-child(odd) { background: rgba(255,255,255,0.03); }
        .throw-row:nth-child(even) { background: rgba(0,0,0,0.1); }
        .throw-row .round { text-align: center; color: var(--yellow); font-weight: 700; }
        .throw-row .scored { text-align: center; font-weight: 600; }
        .throw-row .remaining { text-align: center; color: var(--text-dim); font-size: 10px; }
        .throw-row .hits { text-align: center; font-size: 10px; }
        .throw-row .marks { text-align: center; font-weight: 600; }
        .throw-row .notable { color: var(--yellow); font-weight: 700; font-size: 10px; }
        .throw-row .scored.notable-score,
        .throw-row .hits.notable-score {
            color: var(--yellow);
            font-weight: 700;
            background: rgba(253, 216, 53, 0.15);
            border-radius: 4px;
            padding: 2px 4px;
        }
        .throw-row .scored.checkout-score {
            color: var(--green);
            font-weight: 700;
            background: rgba(16, 185, 129, 0.15);
            border-radius: 4px;
            padding: 2px 4px;
        }
        .throw-row .marks.notable-score {
            color: var(--yellow);
            font-weight: 700;
            background: rgba(253, 216, 53, 0.15);

        /* Responsive - Tablet */

                min-width: 320px;

        /* Responsive - Mobile */

        /* Responsive - Small Mobile */
        @media (max-width: 380px) {

                grid-template-columns: 1fr 32px 32px 22px 32px 32px 1fr;
                gap: 2px;
                font-size: 8px;
            }

                padding: 1px 2px;

        }

        /* Print Button */
        .print-btn {
            background: var(--bg-card);

            border-radius: 8px;
            padding: 8px 14px;
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            color: var(--yellow);
            cursor: pointer;
            margin-left: auto;
            transition: all 0.2s;
        }
        .print-btn:hover {
            background: var(--yellow);
            color: var(--bg-dark);
        }

        /* Player Filter Chips */
        .chip-filter {
            padding: 8px 12px;
            margin-bottom: 4px;
        }
        .chip-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            padding: 5px 12px;
            border-radius: 16px;
            font-family: 'Oswald', sans-serif;
            font-size: 12px;
            border: 1px solid rgba(255,255,255,0.15);

            transition: all 0.15s;

        .chip.chip-away.active { background: var(--teal); border-color: var(--teal); }

        /* Print Styles */
        @media print {

                background: white !important;
                color: black !important;

                print-color-adjust: exact;
            }
            body::before { display: none; }
            .fb-header {
                display: none !important;
            }
            .chip-filter, .tab-nav, .expand-selector {
                display: none !important;

        }

        .skeleton {
            background: linear-gradient(90deg, #1e2a47 25%, #2a3a57 50%, #1e2a47 75%);
            background-size: 200% 100%;
            border-radius: 8px;

        .skeleton-player-side.right { align-items: flex-start; }

            height: 16px;
            width: 100px;
        }

            height: 12px;
            width: 70px;
        }
        .skeleton-score-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .skeleton-score {
            height: 32px;
            width: 60px;
        }
        .skeleton-format {
            height: 18px;
            width: 50px;
            border-radius: 4px;
        }
        .skeleton-set-body {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .skeleton-type {
            height: 14px;
            width: 80px;
        }
        .skeleton-btn {
            height: 28px;
            width: 90px;
            border-radius: 6px;
        }

        /* Tooltip hints for stats jargon */
        [data-tooltip] {
            position: relative;
            cursor: help;
            border-bottom: 1px dotted var(--text-dim);
        }
        [data-tooltip]:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-dark);
            border: 1px solid var(--teal);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 1000;
            color: var(--text-light);
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        [data-tooltip]:hover::before {
            content: '';
            position: absolute;
            bottom: calc(100% - 5px);
            left: 50%;
            transform: translateX(-50%);
            border: 5px solid transparent;
            border-top-color: var(--teal);

                border-top: 1px solid rgba(255,255,255,0.1);

    <script type="module">
        import { db, doc, getDoc, collection, query, where, getDocs, updateDoc } from '/js/firebase-config.js';
        import { initTabSwipe } from '/js/tab-swipe.js';

        const urlParams = new URLSearchParams(window.location.search);
        const leagueId = urlParams.get('league_id') || urlParams.get('league');
        const matchId = urlParams.get('match_id') || urlParams.get('match');

        let matchData = null;
        let homeTeam = null;
        let awayTeam = null;
        let homeRoster = [];
        let awayRoster = [];
        let homeDisplayRoster = [];
        let awayDisplayRoster = [];
        let homeOutPlayers = [];
        let awayOutPlayers = [];
        let allPlayersById = {};
        let allPlayersByName = {};
        // Tab switching
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
            });
        });

        // Sanitize player names from Firestore data (past import bugs may have stored "undefined" as a string)
        function safeName(name) {
            return (name && name !== 'undefined' && name !== 'null') ? name : '';
        }

        // Check if a player is a fill-in
        function isFillInPlayer(playerName) {
            return homeDisplayRoster.some(p => p.name === playerName && p.isFillIn) ||
                   awayDisplayRoster.some(p => p.name === playerName && p.isFillIn);
        }

        // Add SUB badge if player is a fill-in
        function addFillInBadge(playerName) {
            if (isFillInPlayer(playerName)) {
                return `<span class="fill-in-badge">SUB</span> ${playerName}`;
            }
            return playerName;
        }

        let leagueData = null;
        let currentPlayerId = null;

        async function loadMatch() {
            if (!leagueId || !matchId) {
                document.getElementById('loadingState').innerHTML = '<p style="color: var(--pink);">Missing league_id or match_id</p>';
                return;
            }

            // Get current player from localStorage
            const savedPlayer = localStorage.getItem('brdc_player');
            if (savedPlayer) {
                try {
                    const player = JSON.parse(savedPlayer);
                    currentPlayerId = player.id;
                } catch (e) {}
            }

            try {
                const matchDoc = await getDoc(doc(db, 'leagues', leagueId, 'matches', matchId));

                if (!matchDoc.exists()) {
                    document.getElementById('loadingState').innerHTML = '<p style="color: var(--pink);">Match not found</p>';
                    return;
                }

                matchData = { id: matchId, ...matchDoc.data() };

                // Load team data and league data
                const [homeDoc, awayDoc, leagueDoc] = await Promise.all([
                    getDoc(doc(db, 'leagues', leagueId, 'teams', matchData.home_team_id)),
                    getDoc(doc(db, 'leagues', leagueId, 'teams', matchData.away_team_id)),
                    getDoc(doc(db, 'leagues', leagueId))
                ]);

                if (homeDoc.exists()) homeTeam = { id: homeDoc.id, ...homeDoc.data() };
                if (awayDoc.exists()) awayTeam = { id: awayDoc.id, ...awayDoc.data() };
                if (leagueDoc.exists()) leagueData = { id: leagueDoc.id, ...leagueDoc.data() };

                // Update breadcrumb with league name and link
                const breadcrumbLeagueEl = document.getElementById('breadcrumbLeague');
                if (breadcrumbLeagueEl && leagueData) {
                    breadcrumbLeagueEl.textContent = leagueData.name || 'League';
                    breadcrumbLeagueEl.href = `/pages/league-view.html?league_id=${leagueId}`;
                }

                // Load ALL league players to detect fill-ins
                const playersRef = collection(db, 'leagues', leagueId, 'players');
                const allPlayersSnap = await getDocs(playersRef);

                allPlayersById = {};
                allPlayersByName = {};
                allPlayersSnap.forEach(d => {
                    const player = { id: d.id, ...d.data() };
                    allPlayersById[d.id] = player;
                    if (player.name) allPlayersByName[player.name] = player;
                });

                homeRoster = Object.values(allPlayersById)
                    .filter(p => p.team_id === matchData.home_team_id)
                    .sort((a, b) => (a.position || 99) - (b.position || 99));
                awayRoster = Object.values(allPlayersById)
                    .filter(p => p.team_id === matchData.away_team_id)
                    .sort((a, b) => (a.position || 99) - (b.position || 99));

                // Auto-detect fill-in players from games data
                homeDisplayRoster = [...homeRoster];
                awayDisplayRoster = [...awayRoster];
                homeOutPlayers = [];
                awayOutPlayers = [];

                if (matchData.status === 'completed' && matchData.games && matchData.games.length > 0) {
                    // First try explicit lineup data
                    const homeLineup = matchData.home_lineup || [];
                    const awayLineup = matchData.away_lineup || [];

                    if (homeLineup.length > 0 || awayLineup.length > 0) {
                        // Use explicit lineup data
                        homeLineup.forEach(entry => {
                            if (entry.is_sub && entry.player_id && entry.replacing_player_id) {
                                const fillIn = allPlayersById[entry.player_id];
                                const idx = homeDisplayRoster.findIndex(p => p.id === entry.replacing_player_id);
                                if (fillIn && idx !== -1) {
                                    homeOutPlayers.push({ ...homeDisplayRoster[idx], isOut: true });
                                    homeDisplayRoster[idx] = { ...fillIn, isFillIn: true, position: homeDisplayRoster[idx].position };
                                }
                            }
                        });
                        awayLineup.forEach(entry => {
                            if (entry.is_sub && entry.player_id && entry.replacing_player_id) {
                                const fillIn = allPlayersById[entry.player_id];
                                const idx = awayDisplayRoster.findIndex(p => p.id === entry.replacing_player_id);
                                if (fillIn && idx !== -1) {
                                    awayOutPlayers.push({ ...awayDisplayRoster[idx], isOut: true });
                                    awayDisplayRoster[idx] = { ...fillIn, isFillIn: true, position: awayDisplayRoster[idx].position };
                                }
                            }
                        });
                    } else {
                        // Auto-detect from games data
                        const homePlayedNames = new Set();
                        const awayPlayedNames = new Set();
                        matchData.games.forEach(game => {
                            (game.home_players || []).forEach(p => {
                                const name = typeof p === 'string' ? p : (p && p.name);
                                if (name) homePlayedNames.add(name);
                            });
                            (game.away_players || []).forEach(p => {
                                const name = typeof p === 'string' ? p : (p && p.name);
                                if (name) awayPlayedNames.add(name);
                            });
                        });

                        // Detect home fill-ins
                        const homeRosterIds = new Set(homeRoster.map(p => p.id));
                        homePlayedNames.forEach(name => {
                            const player = allPlayersByName[name];
                            if (player && !homeRosterIds.has(player.id)) {
                                const outPlayer = homeDisplayRoster.find(p => !homePlayedNames.has(p.name));
                                if (outPlayer) {
                                    const idx = homeDisplayRoster.indexOf(outPlayer);
                                    homeOutPlayers.push({ ...outPlayer, isOut: true });
                                    homeDisplayRoster[idx] = { ...player, isFillIn: true, position: outPlayer.position };
                                } else {
                                    homeDisplayRoster.push({ ...player, isFillIn: true, position: 99 });
                                }
                            }
                        });

                        // Detect away fill-ins
                        const awayRosterIds = new Set(awayRoster.map(p => p.id));
                        awayPlayedNames.forEach(name => {
                            const player = allPlayersByName[name];
                            if (player && !awayRosterIds.has(player.id)) {
                                const outPlayer = awayDisplayRoster.find(p => !awayPlayedNames.has(p.name));
                                if (outPlayer) {
                                    const idx = awayDisplayRoster.indexOf(outPlayer);
                                    awayOutPlayers.push({ ...outPlayer, isOut: true });
                                    awayDisplayRoster[idx] = { ...player, isFillIn: true, position: outPlayer.position };
                                } else {
                                    awayDisplayRoster.push({ ...player, isFillIn: true, position: 99 });
                                }
                            }
                        });
                    }

                    homeDisplayRoster.sort((a, b) => (a.position || 99) - (b.position || 99));
                    awayDisplayRoster.sort((a, b) => (a.position || 99) - (b.position || 99));
                }

                // Determine if match is completed or not
                const isCompleted = matchData.status === 'completed' ||
                    (matchData.games && matchData.games.length > 0) ||
                    (matchData.home_score !== undefined && matchData.away_score !== undefined &&
                     (matchData.home_score > 0 || matchData.away_score > 0));

                document.getElementById('loadingState').style.display = 'none';

                if (isCompleted) {
                    // Show post-match report view
                    if (window.brdcNav) window.brdcNav.setPageTitle('MATCH REPORT');
                    document.getElementById('matchContent').style.display = 'block';
                    renderMatch();
                } else {
                    // Show pre-match view
                    if (window.brdcNav) window.brdcNav.setPageTitle('MATCH HUB');
                    document.getElementById('preMatchContent').style.display = 'block';
                    renderPreMatch();
                }

            } catch (error) {
                console.error('Error loading match:', error);
                document.getElementById('loadingState').innerHTML = `<p style="color: var(--pink);">Error: ${error.message}</p>`;
            }
        }

        function renderMatch() {
            // Calculate set wins and leg wins from games data
            const games = matchData.games || [];
            let homeSetsWon = 0, awaySetsWon = 0;
            let homeLegsWon = 0, awayLegsWon = 0;

            // Team-level stat aggregation for header
            let homeX01Darts = 0, homeX01Points = 0, homeCrkDarts = 0, homeCrkMarks = 0;
            let awayX01Darts = 0, awayX01Points = 0, awayCrkDarts = 0, awayCrkMarks = 0;
            let homeMissThrows = 0, homeTotalThrows = 0;
            let awayMissThrows = 0, awayTotalThrows = 0;

            // Build home/away player sets for team attribution
            const homePlayerSet = new Set();
            const awayPlayerSet = new Set();

            games.forEach(game => {
                homeLegsWon += game.home_legs_won || 0;
                awayLegsWon += game.away_legs_won || 0;
                if (game.winner === 'home') homeSetsWon++;
                else if (game.winner === 'away') awaySetsWon++;

                const homePl = (game.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                const awayPl = (game.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                homePl.forEach(p => homePlayerSet.add(p));
                awayPl.forEach(p => awayPlayerSet.add(p));

                (game.legs || []).forEach(leg => {
                    const fmt = leg.format || game.format;
                    const isCrk = fmt === 'cricket';

                    // Aggregate from player_stats
                    Object.entries(leg.player_stats || {}).forEach(([name, stats]) => {
                        if (!name || name === 'undefined') return;
                        const isHome = homePl.includes(name);
                        if (isCrk) {
                            if (isHome) { homeCrkDarts += stats.darts || 0; homeCrkMarks += stats.marks || 0; }
                            else { awayCrkDarts += stats.darts || 0; awayCrkMarks += stats.marks || 0; }
                        } else {
                            if (isHome) { homeX01Darts += stats.darts || 0; homeX01Points += stats.points || 0; }
                            else { awayX01Darts += stats.darts || 0; awayX01Points += stats.points || 0; }
                        }
                    });

                    // Miss tracking from throws (score === 0 for X01, marks === 0 for cricket)
                    (leg.throws || []).forEach(t => {
                        if (t.home && t.home.player) {
                            if (isCrk && t.home.marks != null) {
                                homeTotalThrows++;
                                if (t.home.marks === 0) homeMissThrows++;
                            } else if (!isCrk && t.home.score != null) {
                                homeTotalThrows++;
                                if (t.home.score === 0) homeMissThrows++;
                            }
                        }
                        if (t.away && t.away.player) {
                            if (isCrk && t.away.marks != null) {
                                awayTotalThrows++;
                                if (t.away.marks === 0) awayMissThrows++;
                            } else if (!isCrk && t.away.score != null) {
                                awayTotalThrows++;
                                if (t.away.score === 0) awayMissThrows++;
                            }
                        }
                    });
                });
            });

            const homeSets = homeSetsWon || matchData.home_score || 0;
            const awaySets = awaySetsWon || matchData.away_score || 0;

            // === POPULATE HEADER ===

            // League info
            document.getElementById('matchLeagueName').textContent = leagueData?.venue_name || leagueData?.organization || '';
            document.getElementById('matchSeasonName').textContent = leagueData?.name || leagueData?.league_name || '';
            const homeName = homeTeam?.team_name || homeTeam?.name || matchData.home_team_name || 'Home';
            const awayName = awayTeam?.team_name || awayTeam?.name || matchData.away_team_name || 'Away';
            document.getElementById('matchMatchup').innerHTML = homeName + '<span class="match-matchup-vs">VS.</span>' + awayName;

            // Week + Date
            const week = matchData.week || matchData.week_number || '';
            let dateStr = '';
            const rawDate = matchData.match_date;
            if (rawDate) {
                const date = rawDate.toDate ? rawDate.toDate() : new Date(rawDate);
                dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
            }
            document.getElementById('matchWeekDate').textContent = week ? `Week ${week} – ${dateStr}` : dateStr;

            // Timing
            let timingStr = '';
            if (matchData.start_time) {
                const start = matchData.start_time.toDate ? matchData.start_time.toDate() : new Date(matchData.start_time);
                timingStr = start.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                if (matchData.end_time) {
                    const end = matchData.end_time.toDate ? matchData.end_time.toDate() : new Date(matchData.end_time);
                    timingStr += ' – ' + end.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                    const mins = Math.round((end - start) / 60000);
                    const hrs = Math.floor(mins / 60);
                    const rem = mins % 60;
                    timingStr += ' (' + (hrs > 0 ? hrs + 'h ' + rem + 'm' : mins + 'm') + ')';
                }
            }
            document.getElementById('matchTiming').textContent = timingStr;

            // Team names
            document.getElementById('homeTeamName').textContent = homeTeam?.team_name || homeTeam?.name || matchData.home_team_name || 'Home';
            document.getElementById('awayTeamName').textContent = awayTeam?.team_name || awayTeam?.name || matchData.away_team_name || 'Away';

            // Populate Game Details tab team column headers + match score
            const gamesHomeEl = document.getElementById('gamesHomeTeam');
            const gamesAwayEl = document.getElementById('gamesAwayTeam');
            const gamesScoreEl = document.getElementById('gamesMatchScore');
            if (gamesHomeEl) gamesHomeEl.textContent = homeTeam?.team_name || homeTeam?.name || matchData.home_team_name || 'Home';
            if (gamesAwayEl) gamesAwayEl.textContent = awayTeam?.team_name || awayTeam?.name || matchData.away_team_name || 'Away';
            if (gamesScoreEl) {
                const hScore = matchData.home_score || 0;
                const aScore = matchData.away_score || 0;
                gamesScoreEl.textContent = hScore + ' – ' + aScore;
                // Winner star in Game Details header
                const homeStarEl = document.getElementById('gamesHomeStar');
                const awayStarEl = document.getElementById('gamesAwayStar');
                if (homeStarEl) homeStarEl.textContent = hScore > aScore ? '\u2B50' : '';
                if (awayStarEl) awayStarEl.textContent = aScore > hScore ? '\u2B50' : '';
            }

            // Records
            document.getElementById('homeRec').textContent = homeTeam ? '(' + (homeTeam.wins || 0) + '-' + (homeTeam.losses || 0) + ')' : '';
            document.getElementById('awayRec').textContent = awayTeam ? '(' + (awayTeam.wins || 0) + '-' + (awayTeam.losses || 0) + ')' : '';

            // Winner star + dim losing row
            const matchWinner = homeSets > awaySets ? 'home' : (awaySets > homeSets ? 'away' : null);
            if (matchWinner === 'home') {
                document.getElementById('homeWinStar').textContent = '\u2605';
                document.getElementById('awayCompRow').classList.add('box-row-loser');
            } else if (matchWinner === 'away') {
                document.getElementById('awayWinStar').textContent = '\u2605';
                document.getElementById('homeCompRow').classList.add('box-row-loser');
            }

            // Sets
            document.getElementById('homeSets').textContent = homeSets;
            document.getElementById('awaySets').textContent = awaySets;

            // Legs
            document.getElementById('homeLegsTotal').textContent = homeLegsWon;
            document.getElementById('awayLegsTotal').textContent = awayLegsWon;

            // 3DA
            const home3DA = homeX01Darts > 0 ? (homeX01Points / homeX01Darts * 3).toFixed(1) : '-';
            const away3DA = awayX01Darts > 0 ? (awayX01Points / awayX01Darts * 3).toFixed(1) : '-';
            document.getElementById('home3DA').textContent = home3DA;
            document.getElementById('away3DA').textContent = away3DA;

            // MPR
            const homeMPRVal = homeCrkDarts > 0 ? (homeCrkMarks / (homeCrkDarts / 3)).toFixed(2) : '-';
            const awayMPRVal = awayCrkDarts > 0 ? (awayCrkMarks / (awayCrkDarts / 3)).toFixed(2) : '-';
            document.getElementById('homeMPR').textContent = homeMPRVal;
            document.getElementById('awayMPR').textContent = awayMPRVal;

            // Match score card team averages
            const homeAvgEl = document.getElementById('gamesHomeAvg');
            const awayAvgEl = document.getElementById('gamesAwayAvg');
            if (homeAvgEl) homeAvgEl.textContent = home3DA + ' / ' + homeMPRVal;
            if (awayAvgEl) awayAvgEl.textContent = away3DA + ' / ' + awayMPRVal;

            // MISS%
            const homeMissPct = homeTotalThrows > 0 ? Math.round((homeMissThrows / homeTotalThrows) * 100) + '%' : '-';
            const awayMissPct = awayTotalThrows > 0 ? Math.round((awayMissThrows / awayTotalThrows) * 100) + '%' : '-';
            document.getElementById('homeMiss').textContent = homeMissPct;
            document.getElementById('awayMiss').textContent = awayMissPct;

            // Winner highlighting — green on better stat
            const statPairs = [
                ['homeSets', 'awaySets', homeSets, awaySets, false],
                ['homeLegsTotal', 'awayLegsTotal', homeLegsWon, awayLegsWon, false],
                ['home3DA', 'away3DA', parseFloat(home3DA) || 0, parseFloat(away3DA) || 0, false],
                ['homeMPR', 'awayMPR', parseFloat(homeMPRVal) || 0, parseFloat(awayMPRVal) || 0, false],
                ['homeMiss', 'awayMiss', parseFloat(homeMissPct) || 0, parseFloat(awayMissPct) || 0, true]
            ];
            statPairs.forEach(([hId, aId, hVal, aVal, lowerBetter]) => {
                if (lowerBetter) {
                    if ((hVal > 0 || aVal > 0) && hVal < aVal) document.getElementById(hId).classList.add('stat-winner');
                    else if ((hVal > 0 || aVal > 0) && aVal < hVal) document.getElementById(aId).classList.add('stat-winner');
                } else {
                    if (hVal > aVal) document.getElementById(hId).classList.add('stat-winner');
                    else if (aVal > hVal) document.getElementById(aId).classList.add('stat-winner');
                }
            });

            // Games tab
            renderGames();

            // Other tabs
            renderPerformance();
            renderCounts();
            renderLeaders();
            makeSortable();
            initPlayerFilter();
        }

        function renderGames() {
            const container = document.getElementById('gamesContainer');
            const games = matchData.games || [];

            if (games.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px; color: var(--text-dim);">No games recorded</p>';
                return;
            }

            // Group games by SET number
            const setGroups = {};
            games.forEach((game, idx) => {
                const setNum = game.set || 1;
                if (!setGroups[setNum]) {
                    setGroups[setNum] = [];
                }
                setGroups[setNum].push({ ...game, originalIdx: idx });
            });

            let html = '';
            const setNumbers = Object.keys(setGroups).map(Number).sort((a, b) => a - b);

            // Build line score (leg counts per set, like baseball innings)
            if (setNumbers.length > 1) {
                const homeLegs = [];
                const awayLegs = [];
                let homeLegTotal = 0, awayLegTotal = 0;

                let homeSetWins = 0, awaySetWins = 0;
                setNumbers.forEach(sn => {
                    const sg = setGroups[sn];
                    let hW = 0, aW = 0;
                    sg.forEach(g => {
                        if (g.result) { hW += g.result.home_legs || 0; aW += g.result.away_legs || 0; }
                        else { (g.legs || []).forEach(l => { if (l.winner === 'home') hW++; else if (l.winner === 'away') aW++; }); }
                    });
                    homeLegs.push(hW);
                    awayLegs.push(aW);
                    homeLegTotal += hW;
                    awayLegTotal += aW;
                    if (hW > aW) homeSetWins++;
                    else if (aW > hW) awaySetWins++;
                });

                const numSets = setNumbers.length;
                const cols = `90px repeat(${numSets}, 1fr) 44px 44px`;
                const homeName = homeTeam?.team_name || homeTeam?.name || matchData.home_team_name || 'Home';
                const awayName = awayTeam?.team_name || awayTeam?.name || matchData.away_team_name || 'Away';
                const homeMore = homeLegTotal > awayLegTotal;
                const awayMore = awayLegTotal > homeLegTotal;

                let lsHtml = `<div class="line-score-row ls-header" style="grid-template-columns: ${cols}">`;
                lsHtml += '<div class="ls-cell ls-header-cell ls-name">SET</div>';
                setNumbers.forEach(sn => { lsHtml += `<div class="ls-cell ls-header-cell">${sn}</div>`; });
                lsHtml += '<div class="ls-cell ls-header-cell ls-final">TOT</div>';
                lsHtml += '<div class="ls-cell ls-header-cell ls-final">LEGS</div></div>';

                lsHtml += `<div class="line-score-row ls-team" style="grid-template-columns: ${cols}">`;
                lsHtml += `<div class="ls-cell ls-name">${homeName}</div>`;
                homeLegs.forEach((h, i) => { lsHtml += `<div class="ls-cell ${h > awayLegs[i] ? 'ls-win' : h < awayLegs[i] ? 'ls-loss' : ''}">${h}</div>`; });
                lsHtml += `<div class="ls-cell ls-final${homeSetWins > awaySetWins ? ' ls-winner' : homeSetWins < awaySetWins ? ' ls-loser' : ''}">${homeSetWins}</div>`;
                lsHtml += `<div class="ls-cell ls-final${homeMore ? ' ls-winner' : !awayMore ? '' : ' ls-loser'}">${homeLegTotal}</div></div>`;

                lsHtml += `<div class="line-score-row ls-team" style="grid-template-columns: ${cols}">`;
                lsHtml += `<div class="ls-cell ls-name">${awayName}</div>`;
                awayLegs.forEach((a, i) => { lsHtml += `<div class="ls-cell ${a > homeLegs[i] ? 'ls-win' : a < homeLegs[i] ? 'ls-loss' : ''}">${a}</div>`; });
                lsHtml += `<div class="ls-cell ls-final${awaySetWins > homeSetWins ? ' ls-winner' : awaySetWins < homeSetWins ? ' ls-loser' : ''}">${awaySetWins}</div>`;
                lsHtml += `<div class="ls-cell ls-final${awayMore ? ' ls-winner' : !homeMore ? '' : ' ls-loser'}">${awayLegTotal}</div></div>`;

                document.getElementById('lineScore').innerHTML = lsHtml;
            }

            setNumbers.forEach((setNum, setIdx) => {
                const setGames = setGroups[setNum];

                // Apply player filter - skip sets that don't include any selected player
                if (selectedFilterPlayers.length > 0) {
                    const firstGame = setGames[0];
                    const hp = (firstGame.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                    const ap = (firstGame.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                    const allP = [...hp, ...ap];
                    const hasMatch = selectedFilterPlayers.some(fp => allP.includes(fp));
                    if (!hasMatch) return;
                }

                // Calculate set totals (leg wins within this set)
                // Each game object IS a set - use result.home_legs/away_legs for leg breakdown
                let homeWins = 0;
                let awayWins = 0;
                let totalLegsInSet = 0;
                setGames.forEach(g => {
                    if (g.result) {
                        homeWins += g.result.home_legs || 0;
                        awayWins += g.result.away_legs || 0;
                    } else {
                        // Fallback: count leg winners from legs array
                        (g.legs || []).forEach(leg => {
                            if (leg.winner === 'home') homeWins++;
                            else if (leg.winner === 'away') awayWins++;
                        });
                    }
                    totalLegsInSet += (g.legs || []).length;
                });

                const setHomeWon = homeWins > awayWins;
                const setAwayWon = awayWins > homeWins;

                // Get players from first game in set (they should be same throughout set)
                const firstGame = setGames[0];
                const homePlayers = (firstGame.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                const awayPlayers = (firstGame.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));

                // Game type with position letters (A/B/C from roster positions)
                const playerCount = homePlayers.length;
                const posMap = {1: 'A', 2: 'B', 3: 'C'};
                const posLetters = homePlayers.map(name => {
                    const p = allPlayersByName[name];
                    const pos = p ? p.position : null;
                    return pos ? posMap[pos] : null;
                });
                const allMapped = posLetters.every(l => l !== null);
                let gameType;
                if (playerCount === 1) {
                    gameType = 'SINGLES' + (allMapped ? ' ' + posLetters[0] : '');
                } else if (playerCount === 2) {
                    gameType = 'DOUBLES' + (allMapped ? ' ' + posLetters.sort().join('/') : '');
                } else {
                    gameType = 'TRIPLES';
                }

                // Calculate aggregate stats for the set
                const setStats = calculateSetStats(setGames);

                // Build format labels for legs in this set
                const allLegs = setGames.flatMap(g => (g.legs || []));
                const formatLabels = allLegs.map(leg => {
                    const fmt = leg.format || firstGame.format || '501';
                    if (fmt === 'cricket') return 'CRICKET';
                    const inLabel = (leg.in_rule || firstGame.in_rule || 'straight') === 'double' ? 'DI' : 'SI';
                    const outLabel = (leg.checkout || firstGame.checkout || 'double') === 'double' ? 'DO' : ((leg.checkout || firstGame.checkout) === 'master' ? 'MO' : 'SO');
                    return `${fmt} ${inLabel}/${outLabel}`;
                });
                const uniqueFormats = [...new Set(formatLabels)];
                const formatBadge = uniqueFormats.length <= 2 ? uniqueFormats.join(' / ') : `${totalLegsInSet} LEGS`;

                // Compute combined team averages for this set
                let homeCombined = { x01Darts: 0, x01Points: 0, cricketDarts: 0, cricketMarks: 0 };
                let awayCombined = { x01Darts: 0, x01Points: 0, cricketDarts: 0, cricketMarks: 0 };
                setGames.forEach(game => {
                    (game.legs || []).forEach(leg => {
                        const fmt = leg.format || game.format;
                        const hp = (game.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                        const ap = (game.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || ''));
                        Object.entries(leg.player_stats || {}).forEach(([name, stats]) => {
                            const isHome = hp.includes(name);
                            const isAway = ap.includes(name);
                            const target = isHome ? homeCombined : isAway ? awayCombined : null;
                            if (!target) return;
                            if (fmt === 'cricket') {
                                target.cricketDarts += stats.darts || 0;
                                target.cricketMarks += stats.marks || 0;
                            } else {
                                target.x01Darts += stats.darts || 0;
                                target.x01Points += stats.points || 0;
                            }
                        });
                    });
                });
                function getCombinedVal(c) {
                    const has01 = c.x01Darts > 0;
                    const hasCrk = c.cricketDarts > 0;
                    const avg = has01 ? (c.x01Points / c.x01Darts) * 3 : 0;
                    const mpr = hasCrk ? c.cricketMarks / (c.cricketDarts / 3) : 0;
                    let str = '';
                    if (has01 && hasCrk) str = avg.toFixed(1) + ' / ' + mpr.toFixed(2);
                    else if (has01) str = avg.toFixed(1) + ' 3DA';
                    else if (hasCrk) str = mpr.toFixed(2) + ' MPR';
                    return { str, val: avg || mpr };
                }
                const homeCombined_ = getCombinedVal(homeCombined);
                const awayCombined_ = getCombinedVal(awayCombined);
                const homeCombinedStr = homeCombined_.str;
                const awayCombinedStr = awayCombined_.str;
                let homeCombinedClass = '';
                let awayCombinedClass = '';
                if (homeCombined_.val && awayCombined_.val) {
                    if (homeCombined_.val > awayCombined_.val) { homeCombinedClass = 'stat-better'; awayCombinedClass = 'stat-worse'; }
                    else if (awayCombined_.val > homeCombined_.val) { awayCombinedClass = 'stat-better'; homeCombinedClass = 'stat-worse'; }
                }

                // Build home and away roster columns
                let homeColHtml = '';
                let awayColHtml = '';
                const maxPositions = Math.max(homePlayers.length, awayPlayers.length);
                for (let i = 0; i < maxPositions; i++) {
                    const hName = homePlayers[i] || '';
                    const aName = awayPlayers[i] || '';
                    const hStat = setStats.home[i];
                    const aStat = setStats.away[i];
                    if (hName) {
                        homeColHtml += '<div class="roster-player">';
                        homeColHtml += '<a class="roster-name player-link" href="/pages/player-profile.html?name=' + encodeURIComponent(hName) + '&league_id=' + leagueId + '">' + addFillInBadge(hName) + '</a>';
                        if (hStat) homeColHtml += '<span class="roster-stat ' + (hStat.color || '') + '">' + hStat.stat + '</span>';
                        homeColHtml += '</div>';
                    }
                    if (aName) {
                        awayColHtml += '<div class="roster-player">';
                        awayColHtml += '<a class="roster-name player-link" href="/pages/player-profile.html?name=' + encodeURIComponent(aName) + '&league_id=' + leagueId + '">' + addFillInBadge(aName) + '</a>';
                        if (aStat) awayColHtml += '<span class="roster-stat ' + (aStat.color || '') + '">' + aStat.stat + '</span>';
                        awayColHtml += '</div>';
                    }
                }

                html += '<div class="game-card" data-set-idx="' + setIdx + '" data-set-num="' + setNum + '">';
                html += '<div class="set-label-bar"><span class="set-label-num">SET ' + setNum + '</span> <span class="set-label-info">\u2014 ' + gameType + ' \u2014 ' + formatBadge + '</span></div>';
                html += '<div class="set-roster">';
                html += '<div class="roster-column home">';
                html += homeColHtml;
                if (homeCombinedStr) html += '<div class="roster-combined-stat ' + homeCombinedClass + '">' + homeCombinedStr + '</div>';
                html += '</div>';
                html += '<div class="set-winner-star">' + (setHomeWon ? '\u2B50' : '') + '</div>';
                html += '<div class="set-score-col">';
                html += '<div class="set-score">' + homeWins + ' \u2013 ' + awayWins + '</div>';
                html += '</div>';
                html += '<div class="set-winner-star">' + (setAwayWon ? '\u2B50' : '') + '</div>';
                html += '<div class="roster-column away">';
                html += awayColHtml;
                if (awayCombinedStr) html += '<div class="roster-combined-stat ' + awayCombinedClass + '">' + awayCombinedStr + '</div>';
                html += '</div>';
                html += '</div>';
                html += '<div class="set-card-toggle"><button class="toggle-detail-btn" onclick="toggleSetDetail(' + setIdx + ')">';
                html += '<span id="toggle-text-' + setIdx + '">\u25BC ' + totalLegsInSet + ' LEG' + (totalLegsInSet !== 1 ? 'S' : '') + '</span>';
                html += '</button></div>';
                html += renderSetLegsDetail(setGames, setIdx);
                html += '</div>';
            });

            container.innerHTML = html;
        }

        function calculateSetStats(setGames) {
            // Aggregate stats across all games in this set, split by format
            const playerTotals = {};

            setGames.forEach(game => {
                (game.legs || []).forEach(leg => {
                    const fmt = leg.format || game.format;
                    Object.entries(leg.player_stats || {}).filter(([name]) => name && name !== 'undefined').forEach(([name, stats]) => {
                        if (!playerTotals[name]) {
                            playerTotals[name] = { x01Darts: 0, x01Points: 0, cricketDarts: 0, cricketMarks: 0 };
                        }
                        if (fmt === 'cricket') {
                            playerTotals[name].cricketDarts += stats.darts || 0;
                            playerTotals[name].cricketMarks += stats.marks || 0;
                        } else {
                            playerTotals[name].x01Darts += stats.darts || 0;
                            playerTotals[name].x01Points += stats.points || 0;
                        }
                    });
                });
            });

            const homePlayers = (setGames[0]?.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
            const awayPlayers = (setGames[0]?.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));

            const getStatDisplay = (name) => {
                const t = playerTotals[name];
                if (!t) return null;

                const has01 = t.x01Darts > 0;
                const hasCrk = t.cricketDarts > 0;

                if (has01 && hasCrk) {
                    const avgVal = (t.x01Points / t.x01Darts) * 3;
                    const mprVal = t.cricketMarks / (t.cricketDarts / 3);
                    return { stat: `${avgVal.toFixed(1)} / ${mprVal.toFixed(2)}`, isBig: avgVal >= 60 || mprVal >= 3.0, val: avgVal, color: '' };
                } else if (has01) {
                    const avgVal = (t.x01Points / t.x01Darts) * 3;
                    return { stat: `${avgVal.toFixed(1)} 3DA`, isBig: avgVal >= 60, val: avgVal, color: '' };
                } else if (hasCrk) {
                    const mprVal = t.cricketMarks / (t.cricketDarts / 3);
                    return { stat: `${mprVal.toFixed(2)} MPR`, isBig: mprVal >= 3.0, val: mprVal, color: '' };
                }
                return null;
            };

            const homeStats = homePlayers.map(getStatDisplay);
            const awayStats = awayPlayers.map(getStatDisplay);

            // Compare position-by-position and assign colors
            const maxPos = Math.max(homeStats.length, awayStats.length);
            for (let i = 0; i < maxPos; i++) {
                const h = homeStats[i];
                const a = awayStats[i];
                if (h && a && h.val != null && a.val != null) {
                    if (h.val > a.val) { h.color = 'stat-better'; a.color = 'stat-worse'; }
                    else if (a.val > h.val) { a.color = 'stat-better'; h.color = 'stat-worse'; }
                }
            }

            return { home: homeStats, away: awayStats };
        }

        function renderSetLegsDetail(setGames, setIdx) {
            if (setGames.length === 0) return '';

            let html = `<div class="legs-detail" id="legs-detail-${setIdx}">`;

            // Each game in setGames IS a set — iterate through all games and their legs
            let legIdx = 0;
            setGames.forEach(game => {
            if (!game || !game.legs) return;

            (game.legs || []).forEach((leg) => {
                const homeWon = leg.winner === 'home';
                const awayWon = leg.winner === 'away';
                const legFormat = leg.format || game.format || '501';
                const legIsCricket = legFormat === 'cricket';

                // Format label
                let formatLabel = (legFormat || '').toUpperCase();
                if (!legIsCricket && legFormat) {
                    const inLabel = (game.in_rule || 'straight') === 'double' ? 'DI' : 'SI';
                    const outLabel = (game.checkout || 'double') === 'double' ? 'DO' : (game.checkout === 'master' ? 'MO' : 'SO');
                    formatLabel = `${legFormat} ${inLabel}/${outLabel}`;
                }

                // Get player stats for this specific leg
                const playerStats = leg.player_stats || {};
                const homePlayers = (game.home_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));
                const awayPlayers = (game.away_players || []).map(p => typeof p === 'string' ? p : (p?.name || 'TBD'));

                // Determine who had cork (threw first) - check first throw
                const firstThrow = (leg.throws || [])[0];
                const homeCork = firstThrow && firstThrow.home && firstThrow.home.player;
                const awayCork = !homeCork && firstThrow && firstThrow.away && firstThrow.away.player;

                // Get checkout/closeout info from the winning throw
                const lastThrow = (leg.throws || []).slice(-1)[0];
                let checkoutInfo = null;
                let closeoutInfo = null;
                let loserRemaining = null;

                if (homeWon && lastThrow) {
                    if (!legIsCricket) {
                        checkoutInfo = { side: 'home', value: lastThrow.home?.score || leg.checkout };
                        // Find loser's remaining from last throw or leg stats
                        loserRemaining = lastThrow.away?.remaining || leg.away_stats?.remaining;
                    } else if (lastThrow.home?.closed_out) {
                        closeoutInfo = { side: 'home', marks: lastThrow.home.marks, darts: lastThrow.home.closeout_darts };
                    }
                } else if (awayWon && lastThrow) {
                    if (!legIsCricket) {
                        checkoutInfo = { side: 'away', value: lastThrow.away?.score || leg.checkout };
                        loserRemaining = lastThrow.home?.remaining || leg.home_stats?.remaining;
                    } else if (lastThrow.away?.closed_out) {
                        closeoutInfo = { side: 'away', marks: lastThrow.away.marks, darts: lastThrow.away.closeout_darts };
                    }
                }

                // Combined team stats for doubles+ legs
                let legCombinedHome = '';
                let legCombinedAway = '';
                let legCombinedHomeClass = '';
                let legCombinedAwayClass = '';
                if (homePlayers.length > 1) {
                    let hDarts = 0, hPoints = 0, hMarks = 0, hCrkDarts = 0;
                    homePlayers.forEach(name => {
                        const s = playerStats[name] || {};
                        if (legIsCricket) { hCrkDarts += s.darts || 0; hMarks += s.marks || 0; }
                        else { hDarts += s.darts || 0; hPoints += s.points || 0; }
                    });
                    let hVal = 0;
                    if (legIsCricket && hCrkDarts > 0) { hVal = hMarks / (hCrkDarts / 3); legCombinedHome = hVal.toFixed(2) + ' MPR'; }
                    else if (hDarts > 0) { hVal = (hPoints / hDarts) * 3; legCombinedHome = hVal.toFixed(1) + ' 3DA'; }

                    let aDarts = 0, aPoints = 0, aMarks = 0, aCrkDarts = 0;
                    awayPlayers.forEach(name => {
                        const s = playerStats[name] || {};
                        if (legIsCricket) { aCrkDarts += s.darts || 0; aMarks += s.marks || 0; }
                        else { aDarts += s.darts || 0; aPoints += s.points || 0; }
                    });
                    let aVal = 0;
                    if (legIsCricket && aCrkDarts > 0) { aVal = aMarks / (aCrkDarts / 3); legCombinedAway = aVal.toFixed(2) + ' MPR'; }
                    else if (aDarts > 0) { aVal = (aPoints / aDarts) * 3; legCombinedAway = aVal.toFixed(1) + ' 3DA'; }

                    if (hVal && aVal) {
                        if (hVal > aVal) { legCombinedHomeClass = 'stat-better'; legCombinedAwayClass = 'stat-worse'; }
                        else if (aVal > hVal) { legCombinedAwayClass = 'stat-better'; legCombinedHomeClass = 'stat-worse'; }
                    }
                }

                html += `
                    <div class="leg-card ${homeWon ? 'home-won' : awayWon ? 'away-won' : ''}">
                        <div class="leg-header" onclick="toggleLegThrows(${setIdx}, ${legIdx})">
                            <div class="leg-player-side left">
                                ${legCombinedHome ? `<div class="leg-combined-stat ${legCombinedHomeClass}">${legCombinedHome}</div>` : ''}
                                ${homePlayers.map(name => {
                                    const stats = playerStats[name] || {};
                                    const statVal = legIsCricket
                                        ? (stats.mpr ? stats.mpr.toFixed(2) + ' MPR' : '-')
                                        : (stats.points && stats.darts ? ((stats.points / stats.darts) * 3).toFixed(1) + ' 3DA' : '-');
                                    const isBig = legIsCricket ? (stats.mpr >= 3.0) : ((stats.points / stats.darts) * 3 >= 60);
                                    const hasCork = homeCork === name;
                                    return `
                                        <div>
                                            <a class="leg-player-name player-link" href="/pages/player-profile.html?name=${encodeURIComponent(name)}&league_id=${leagueId}" onclick="event.stopPropagation()">${hasCork ? '<span class="cork-badge">C</span> ' : ''}${name}</a>
                                            <div class="leg-player-stat ${isBig ? 'big' : ''}">${statVal}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                            <div class="leg-center">
                                <div class="leg-number">LEG ${leg.leg_number || legIdx + 1}</div>
                                <div class="leg-format">${formatLabel}</div>
                                <div class="leg-expand-hint">▼ details</div>
                            </div>
                            <div class="leg-player-side right">
                                ${legCombinedAway ? `<div class="leg-combined-stat ${legCombinedAwayClass}">${legCombinedAway}</div>` : ''}
                                ${awayPlayers.map(name => {
                                    const stats = playerStats[name] || {};
                                    const statVal = legIsCricket
                                        ? (stats.mpr ? stats.mpr.toFixed(2) + ' MPR' : '-')
                                        : (stats.points && stats.darts ? ((stats.points / stats.darts) * 3).toFixed(1) + ' 3DA' : '-');
                                    const isBig = legIsCricket ? (stats.mpr >= 3.0) : ((stats.points / stats.darts) * 3 >= 60);
                                    const hasCork = awayCork === name;
                                    return `
                                        <div>
                                            <a class="leg-player-name player-link" href="/pages/player-profile.html?name=${encodeURIComponent(name)}&league_id=${leagueId}" onclick="event.stopPropagation()">${name}${hasCork ? ' <span class="cork-badge">C</span>' : ''}</a>
                                            <div class="leg-player-stat ${isBig ? 'big' : ''}">${statVal}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        <div class="throws-detail" id="throws-${setIdx}-${legIdx}">
                            ${renderLegThrowsDetail(leg, game, legIsCricket, checkoutInfo, closeoutInfo, loserRemaining)}
                        </div>
                    </div>
                `;
                legIdx++;
            });
            }); // end setGames.forEach

            html += '</div>';
            return html;
        }

        function renderLegThrowsDetail(leg, game, isCricket, checkoutInfo, closeoutInfo, loserRemaining) {
            const homeStats = leg.home_stats || {};
            const awayStats = leg.away_stats || {};

            // If we have throw data, show it
            if (leg.throws && leg.throws.length > 0) {
                let html;
                if (isCricket) {
                    html = `
                        <div class="throws-header">
                            <div>Home</div>
                            <div>Hits</div>
                            <div>Mrks</div>
                            <div>Rnd</div>
                            <div>Mrks</div>
                            <div>Hits</div>
                            <div>Away</div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="throws-header">
                            <div>Home</div>
                            <div>Scrd</div>
                            <div>Left</div>
                            <div>Rnd</div>
                            <div>Left</div>
                            <div>Scrd</div>
                            <div>Away</div>
                        </div>
                    `;
                }

                // Derive checkout/closeout darts from stats if not stored explicitly
                // Formula: checkoutDarts = 3 - (winnerRounds * 3 - actualDarts)
                let derivedCheckoutDarts = null;
                if (leg.winner) {
                    const winStats = leg.winner === 'home' ? homeStats : awayStats;
                    if (winStats.darts) {
                        let winRounds = 0;
                        leg.throws.forEach(t => {
