<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF469A">
    <link rel="stylesheet" href="/css/print.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        :root {
            --pink: #FF469A;
            --teal: #91D7EB;
            --yellow: #FDD835;
            --bg-dark: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #1e2a47;
            --text-light: #f0f0f0;
            --text-dim: #8a8aa3;
            --text-primary: #ffffff;
            --border-color: rgba(255, 255, 255, 0.15);
            --success: #22c55e;
            --danger: #ef4444;
            --black: #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
            overflow-x: hidden;
            width: 100%;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f23 100%);
            color: var(--text-light);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 70, 154, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(145, 215, 235, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Header Bar */
        .header-bar {
            background: var(--bg-panel);
            border-bottom: 2px solid var(--pink);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 70, 154, 0.15);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--text-light);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--teal);
        }

        .director-login-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--yellow);
            border-radius: 8px;
            padding: 8px 14px;
            color: var(--yellow);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: auto;
        }

        .director-login-btn:hover {
            background: rgba(253, 216, 53, 0.15);
            box-shadow: 0 0 15px rgba(253, 216, 53, 0.3);
        }

        /* Breadcrumbs */
        .breadcrumbs {
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-dim);
            max-width: 1100px;
            margin: 0 auto;
        }

        .breadcrumbs ol {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 0;
            padding: 0;
        }

        .breadcrumbs li::after {
            content: '>';
            margin-left: 8px;
            color: var(--text-dim);
        }

        .breadcrumbs li:last-child::after {
            content: '';
        }

        .breadcrumbs a {
            color: var(--teal);
            text-decoration: none;
        }

        .breadcrumbs a:hover {
            text-decoration: underline;
        }

        .header-logo {
            width: 36px;
            height: 36px;
        }

        .header-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 24px;
            letter-spacing: 3px;
            color: var(--pink);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        /* League Header Card */
        .league-header-card {
            background: var(--bg-card);
            border: 3px solid #000;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
        }

        .league-header-top {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .league-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--pink), var(--teal));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            border: 3px solid #000;
            flex-shrink: 0;
        }

        .league-info {
            flex: 1;
        }

        .league-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
            letter-spacing: 1px;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .league-season {
            font-size: 13px;
            color: var(--text-dim);
        }

        .league-status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .league-status-badge.active {
            background: var(--success);
            color: #000;
        }

        .league-status-badge.registration {
            background: var(--teal);
            color: #000;
        }

        .league-status-badge.draft {
            background: var(--yellow);
            color: #000;
        }

        .league-status-badge.completed {
            background: #666;
            color: #fff;
        }

        .league-stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .league-stat {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .league-stat-value {
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            color: var(--yellow);
        }

        .league-stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        /* Sub signup card in league header */
        .sub-signup-card {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
            padding: 12px 16px;
            background: linear-gradient(135deg, rgba(95, 200, 220, 0.15) 0%, rgba(95, 200, 220, 0.08) 100%);
            border: 2px solid var(--teal);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sub-signup-card:hover {
            background: linear-gradient(135deg, rgba(95, 200, 220, 0.25) 0%, rgba(95, 200, 220, 0.15) 100%);
            transform: translateY(-1px);
        }

        .sub-signup-icon {
            font-size: 28px;
            flex-shrink: 0;
        }

        .sub-signup-content {
            flex: 1;
        }

        .sub-signup-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 14px;
            color: var(--teal);
            margin-bottom: 2px;
        }

        .sub-signup-desc {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.3;
        }

        .sub-signup-arrow {
            font-size: 20px;
            color: var(--teal);
            font-weight: bold;
        }

        /* Sub signup modal styles */
        .sub-signup-intro {
            background: rgba(95, 200, 220, 0.1);
            border-left: 3px solid var(--teal);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .sub-signup-intro p {
            margin: 0 0 10px 0;
            color: var(--text-color);
        }

        .sub-signup-intro ul {
            margin: 0;
            padding-left: 20px;
            color: var(--text-dim);
        }

        .sub-signup-intro li {
            margin-bottom: 4px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        /* Rules tab styles */
        .rules-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .rules-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .rules-card-header {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 16px;
            font-family: 'Archivo Black', sans-serif;
            font-size: 12px;
            color: var(--teal);
            border-bottom: 1px solid var(--border-color);
        }

        .rules-card-body {
            padding: 12px 16px;
        }

        .rules-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .rules-item:last-child {
            border-bottom: none;
        }

        .rules-label {
            font-size: 13px;
            color: var(--text-dim);
            flex-shrink: 0;
        }

        .rules-value {
            font-size: 13px;
            color: var(--text-color);
            text-align: right;
            max-width: 60%;
        }

        /* Legacy league card styles for registration view */
        .league-card {
            background: var(--bg-card);
            border: 3px solid #000;
            border-radius: 16px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .league-header {
            background: linear-gradient(135deg, var(--pink) 0%, #cc3879 100%);
            padding: 25px;
            position: relative;
        }

        .league-header .league-name {
            font-family: 'Bebas Neue', cursive;
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .league-header .league-season {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 2px;
            opacity: 0.9;
            color: white;
        }

        .league-body {
            padding: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-left: 3px solid var(--teal);
            border-radius: 0 8px 8px 0;
        }

        .info-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .info-value {
            font-weight: 700;
            font-size: 16px;
        }

        .spots-display {
            background: linear-gradient(135deg, var(--yellow), #e6c200);
            color: #000;
            padding: 18px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .spots-count {
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
        }

        .spots-label {
            font-weight: 700;
            font-size: 12px;
        }

        .register-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(180deg, var(--pink) 0%, #d63384 100%);
            border: 3px solid #000;
            border-radius: 10px;
            color: white;
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.4);
            transition: all 0.15s;
        }

        .register-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.4);
        }

        .register-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Sign-ups Section */
        .signups-section {
            background: var(--bg-card);
            border: 3px solid #000;
            border-radius: 16px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .signups-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .signups-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .signups-count {
            background: var(--pink);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .signups-body {
            padding: 15px;
        }

        .signup-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .signup-item:last-child {
            margin-bottom: 0;
        }

        .signup-name {
            font-weight: 600;
            font-size: 14px;
        }

        .signup-level {
            background: var(--teal);
            color: #000;
            padding: 3px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
        }

        .signup-status {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 10px;
            font-weight: 600;
        }

        .signup-status.confirmed {
            background: var(--success);
            color: #000;
        }

        .signup-status.pending {
            background: var(--yellow);
            color: #000;
        }

        .login-prompt {
            text-align: center;
            padding: 30px;
            color: var(--text-dim);
        }

        /* Registration Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(180deg, #1e2a47 0%, #16213e 100%);
            border: 4px solid var(--pink);
            box-shadow: 0 0 50px rgba(255, 70, 154, 0.3);
            max-width: min(500px, 95vw);
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
        }

        .modal-header {
            background: var(--pink);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            line-height: 1;
        }

        .modal-body {
            padding: 25px;
        }

        /* PIN Lookup Section */
        .pin-section {
            background: linear-gradient(135deg, var(--yellow), #e6c200);
            color: var(--black);
            padding: 20px;
            margin-bottom: 25px;
            border: 3px solid var(--black);
        }

        .pin-section-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .pin-row {
            display: flex;
            gap: 10px;
        }

        .pin-input {
            flex: 1;
            padding: 12px;
            border: 3px solid var(--black);
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 3px;
            text-align: center;
            -webkit-text-security: disc;
        }

        .pin-btn {
            padding: 12px 20px;
            background: var(--black);
            color: white;
            border: none;
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
        }

        .divider span {
            background: #1e2a47;
            padding: 0 15px;
            position: relative;
            color: var(--text-light);
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--teal);
            font-weight: 600;
        }

        .form-label span {
            color: var(--pink);
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            border-radius: 6px;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--teal);
            background: rgba(255, 255, 255, 0.12);
        }

        .form-select {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 16px;
            border-radius: 6px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .checkbox-group input {
            width: 22px;
            height: 22px;
            accent-color: var(--pink);
        }

        /* Payment Options */
        .payment-section {
            margin: 25px 0;
        }

        .payment-title {
            font-family: 'Bebas Neue', cursive;
            font-size: 18px;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-option:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .payment-option.selected {
            border-color: var(--pink);
            background: rgba(255, 70, 154, 0.1);
        }

        .payment-option input {
            width: 20px;
            height: 20px;
            accent-color: var(--pink);
        }

        .payment-label {
            font-weight: 600;
        }

        .payment-desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--pink), #cc3879);
            border: none;
            color: white;
            border-radius: 8px;
            font-family: 'Bebas Neue', cursive;
            font-size: 22px;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 5px 5px 0 rgba(0, 0, 0, 0.5);
            transition: all 0.2s;
        }

        .submit-btn:hover {
            transform: translate(-2px, -2px);
        }

        .submit-btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
        }

        .fee-display {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--teal);
        }

        .fee-amount {
            font-family: 'Archivo Black', sans-serif;
            font-size: 28px;
            color: var(--teal);
        }

        /* Success State */
        .success-content {
            text-align: center;
            padding: 40px 20px;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .success-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 32px;
            margin-bottom: 15px;
        }

        .success-message {
            color: var(--text-dim);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .pin-display-box {
            background: var(--yellow);
            color: var(--black);
            padding: 20px;
            margin: 20px 0;
            border: 4px solid var(--black);
        }

        .pin-display-label {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .pin-display-value {
            font-family: 'Archivo Black', sans-serif;
            font-size: 36px;
            letter-spacing: 8px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
            padding: 20px;
            text-align: center;
            color: #ef4444;
        }

        /* Tabs */
        .tab-container {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 5px;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            border-bottom: 3px solid var(--border-color);
            padding-bottom: 5px;
        }

        .tab {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid transparent;
            padding: 12px 20px;
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            letter-spacing: 1px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 8px 8px 0 0;
        }

        .tab:hover {
            color: white;
            background: rgba(255, 255, 255, 0.1);
        }

        .tab.active {
            background: var(--pink);
            color: white;
            border-color: var(--pink);
        }

        button.tab {
            text-align: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Schedule Filters */
        .schedule-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-label {
            font-family: 'Bebas Neue', cursive;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        .filter-select {
            background: var(--bg-card);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
