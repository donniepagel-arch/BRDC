<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League - BRDC</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FF469A">
    <link rel="stylesheet" href="/css/brdc-styles.css?v=3">
    <link rel="stylesheet" href="/css/print.css">
    <link rel="stylesheet" href="/css/league-view.css?v=9">

    <!-- Toast Notifications -->
    <script src="/js/brdc-toast.js"></script>

    <!-- BRDC Navigation System -->
    <link rel="stylesheet" href="/css/brdc-navigation.css">
    <link rel="stylesheet" href="/css/brdc-search.css">
</head>

<body>
    <a href="#mainContent" class="skip-link">Skip to main content</a>

    <main class="container" id="mainContent">
        <!-- Match Night Banner -->
        <div class="match-night-banner" id="matchNightBanner" style="display: none;" role="status" aria-live="polite">
            <div class="match-night-title">🎯 MATCH NIGHT - <span id="matchWeek">WEEK 1</span></div>
            <div id="matchNightContent"></div>
            <div class="match-night-buttons">
                <button class="match-night-btn confirm" id="confirmBtn" onclick="confirmAvailability('available')" aria-label="Confirm I'll be there">✓
                    I'LL BE THERE</button>
                <button class="match-night-btn cant-make" id="cantMakeBtn"
                    onclick="confirmAvailability('unavailable')" aria-label="Confirm I can't make it">✗ CAN'T MAKE IT</button>
            </div>
        </div>

        <!-- Skeleton loading state -->
        <div id="leagueSkeletonLoader" aria-live="polite" aria-busy="true" aria-label="Loading league data">
            <!-- League Header Skeleton -->
            <div class="skeleton-header-card">
                <div class="skeleton-league-top">
                    <div class="skeleton skeleton-icon"></div>
                    <div class="skeleton-league-info">
                        <div class="skeleton skeleton-league-name"></div>
                        <div class="skeleton skeleton-league-season"></div>
                    </div>
                    <div class="skeleton skeleton-badge" style="width: 80px;"></div>
                </div>
                <div class="skeleton-stats-row">
                    <div class="skeleton skeleton-stat"></div>
                    <div class="skeleton skeleton-stat"></div>
                    <div class="skeleton skeleton-stat"></div>
                    <div class="skeleton skeleton-stat"></div>
                </div>
            </div>
            <!-- Tabs Skeleton -->
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <div class="skeleton" style="height: 36px; width: 90px;"></div>
                <div class="skeleton" style="height: 36px; width: 90px;"></div>
                <div class="skeleton" style="height: 36px; width: 70px;"></div>
                <div class="skeleton" style="height: 36px; width: 70px;"></div>
            </div>
            <!-- Match Cards Skeleton -->
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-badge"></div>
                </div>
                <div class="skeleton skeleton-score" style="margin-bottom: 12px;"></div>
                <div class="skeleton-roster">
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                </div>
            </div>
            <div class="skeleton-card">
                <div class="skeleton-header">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-badge"></div>
                </div>
                <div class="skeleton skeleton-score" style="margin-bottom: 12px;"></div>
                <div class="skeleton-roster">
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                    <div class="skeleton-player">
                        <div class="skeleton skeleton-level"></div>
                        <div class="skeleton skeleton-name"></div>
                        <div class="skeleton skeleton-stats"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Registration Modal -->
    <div class="modal-overlay" id="registerModal" role="dialog" aria-modal="true" aria-labelledby="registerModalTitle">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="registerModalTitle">REGISTER</span>
                <button class="modal-close" onclick="closeModal()" aria-label="Close modal">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Form will be rendered here -->
            </div>
        </div>
    </div>

    <script type="module" src="/js/league-view/app.js"></script>

    <!-- BRDC Navigation System -->
    <script src="/components/brdc-navigation-init.js?v=14"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initBRDCNavigation({
                page: 'league-view',
                showMobileNav: true,
                showSearch: false,
                backUrl: '/pages/dashboard.html'
            });
        });
    </script>

    <script src="/js/display-helpers.js"></script>
    <script src="/js/stats-helpers.js"></script>
    <script src="/js/brdc-share.js"></script>
</body>

</html>
