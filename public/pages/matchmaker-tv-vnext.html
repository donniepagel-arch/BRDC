<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchmaker TV</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#15213d">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=21">
</head>
<body class="matchmaker-tv-vnext-page">
    <main class="mmtv-shell">
        <header class="mmtv-header">
            <div>
                <p class="mmtv-kicker" id="tvStatus">Loading display...</p>
                <h1 id="tvTitle">Mixed Doubles Matchmaker</h1>
                <p id="tvMeta">Live tournament display</p>
            </div>
            <nav class="mmtv-modebar" aria-label="TV display modes">
                <a data-tv-mode="bracket" href="#">Bracket</a>
                <a data-tv-mode="partner-reveal" href="#">Partners</a>
                <a data-tv-mode="match-call" href="#">Matches</a>
                <a data-tv-mode="mingle-alert" href="#">Mingle</a>
            </nav>
        </header>

        <section class="mmtv-pane active" data-tv-pane="bracket" id="bracketView">
            <div class="mmtv-grid" id="tvBracketGrid"><div class="mmtv-empty">Waiting for bracket.</div></div>
        </section>
        <section class="mmtv-pane" data-tv-pane="partner-reveal" id="partnerRevealView">
            <div class="mmtv-grid teams" id="tvPartnerGrid"><div class="mmtv-empty">Waiting for partner draw.</div></div>
        </section>
        <section class="mmtv-pane" data-tv-pane="match-call" id="matchCallView">
            <div class="mmtv-grid" id="tvMatchGrid"><div class="mmtv-empty">No matches are ready yet.</div></div>
        </section>
        <section class="mmtv-pane" data-tv-pane="mingle-alert" id="mingleAlertView">
            <div class="mmtv-alert" id="tvMingleAlert">
                <span>Mingle Window</span>
                <strong>Waiting for director</strong>
                <em>Breakups and rematches will appear here when enabled.</em>
            </div>
        </section>
    </main>

    <script type="module" src="/js/matchmaker-tv-vnext.js?v=3"></script>
</body>
</html>
