<body class="vnext-light-page wing-it-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="wingStatus">Summer series</p>
                <h1>Wing It Wednesdays</h1>
                <p>Choose the Wednesday to manage. Each week keeps its own registration, bracket, check-in, boards, and results.</p>

                <em>Configured Wednesday events.</em>
            </article>
            <article>
                <span id="wingNextDate">-</span>

            </article>
            <article>
                <span id="wingTotalPlayers">-</span>
