<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Darts Hub</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=21">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="vnext-light-page tournament-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="tournamentStatus">Loading tournament...</p>
                <h1 id="tournamentTitle">Tournament</h1>
                <p id="tournamentMeta">Checking event details.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" id="registerLink" href="#">Register</a>
                <a class="ves-action" id="runtimeLink" href="#">Director Login</a>
                <a class="ves-action" id="bracketLink" href="#">Bracket</a>
                <a class="ves-action" href="/rookies/pages/events-vnext.html">Events</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Tournament summary">
            <article><span id="eventCount">-</span><strong>Events</strong><em>Singles, doubles, or mixed formats.</em></article>
            <article><span id="registrationCount">-</span><strong>Registered</strong><em>Players and teams currently signed up.</em></article>
            <article><span id="locationMode">-</span><strong>Location</strong><em>Online, flex, or in-person play.</em></article>
        </section>

        <section class="ves-filters" aria-label="Tournament sections">
            <button class="active" type="button" data-tv-target="overview">Overview</button>
            <button type="button" data-tv-target="events">Events</button>
            <button type="button" data-tv-target="registrations">Players</button>
            <button type="button" data-tv-target="rooms">Rooms</button>
        </section>

        <section class="ves-grid list tv-pane active" data-tv-pane="overview" id="overviewPane"><div class="ves-skeleton"></div></section>
        <section class="ves-grid list tv-pane" data-tv-pane="events" id="eventsPane"></section>
        <section class="ves-grid list tv-pane" data-tv-pane="registrations" id="registrationsPane"></section>
        <section class="ves-grid list tv-pane" data-tv-pane="rooms" id="roomsPane"></section>
    </main>

    <script src="/js/brdc-toast.js"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/tournament-view-vnext.js?v=9"></script>
    <script>
        initBRDCNavigation({ page: 'Events', pageTitle: 'Tournament', showBreadcrumbs: false, showBackButton: true });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
