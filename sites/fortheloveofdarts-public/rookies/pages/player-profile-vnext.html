<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Darts Hub</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/player-profile-vnext.css?v=3">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="ppv-page has-mobile-nav">
    <main class="ppv-shell" id="mainContent">
        <section class="ppv-hero" id="profileHero">
            <div class="ppv-loading">Loading player...</div>
        </section>

        <section class="ppv-card ppv-view-card">
            <nav class="ppv-tabs" aria-label="Player profile views">
                <button type="button" class="active" data-view-target="stats">Stats</button>
                <button type="button" data-view-target="matches">Matches</button>
                <button type="button" data-view-target="awards">Awards</button>
                <button type="button" data-view-target="profile">Profile</button>
            </nav>

            <div class="ppv-pane active" data-view-pane="stats">
                <div class="ppv-section-head">
                    <div><p class="ppv-kicker">Performance</p><h2>League stats</h2></div>
                    <span>2026 Triples League</span>
                </div>
                <div id="statsGrid" class="ppv-stats-grid"></div>
            </div>

            <div class="ppv-pane" data-view-pane="matches">
                <div class="ppv-section-head">
                    <div><p class="ppv-kicker">History</p><h2>Matches played</h2></div>
                    <span id="matchCount">-</span>
                </div>
                <div id="matchList" class="ppv-match-list"></div>
            </div>

            <div class="ppv-pane" data-view-pane="awards">
                <div class="ppv-section-head">
                    <div><p class="ppv-kicker">Counts</p><h2>Notables</h2></div>
                    <span>01 / Cricket</span>
                </div>
                <div id="awardsGrid" class="ppv-awards-grid"></div>
            </div>

            <div class="ppv-pane" data-view-pane="profile">
                <div class="ppv-section-head">
                    <div><p class="ppv-kicker">Details</p><h2>Player card</h2></div>
                    <a id="leagueProfileLink" href="/rookies/pages/triples-vnext.html">League hub</a>
                </div>
                <div id="profileDetails" class="ppv-detail-list"></div>
            </div>
        </section>
    </main>

    <script type="module" src="/js/player-profile-vnext.js?v=5"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script>
        initBRDCNavigation({
            page: 'player-profile',
            pageTitle: 'Player',
            showBreadcrumbs: false,
            showBackButton: true
        });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
