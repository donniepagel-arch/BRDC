<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Darts Hub</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="vnext-light-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker">Dart Trader</p>
                <h1 id="pageTitle">Create listing</h1>
                <p id="formIntro">Post gear for BRDC members without leaving the vnext flow.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action" href="/rookies/pages/dart-trader-vnext.html">Back to trader</a>
            </div>
        </section>

        <form class="ves-builder wide" id="listingForm">
            <section class="ves-panel">
                <h2>What are you listing?</h2>
                <div class="ves-form-grid">
                    <label>Category
                        <select name="category" id="category" required>
                            <option value="">Select category</option>
                            <option value="darts">Darts</option>
                            <option value="flights">Flights</option>
                            <option value="shafts">Shafts</option>
                            <option value="cases">Cases</option>
                            <option value="boards">Boards</option>
                            <option value="accessories">Accessories</option>
                        </select>
                    </label>
                    <label>Condition
                        <select name="condition" id="condition" required>
                            <option value="">Select condition</option>
                            <option value="New">New</option>
                            <option value="Like New">Like New</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                        </select>
                    </label>
                    <label class="wide">Title
                        <input name="title" id="title" maxlength="100" placeholder="Target darts, case, flights..." required>
                    </label>
                    <label>Price
                        <input name="price" id="price" type="number" min="0" step="1" inputmode="decimal" placeholder="0 for trade / offer">
                    </label>
                    <label>Brand
                        <input name="brand" id="brand" placeholder="Optional">
                    </label>
                    <label>Weight
                        <input name="weight" id="weight" type="number" min="1" max="100" step="0.1" inputmode="decimal" placeholder="Darts only">
                    </label>
                    <label>Material
                        <input name="material" id="material" placeholder="Tungsten, brass...">
                    </label>
                    <label class="wide">Description
                        <textarea name="description" id="description" maxlength="1000" placeholder="Condition, included extras, preferred trade, pickup details..."></textarea>
                    </label>
                    <label class="wide">Photo
                        <input name="photo" id="photo" type="file" accept="image/*">
                    </label>
                </div>
            </section>

            <section class="ves-panel">
                <h2>Contact</h2>
                <div class="ves-form-grid">
                    <label>Your name
                        <input name="seller_name" id="sellerName" autocomplete="name" required>
                    </label>
                    <label>Email
                        <input name="seller_email" id="sellerEmail" type="email" autocomplete="email">
                    </label>
                    <label>Phone
                        <input name="seller_phone" id="sellerPhone" autocomplete="tel">
                    </label>
                    <div class="ves-form-status" id="listingStatus"></div>
                    <div class="ves-form-actions">
                        <button class="ves-launch" id="submitListingBtn" type="submit">Publish listing</button>
                        <a class="ves-action" href="/rookies/pages/dart-trader-vnext.html">Cancel</a>
                    </div>
                </div>
            </section>
        </form>
    </main>

    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/dart-trader-create-vnext.js?v=1"></script>
    <script>
        initBRDCNavigation({ page: 'trader', pageTitle: 'Create Listing', showBreadcrumbs: false, showBackButton: true });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
