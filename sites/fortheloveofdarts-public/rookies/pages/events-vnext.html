<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Darts Hub</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=8">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="vnext-light-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker">Rookies darts calendar</p>
                <h1>Events</h1>
                <p id="eventsStatus">Loading league nights and tournaments...</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action primary" href="/rookies/pages/create-tournament-vnext.html">Create tournament</a>
                <a class="ves-action" href="/rookies/pages/triples-vnext.html">Triples league</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Event summary">
            <article>
                <span id="leagueEventCount">-</span>
                <strong>League nights</strong>
                <em>Scheduled and completed Triples matches.</em>
            </article>
            <article>
                <span id="tournamentEventCount">-</span>
                <strong>Tournaments</strong>
                <em>Online, flex, and in-person Events.</em>
            </article>
            <article>
                <span id="myEventCount">-</span>
                <strong>Your view</strong>
                <em>Filtered by your account when possible.</em>
            </article>
        </section>

        <section class="ves-filters" id="eventFilters">
            <button class="active" type="button" data-filter="all">All</button>
            <button type="button" data-filter="league">League</button>
            <button type="button" data-filter="tournament">Tournaments</button>
            <button type="button" data-filter="online">Online</button>
            <button type="button" data-filter="mine">Mine</button>
        </section>

        <section class="ves-grid list" id="eventGrid">
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
            <div class="ves-skeleton"></div>
        </section>
    </main>

    <script src="/js/brdc-toast.js"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/events-vnext.js?v=5"></script>
    <script>
        initBRDCNavigation({ page: 'Events', pageTitle: 'Events', showBreadcrumbs: false, showBackButton: true });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
