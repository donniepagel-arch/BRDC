<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Matchmaker Mingle</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/market-events-scorer-vnext.css?v=21">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="vnext-light-page tournament-vnext-page matchmaker-vnext-page has-mobile-nav">
    <main class="ves-shell">
        <section class="ves-hero">
            <div>
                <p class="ves-kicker" id="mingleStatus">Loading mingle...</p>
                <h1 id="mingleTitle">Matchmaker Mingle</h1>
                <p id="mingleMeta">Breakups, rematches, and live team status for mixed doubles matchmaker events.</p>
            </div>
            <div class="ves-hero-actions">
                <a class="ves-action" id="eventLink" href="#">Event page</a>
                <a class="ves-action" id="registerLink" href="#">Register</a>
                <a class="ves-action primary" id="runtimeLink" href="#">Director Login</a>
                <a class="ves-action" id="tvLink" href="#">TV Display</a>
            </div>
        </section>

        <section class="ves-summary-grid" aria-label="Mingle summary">
            <article><span id="teamCount">-</span><strong>Pairs</strong><em>Matched or pre-formed teams.</em></article>
            <article><span id="singleCount">-</span><strong>Singles</strong><em>Players still waiting for a partner.</em></article>
            <article><span id="mingleClock">-</span><strong>Mingle</strong><em>Window status and cutoff.</em></article>
        </section>

        <section class="ves-filters" aria-label="Mingle sections">
            <button class="active" type="button" data-mm-target="board">Board</button>
            <button type="button" data-mm-target="teams">Teams</button>
            <button type="button" data-mm-target="singles">Singles</button>
            <button type="button" data-mm-target="breakups">Breakups</button>
        </section>

        <section class="ves-grid list tv-pane active" data-mm-pane="board" id="mingleBoard"><div class="ves-skeleton"></div></section>
        <section class="ves-grid list tv-pane" data-mm-pane="teams" id="mingleTeams"></section>
        <section class="ves-grid list tv-pane" data-mm-pane="singles" id="mingleSingles"></section>
        <section class="ves-grid list tv-pane" data-mm-pane="breakups" id="mingleBreakups"></section>
    </main>

    <script src="/js/brdc-toast.js"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script type="module" src="/js/matchmaker-mingle-vnext.js?v=1"></script>
    <script>
        initBRDCNavigation({ page: 'Events', pageTitle: 'Matchmaker Mingle', showBreadcrumbs: false, showBackButton: true });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
