<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rookies Darts Hub</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#fff8ed">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap">
    <link rel="stylesheet" href="/css/brdc-styles.css">
    <link rel="stylesheet" href="/css/fb-mobile.css">
    <link rel="stylesheet" href="/css/brdc-navigation.css?v=14">
    <link rel="stylesheet" href="/css/league-team-vnext.css?v=3">
    <link rel="stylesheet" href="/rookies/tenant/rookies-vnext.css?v=23">
</head>
<body class="ltv-page has-mobile-nav">
    <main class="ltv-shell" id="mainContent">
        <section class="ltv-hero" id="teamHero">
            <div class="ltv-loading">Loading team...</div>
        </section>

        <section class="ltv-card ltv-view-card">
            <nav class="ltv-tabs" aria-label="Team profile views">
                <button type="button" class="active" data-view-target="overview">Overview</button>
                <button type="button" data-view-target="matches">Matches</button>
                <button type="button" data-view-target="players">Players</button>
                <button type="button" data-view-target="chat">Chat</button>
            </nav>

            <div class="ltv-pane active" data-view-pane="overview">
                <div class="ltv-section-head">
                    <div><p class="ltv-kicker">Snapshot</p><h2>Team form</h2></div>
                    <span id="teamRankBadge">-</span>
                </div>
                <div id="overviewGrid" class="ltv-overview-grid"></div>
            </div>

            <div class="ltv-pane" data-view-pane="matches">
                <div class="ltv-section-head">
                    <div><p class="ltv-kicker">Schedule</p><h2>Matches</h2></div>
                    <span>Team always left</span>
                </div>
                <div id="matchList" class="ltv-match-list"></div>
            </div>

            <div class="ltv-pane" data-view-pane="players">
                <div class="ltv-section-head">
                    <div><p class="ltv-kicker">Roster</p><h2>A / B / C</h2></div>
                    <a id="leagueTeamLink" href="/rookies/pages/triples-vnext.html">League hub</a>
                </div>
                <div id="playerList" class="ltv-player-list"></div>
            </div>

            <div class="ltv-pane" data-view-pane="chat">
                <div class="ltv-section-head">
                    <div><p class="ltv-kicker">Team room</p><h2>Coordinate</h2></div>
                    <a id="teamChatLink" href="/rookies/pages/messages-vnext.html">Open chat</a>
                </div>
                <div id="chatPanel" class="ltv-chat-panel"></div>
            </div>
        </section>
    </main>

    <script type="module" src="/js/league-team-vnext.js?v=6"></script>
    <script src="/components/brdc-navigation-init.js?v=18"></script>
    <script>
        initBRDCNavigation({
            page: 'league',
            pageTitle: 'Team',
            showBreadcrumbs: false,
            showBackButton: true
        });
    </script>
    <script src="/rookies/tenant/rookies-vnext.js?v=11"></script>
</body>
</html>
